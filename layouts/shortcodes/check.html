{{- $name := .Get 0 | lower -}}
{{- $count := .Get 1 | default "?" -}}
{{- $desc := .Get 2 | default "" -}}
<div class="check-row">
  <div class="check-item">
    <img src="{{ printf "images/game-icons/%s.svg" $name | relURL }}" alt="{{ $name }}" class="check-icon">
    <span class="check-count">{{ $count }}x</span>
    {{- with $desc }}<span class="check-desc">{{ . }}</span>{{ end -}}
  </div>
</div>
