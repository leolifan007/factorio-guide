<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580">
  <title>Military Science Production Flow - Factorio Guide</title>
  <defs><filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1000" height="580" fill="#1f1f1f" rx="6"/>
  <line x1="0" y1="65" x2="1000" y2="65" stroke="#333"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#7f8c8d">MILITARY SCIENCE - MATERIALS AND AMMUNITION CHAIN</text>

  <!-- ===== Row 1: Ingredient A - Piercing Rounds ===== -->
  <rect x="30" y="95" width="150" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="105" y="122" text-anchor="middle" font-size="16" fill="#888">Copper Plate</text>
  <line x1="180" y1="118" x2="220" y2="118" stroke="#7f8c8d" stroke-width="2.5"/>
  <polygon points="220,113 235,118 220,123" fill="#7f8c8d"/>

  <rect x="30" y="170" width="150" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="105" y="197" text-anchor="middle" font-size="16" fill="#888">Steel Plate</text>
  <line x1="180" y1="193" x2="220" y2="193" stroke="#7f8c8d" stroke-width="2.5"/>
  <polygon points="220,188 235,193 220,198" fill="#7f8c8d"/>

  <!-- Piercing rounds assembler -->
  <rect x="240" y="120" width="160" height="90" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="320" y="148" text-anchor="middle" font-size="17" fill="#ddd">Piercing Round</text>
  <text x="320" y="172" text-anchor="middle" font-size="15" fill="#888">5 Copper + 1 Steel</text>
  <text x="320" y="196" text-anchor="middle" font-size="14" fill="#666">or Firearm + Steel</text>
  <line x1="400" y1="165" x2="440" y2="165" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="440,160 450,165 440,170" fill="#7f8c8d"/>

  <!-- ===== Row 2: Ingredient B - Grenades ===== -->
  <rect x="30" y="275" width="150" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="105" y="302" text-anchor="middle" font-size="16" fill="#888">Iron Plate</text>
  <line x1="180" y1="298" x2="220" y2="298" stroke="#7f8c8d" stroke-width="2.5"/>
  <polygon points="220,293 235,298 220,303" fill="#7f8c8d"/>

  <rect x="30" y="350" width="150" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="105" y="377" text-anchor="middle" font-size="16" fill="#888">Coal (or other fuel)</text>
  <line x1="180" y1="373" x2="220" y2="373" stroke="#7f8c8d" stroke-width="2.5"/>
  <polygon points="220,368 235,373 220,378" fill="#7f8c8d"/>

  <!-- Grenade assembler -->
  <rect x="240" y="290" width="160" height="85" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="320" y="316" text-anchor="middle" font-size="17" fill="#ddd">Grenade</text>
  <text x="320" y="340" text-anchor="middle" font-size="15" fill="#888">5 Iron + 1 Coal</text>
  <text x="320" y="362" text-anchor="middle" font-size="14" fill="#666">Assembling Machine 1/2</text>
  <line x1="400" y1="332" x2="440" y2="332" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="440,327 450,332 440,337" fill="#7f8c8d"/>

  <!-- ===== Row 3: Ingredient C - Walls ===== -->
  <rect x="240" y="440" width="160" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="320" y="467" text-anchor="middle" font-size="17" fill="#ddd">Stone Wall</text>
  <text x="320" y="491" text-anchor="middle" font-size="15" fill="#888">5 Stone Brick per 1 Wall</text>
  <line x1="400" y1="467" x2="440" y2="467" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="440,462 450,467 440,472" fill="#7f8c8d"/>

  <!-- ===== Military Science Assembler ===== -->
  <rect x="455" y="140" width="210" height="300" rx="8" fill="#2a2a2a" stroke="#7f8c8d" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="560" y="175" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">Military Science</text>
  <text x="560" y="205" text-anchor="middle" font-size="17" fill="#7f8c8d">Assembling Machine 2</text>
  <text x="560" y="242" text-anchor="middle" font-size="16" fill="#ddd">Input per craft:</text>
  <text x="560" y="270" text-anchor="middle" font-size="16" fill="#888">1 Piercing Round Magazine</text>
  <text x="560" y="296" text-anchor="middle" font-size="16" fill="#888">1 Grenade</text>
  <text x="560" y="322" text-anchor="middle" font-size="16" fill="#888">1 Stone Wall</text>
  <text x="560" y="360" text-anchor="middle" font-size="14" fill="#666">Craft time: 10 sec</text>
  <text x="560" y="385" text-anchor="middle" font-size="14" fill="#555">Output: 2 packs per craft</text>
  <text x="560" y="415" text-anchor="middle" font-size="14" fill="#555">(No Space Age output change)</text>

  <!-- Merging arrows -->
  <line x1="450" y1="165" x2="455" y2="300" stroke="#7f8c8d" stroke-width="2.5"/>
  <line x1="450" y1="332" x2="455" y2="310" stroke="#7f8c8d" stroke-width="2.5"/>
  <line x1="450" y1="467" x2="455" y2="330" stroke="#7f8c8d" stroke-width="2.5"/>

  <!-- ===== Output ===== -->
  <line x1="665" y1="290" x2="720" y2="290" stroke="#7f8c8d" stroke-width="2.5"/>
  <polygon points="720,285 730,290 720,295" fill="#7f8c8d"/>

  <rect x="733" y="265" width="120" height="60" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="793" y="295" text-anchor="middle" font-size="16" fill="#999">Labs</text>
  <text x="793" y="318" text-anchor="middle" font-size="14" fill="#666">Military Research</text>

  <!-- ===== Note ===== -->
  <text x="500" y="540" text-anchor="middle" font-size="14" fill="#555">Tip: Military science is cheap -- 1 assembler of each ingredient feeds 5-10 science assemblers</text>
  <text x="500" y="562" text-anchor="middle" font-size="14" fill="#555">Skip military science early if biters are not pressuring your pollution cloud</text>
</svg>