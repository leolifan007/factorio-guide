<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs><marker id="c1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#58a6ff"/></marker><marker id="c2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#f0883e"/></marker><marker id="c3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#3fb950"/></marker></defs>
  <style>.bg{fill:#0d1117}.box{fill:#161b22;stroke-width:2;rx:8}.lbl{font-family:'Segoe UI',sans-serif;font-size:17px;font-weight:bold;fill:#e6edf3}.sub{font-family:'Segoe UI',sans-serif;font-size:13px;fill:#8b949e}.arr{stroke-width:3;fill:none}</style>
  <rect width="900" height="440" class="bg" rx="10"/>
  <text x="450" y="38" text-anchor="middle" style="font-family:'Segoe UI';font-size:22px;font-weight:bold;fill:#e6edf3">Kovarex Enrichment Loop</text>
  <line x1="30" y1="52" x2="870" y2="52" stroke="#21262d"/>

  <!-- Ore Processing -->
  <rect x="50" y="80" width="180" height="85" class="box" stroke="#58a6ff"/><text x="140" y="115" text-anchor="middle" class="lbl">Ore Processing</text><text x="140" y="140" text-anchor="middle" class="sub">Uranium ore → U-238 + U-235</text><text x="140" y="158" text-anchor="middle" style="font-size:11px;fill:#f0883e">(0.7% U-235 chance)</text>

  <!-- Arrow to Kovarex -->
  <line x1="230" y1="122" x2="300" y2="122" class="arr" stroke="#58a6ff" marker-end="url(#c1)"/><text x="265" y="112" text-anchor="middle" style="font-size:11px;fill:#c9d1d9">40 U-238 + 40 U-235</text>

  <!-- Kovarex Centrifuge -->
  <rect x="310" y="75" width="220" height="95" class="box" stroke="#f0883e"/><text x="420" y="108" text-anchor="middle" class="lbl">Kovarex Centrifuge</text><text x="420" y="133" text-anchor="middle" class="sub">Input: 40 U-238 × 2 slots</text><text x="420" y="153" text-anchor="middle" class="sub">Output: 41 U-238 + 1 U-235</text><text x="420" y="165" text-anchor="middle" style="font-size:11px;fill:#3fb950">Cycle: ~60 sec | Net: -40 U-238 → +1 U-235</text>

  <!-- Arrow split -->
  <line x1="530" y1="110" x2="600" y2="110" class="arr" stroke="#3fb950" marker-end="url(#c3)"/><text x="565" y="100" text-anchor="middle" style="font-size:11px;fill:#c9d1d9">+1 U-235</text>
  <line x1="530" y1="145" x2="600" y2="175" class="arr" stroke="#f0883e" marker-end="url(#c2)" stroke-dasharray="5,3"/><text x="575" y="165" text-anchor="middle" style="font-size:11px;fill:#c9d1d9">recycle U-238</text>

  <!-- Fuel Cell -->
  <rect x="610" y="75" width="150" height="70" class="box" stroke="#3fb950"/><text x="685" y="108" text-anchor="middle" class="lbl">Fuel Cell</text><text x="685" y="130" text-anchor="middle" class="sub">10 U-235 + 19 U-238</text>

  <!-- Reactor -->
  <line x1="760" y1="110" x2="800" y2="110" class="arr" stroke="#3fb950" marker-end="url(#c3)"/>
  <rect x="810" y="78" width="75" height="65" class="box" stroke="#da3633"/><text x="847" y="108" text-anchor="middle" class="lbl" style="font-size:14px">Reactor</text><text x="847" y="128" text-anchor="middle" class="sub" style="font-size:11px">1 GW</text>

  <!-- U-238 buffer -->
  <rect x="610" y="160" width="150" height="60" class="box" stroke="#f0883e"/><text x="685" y="188" text-anchor="middle" class="lbl" style="font-size:15px">U-238 Buffer</text><text x="685" y="208" text-anchor="middle" class="sub" style="font-size:11px">Keep 500+ stocked!</text>

  <!-- Bottom: Ratio Card -->
  <rect x="50" y="260" width="800" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="292" text-anchor="middle" style="font-family:'Segoe UI';font-size:18px;font-weight:bold;fill:#e6edf3">The Golden Ratio</text>
  <line x1="70" y1="305" x2="830" y2="305" stroke="#21262d"/>

  <rect x="80" y="320" width="340" height="85" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="250" y="352" text-anchor="middle" style="font-family:'Segoe UI';font-size:24px;font-weight:bold;fill:#f0883e">3 : 1</text>
  <text x="250" y="378" text-anchor="middle" class="sub">Kovarex centrifuges per reactor</text>
  <text x="250" y="395" text-anchor="middle" style="font-size:11px;fill:#8b949e">3 centrifuges = 3 U-235/min = 1 reactor demand</text>

  <rect x="460" y="320" width="360" height="85" rx="6" fill="#0d1117" stroke="#da3633" stroke-width="1.5"/>
  <text x="640" y="352" text-anchor="middle" style="font-family:'Segoe UI';font-size:24px;font-weight:bold;fill:#da3633">40 U-235</text>
  <text x="640" y="378" text-anchor="middle" class="sub">Kickstart requirement</text>
  <text x="640" y="395" text-anchor="middle" style="font-size:11px;fill:#8b949e">Must accumulate from normal processing first (30-60 min)</text>
</svg>