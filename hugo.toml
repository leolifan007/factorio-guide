baseURL = 'https://factorioguides.com/'
# theme disabled - using project layouts/ directly
title = 'Factorio Guide'
publishDir = 'docs'
enableRobotsTXT = true
buildFuture = true
buildDrafts = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
    [markup.goldmark.extensions]
      typographer = false
      linkify = false
      footnote = false
      table = true
      strikethrough = false
      taskList = false
      definitionList = false

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[params]
  description = 'Factorio guide: tips, strategies, and solutions for building your factory.'
  keywords = 'Factorio, guide, tips, walkthrough, strategy, factory, automation'
  steam_url = 'https://store.steampowered.com/app/427520/Factorio/'
  google_analytics = 'G-06QHTM40LG'
  # adsense_client = 'ca-pub-7551387157478980'  # 暂时注销，等 Google AdSense 审核通过后再启用
  show_ads = false  # 关闭文章页广告位，改为 true 即可恢复
