  <rect x="240" y="630" width="220" height="56" rx="6" fill="#1e1e2e" stroke="#bb88ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="460" y1="630" x2="460" y2="686" stroke="#bb88ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="265" y="652" font-size="11" fill="#bb88ee">Calcite, rocket parts</text>
  <text x="265" y="670" font-size="11" fill="#aa8855">Tungsten</text>
