{{- $name := .Get 0 | default "" | lower -}}
{{- $qty := .Get 1 | default "" -}}
{{- $label := $name | humanize | truncate 12 "" -}}
<span class="mat-card">
  {{- with $qty }}<span class="mat-qty">{{ . }}</span>{{ end -}}
  <img src="{{ printf "images/icon/%s.png" $name | relURL }}" alt="{{ $name }}" class="mat-card-img" title="{{ $label }}" loading="lazy">
  <span class="mat-name">{{ $label }}</span>
</span>
