<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <title>Kovarex Enrichment Circuit Control - Factorio Guide</title>
  <defs><filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1000" height="500" fill="#1f1f1f" rx="6"/>
  <line x1="0" y1="65" x2="1000" y2="65" stroke="#333"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#2ecc71">KOVAREX ENRICHMENT - CIRCUIT-CONTROLLED CENTRIFUGE SETUP</text>

  <!-- Centrifuge -->
  <rect x="375" y="100" width="250" height="150" rx="8" fill="#2a2a2a" stroke="#2ecc71" stroke-width="3"/>
  <text x="500" y="132" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">Centrifuge</text>
  <text x="500" y="158" text-anchor="middle" font-size="16" fill="#ddd">Kovarex Enrichment Process</text>
  <text x="500" y="185" text-anchor="middle" font-size="14" fill="#888">40 U-235 + 5 U-238 -> 41 U-235 + 2 U-238</text>
  <text x="500" y="210" text-anchor="middle" font-size="14" fill="#888">Craft time: 60 seconds</text>
  <text x="500" y="238" text-anchor="middle" font-size="13" fill="#666">Output: +1 U-235 net per cycle</text>

  <!-- Input arrows -->
  <rect x="100" y="115" width="160" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="180" y="142" text-anchor="middle" font-size="17" fill="#ddd">Uranium Ore</text>
  <text x="180" y="164" text-anchor="middle" font-size="13" fill="#888">Ore processing input</text>
  <line x1="260" y1="142" x2="375" y2="160" stroke="#555" stroke-width="2.5"/>
  <polygon points="375,156 380,160 373,164" fill="#555"/>

  <rect x="100" y="195" width="160" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="180" y="222" text-anchor="middle" font-size="17" fill="#ddd">Uranium Processing</text>
  <text x="180" y="244" text-anchor="middle" font-size="13" fill="#888">Thermal or centrifuge processing</text>
  <line x1="260" y1="215" x2="375" y2="200" stroke="#555" stroke-width="2.5"/>
  <polygon points="375,196 380,200 373,204" fill="#555"/>

  <!-- Output arrows -->
  <line x1="625" y1="140" x2="680" y2="140" stroke="#2ecc71" stroke-width="2.5"/>
  <polygon points="680,135 690,140 680,145" fill="#2ecc71"/>

  <rect x="693" y="110" width="180" height="60" rx="5" fill="#2a2a2a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="783" y="138" text-anchor="middle" font-size="17" fill="#ddd">U-235 Output</text>
  <text x="783" y="162" text-anchor="middle" font-size="14" fill="#888">Nuclear fuel + Atomic bombs</text>

  <line x1="625" y1="200" x2="680" y2="200" stroke="#555" stroke-width="2.5"/>
  <polygon points="680,195 690,200 680,205" fill="#555"/>

  <rect x="693" y="170" width="180" height="60" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="783" y="198" text-anchor="middle" font-size="17" fill="#ddd">U-238 Output</text>
  <text x="783" y="222" text-anchor="middle" font-size="14" fill="#888">Recycled back to input</text>

  <!-- Circuit connection -->
  <line x1="500" y1="250" x2="500" y2="300" stroke="#3778c8" stroke-width="2"/>
  <polygon points="497,300 500,308 503,300" fill="#3778c8"/>

  <rect x="380" y="305" width="240" height="70" rx="6" fill="#1a1a2a" stroke="#3778c8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="500" y="330" text-anchor="middle" font-size="15" fill="#3778c8" font-weight="bold">CIRCUIT CONTROL (Optional)</text>
  <text x="500" y="352" text-anchor="middle" font-size="14" fill="#888">Read centrifuge: signal U-235/U-238</text>
  <text x="500" y="370" text-anchor="middle" font-size="14" fill="#888">Enable inserter when U-235 &gt; 40</text>

  <!-- Priority inserters -->
  <rect x="100" y="310" width="160" height="55" rx="5" fill="#2a2a2a" stroke="#3778c8" stroke-width="1.5"/>
  <text x="180" y="336" text-anchor="middle" font-size="14" fill="#3778c8">Priority Inserter</text>
  <text x="180" y="358" text-anchor="middle" font-size="13" fill="#888">Circuit-conditioned</text>
  <line x1="260" y1="335" x2="380" y2="340" stroke="#3778c8" stroke-width="1.5"/>
  <polygon points="380,336 386,340 379,344" fill="#3778c8"/>

  <!-- Tips -->
  <text x="500" y="430" text-anchor="middle" font-size="14" fill="#555">Tip: Run 3 centrifuges in parallel for steady U-235 output. One centrifuge produces ~1 U-235 per minute.</text>
  <text x="500" y="455" text-anchor="middle" font-size="14" fill="#555">Buffer at least 80 U-235 before building fuel cells -- nuclear power is thirsty!</text>
  <text x="500" y="480" text-anchor="middle" font-size="14" fill="#555">Productivity modules in the centrifuge do NOT affect U-235 output. Speed modules are the better choice.</text>
</svg>