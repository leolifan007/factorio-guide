<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500" style="background:#1a1a2e;border-radius:8px;font-family:'Segoe UI',sans-serif">
  <title>Fulgora Scrap Overflow Priority Sorter</title>

  <!-- Title Bar -->
  <rect x="0" y="0" width="760" height="42" fill="#16213e" rx="8"/>
  <rect x="0" y="36" width="760" height="6" fill="#16213e"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#e8941c">FULGORA SCRAP OVERFLOW — PRIORITY SORTER STATION</text>

  <!-- Legend -->
  <rect x="20" y="52" width="120" height="18" rx="3" fill="#2a2a4a"/>
  <rect x="24" y="56" width="10" height="10" rx="2" fill="#e8941c"/>
  <text x="38" y="64" font-size="11" fill="#aaa">Item on belt</text>
  <line x1="150" y1="61" x2="185" y2="61" stroke="#e8941c" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="189" y="64" font-size="11" fill="#aaa">Overflow path</text>

  <!-- Scrap Recyclers Row (top) -->
  <text x="25" y="88" font-size="12" fill="#e8941c" font-weight="bold">SCRAP RECYCLERS</text>

  <!-- 5 recyclers in a row -->
  <g>
    <rect x="20" y="94" width="60" height="36" rx="4" fill="#2a2a4a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="50" y="110" text-anchor="middle" font-size="9" fill="#e8941c" font-weight="bold">Recycler</text>
    <text x="50" y="122" text-anchor="middle" font-size="8" fill="#888">×1</text>
  </g>
  <g>
    <rect x="92" y="94" width="60" height="36" rx="4" fill="#2a2a4a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="122" y="110" text-anchor="middle" font-size="9" fill="#e8941c" font-weight="bold">Recycler</text>
    <text x="122" y="122" text-anchor="middle" font-size="8" fill="#888">×2</text>
  </g>
  <g>
    <rect x="164" y="94" width="60" height="36" rx="4" fill="#2a2a4a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="194" y="110" text-anchor="middle" font-size="9" fill="#e8941c" font-weight="bold">Recycler</text>
    <text x="194" y="122" text-anchor="middle" font-size="8" fill="#888">×3</text>
  </g>
  <g>
    <rect x="236" y="94" width="60" height="36" rx="4" fill="#2a2a4a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="266" y="110" text-anchor="middle" font-size="9" fill="#e8941c" font-weight="bold">Recycler</text>
    <text x="266" y="122" text-anchor="middle" font-size="8" fill="#888">×4</text>
  </g>
  <g>
    <rect x="308" y="94" width="60" height="36" rx="4" fill="#2a2a4a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="338" y="110" text-anchor="middle" font-size="9" fill="#e8941c" font-weight="bold">Recycler</text>
    <text x="338" y="122" text-anchor="middle" font-size="8" fill="#888">×5</text>
  </g>

  <!-- Down arrow from recyclers -->
  <line x1="50" y1="130" x2="50" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="45,145 50,152 55,145" fill="#555"/>
  <line x1="122" y1="130" x2="122" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="117,145 122,152 127,145" fill="#555"/>
  <line x1="194" y1="130" x2="194" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="189,145 194,152 199,145" fill="#555"/>
  <line x1="266" y1="130" x2="266" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="261,145 266,152 271,145" fill="#555"/>
  <line x1="338" y1="130" x2="338" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="333,145 338,152 343,145" fill="#555"/>

  <!-- Sushi Belt (main) -->
  <rect x="18" y="152" width="388" height="22" rx="3" fill="#3a2a1a" stroke="#e8941c" stroke-width="1.5"/>
  <text x="212" y="166" text-anchor="middle" font-size="10" fill="#e8941c" font-weight="bold">SUSHI BELT — Mixed scrap output flows right</text>

  <!-- Item icons on sushi belt -->
  <circle cx="40" cy="163" r="7" fill="#4a4a6a" stroke="#888" stroke-width="1"/>
  <text x="40" y="166" text-anchor="middle" font-size="6" fill="#fff">⚙</text>
  <circle cx="60" cy="163" r="7" fill="#3a5a7a" stroke="#888" stroke-width="1"/>
  <text x="60" y="166" text-anchor="middle" font-size="6" fill="#fff">❄</text>
  <circle cx="80" cy="163" r="7" fill="#5a5a5a" stroke="#888" stroke-width="1"/>
  <text x="80" y="166" text-anchor="middle" font-size="6" fill="#fff">▣</text>
  <circle cx="100" cy="163" r="7" fill="#5a4a3a" stroke="#888" stroke-width="1"/>
  <text x="100" y="166" text-anchor="middle" font-size="6" fill="#fff">◇</text>
  <circle cx="120" cy="163" r="7" fill="#5a5a4a" stroke="#888" stroke-width="1"/>
  <text x="120" y="166" text-anchor="middle" font-size="6" fill="#fff">⬡</text>
  <circle cx="140" cy="163" r="7" fill="#5a3a3a" stroke="#888" stroke-width="1"/>
  <text x="140" y="166" text-anchor="middle" font-size="6" fill="#fff">■</text>
  <circle cx="160" cy="163" r="7" fill="#3a5a5a" stroke="#888" stroke-width="1"/>
  <text x="160" y="166" text-anchor="middle" font-size="6" fill="#fff">⏣</text>

  <!-- ===== FILTER SPLITTER TREE ===== -->

  <!-- Splitter 1: Holmium Ore -->
  <rect x="18" y="180" width="388" height="2" fill="#e8941c"/>
  <g>
    <rect x="20" y="188" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="199" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S1</text>
    <text x="52" y="200" fill="#fff" font-size="10">Holmium Ore</text>
    <polygon points="20,196 8,192 8,200" fill="#e8941c"/>
  </g>
  <text x="390" y="200" font-size="9" fill="#6abe30">→ Holmium Processing</text>

  <rect x="18" y="212" width="388" height="2" fill="#e8941c"/>

  <!-- Splitter 2: Blue Circuits -->
  <g>
    <rect x="20" y="220" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="231" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S2</text>
    <text x="52" y="232" fill="#fff" font-size="10">Blue Circuits</text>
    <polygon points="20,228 8,224 8,232" fill="#e8941c"/>
  </g>
  <text x="390" y="232" font-size="9" fill="#6abe30">→ Chest Buffer → Science</text>

  <rect x="18" y="244" width="388" height="2" fill="#e8941c"/>

  <!-- Splitter 3: Batteries -->
  <g>
    <rect x="20" y="252" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="263" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S3</text>
    <text x="52" y="264" fill="#fff" font-size="10">Batteries</text>
    <polygon points="20,260 8,256 8,264" fill="#e8941c"/>
  </g>
  <text x="390" y="264" font-size="9" fill="#6abe30">→ Chest Buffer → Accumulators</text>

  <rect x="18" y="276" width="388" height="2" fill="#e8941c"/>

  <!-- Splitter 4: Steel Plate -->
  <g>
    <rect x="20" y="284" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="295" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S4</text>
    <text x="52" y="296" fill="#fff" font-size="10">Steel Plate</text>
    <polygon points="20,292 8,288 8,296" fill="#e8941c"/>
  </g>
  <text x="390" y="296" font-size="9" fill="#6abe30">→ Chest Buffer → Mall</text>

  <rect x="18" y="308" width="388" height="2" fill="#e8941c"/>

  <!-- Splitter 5: Copper Plate -->
  <g>
    <rect x="20" y="316" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="327" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S5</text>
    <text x="52" y="328" fill="#fff" font-size="10">Copper Plate</text>
    <polygon points="20,324 8,320 8,328" fill="#e8941c"/>
  </g>
  <text x="390" y="328" font-size="9" fill="#6abe30">→ Chest Buffer → Mall</text>

  <rect x="18" y="340" width="388" height="2" fill="#e8941c"/>

  <!-- Splitter 6: Iron Plate -->
  <g>
    <rect x="20" y="348" width="28" height="16" rx="3" fill="#3a1a1a" stroke="#e8941c" stroke-width="1.5"/>
    <text x="34" y="359" text-anchor="middle" font-size="8" fill="#e8941c" font-weight="bold">S6</text>
    <text x="52" y="360" fill="#fff" font-size="10">Iron Plate</text>
    <polygon points="20,356 8,352 8,360" fill="#e8941c"/>
  </g>
  <text x="390" y="360" font-size="9" fill="#6abe30">→ Chest Buffer → Mall</text>

  <rect x="18" y="372" width="388" height="2" fill="#e8941c"/>

  <!-- ===== TO VOID RECYCLER LOOP ===== -->

  <!-- Remaining items go to void -->
  <rect x="18" y="380" width="388" height="22" rx="3" fill="#3a1a1a" stroke="#c0392b" stroke-width="1.5"/>
  <text x="212" y="394" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">EXCESS TO VOID — Gears, Concrete, Stone, Ice, Solid Fuel</text>

  <!-- Arrow to void recycler loop -->
  <line x1="212" y1="402" x2="212" y2="420" stroke="#c0392b" stroke-width="2"/>
  <polygon points="207,417 212,424 217,417" fill="#c0392b"/>

  <!-- Void Recycler Loop -->
  <text x="25" y="445" font-size="12" fill="#c0392b" font-weight="bold">VOID RECYCLER CHAIN</text>

  <g>
    <rect x="20" y="450" width="60" height="32" rx="4" fill="#3a1a1a" stroke="#c0392b" stroke-width="1.5"/>
    <text x="50" y="465" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Recycler</text>
    <text x="50" y="476" text-anchor="middle" font-size="7" fill="#888">75% void</text>
  </g>
  <line x1="80" y1="466" x2="108" y2="466" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="105,462 112,466 105,470" fill="#c0392b"/>
  <g>
    <rect x="112" y="450" width="60" height="32" rx="4" fill="#3a1a1a" stroke="#c0392b" stroke-width="1.5"/>
    <text x="142" y="465" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Recycler</text>
    <text x="142" y="476" text-anchor="middle" font-size="7" fill="#888">93.75%</text>
  </g>
  <line x1="172" y1="466" x2="200" y2="466" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="197,462 204,466 197,470" fill="#c0392b"/>
  <g>
    <rect x="204" y="450" width="60" height="32" rx="4" fill="#3a1a1a" stroke="#c0392b" stroke-width="1.5"/>
    <text x="234" y="465" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Recycler</text>
    <text x="234" y="476" text-anchor="middle" font-size="7" fill="#888">98.4%</text>
  </g>
  <line x1="264" y1="466" x2="292" y2="466" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="289,462 296,466 289,470" fill="#c0392b"/>
  <g>
    <rect x="296" y="450" width="60" height="32" rx="4" fill="#3a1a1a" stroke="#c0392b" stroke-width="1.5"/>
    <text x="326" y="465" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Recycler</text>
    <text x="326" y="476" text-anchor="middle" font-size="7" fill="#888">99.6%</text>
  </g>

  <!-- Return arrow from void loop back to start -->
  <path d="M356,466 Q380,466 380,420 Q380,380 212,380" stroke="#e8941c" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <polygon points="214,376 210,383 218,383" fill="#e8941c"/>
  <text x="390" y="430" font-size="8" fill="#888">Return (2-5% of excess)</text>
</svg>
