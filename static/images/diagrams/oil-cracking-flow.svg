<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="100%" height="auto" style="background:#151515;font-family:system-ui,-apple-system,sans-serif">
  <title>Oil Cracking Flow — 8:1:7 Ratio Diagram</title>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr-down" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 Z" fill="#888"/></marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="48" fill="#1f1f1f" rx="6"/>
  <rect x="0" y="42" width="1000" height="6" fill="#1f1f1f"/>
  <text x="500" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#e8941c" filter="url(#glow)">OIL PROCESSING — 8 : 1 : 7 Cracking Ratio</text>

  <!-- ===== ROW 1: REFINERY INPUT ===== -->
  <rect x="15" y="60" width="970" height="130" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="500" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#ccc">STEP 1: OIL REFINERIES — 8 Units</text>

  <!-- 8 refinery blocks in a row -->
  <rect x="30" y="95" width="108" height="48" rx="4" fill="#2a2a1a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="84" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Refinery</text>
  <text x="84" y="132" text-anchor="middle" font-size="16" fill="#999">× 1–2</text>

  <rect x="148" y="95" width="108" height="48" rx="4" fill="#2a2a1a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="202" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Refinery</text>
  <text x="202" y="132" text-anchor="middle" font-size="16" fill="#999">× 3–4</text>

  <rect x="266" y="95" width="108" height="48" rx="4" fill="#2a2a1a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="320" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Refinery</text>
  <text x="320" y="132" text-anchor="middle" font-size="16" fill="#999">× 5–6</text>

  <rect x="384" y="95" width="108" height="48" rx="4" fill="#2a2a1a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="438" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Refinery</text>
  <text x="438" y="132" text-anchor="middle" font-size="16" fill="#999">× 7–8</text>

  <!-- Output summary from 8 refineries -->
  <rect x="520" y="90" width="450" height="58" rx="5" fill="#0a1f0a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="745" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Total Output per Cycle (5s)</text>
  <text x="585" y="134" text-anchor="middle" font-size="16" fill="#8b4513">■ Heavy: 400</text>
  <text x="745" y="134" text-anchor="middle" font-size="16" fill="#d4a017">■ Light: 400</text>
  <text x="905" y="134" text-anchor="middle" font-size="16" fill="#5599ee">■ Petro: 240</text>

  <!-- ===== ROW 2: THREE OUTPUT STREAMS + CRACKERS ===== -->
  <rect x="15" y="200" width="970" height="200" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="500" y="222" text-anchor="middle" font-size="16" font-weight="700" fill="#ccc">STEP 2: CRACKING — Controlled Conversion</text>

  <!-- Heavy Oil Column -->
  <rect x="30" y="235" width="295" height="150" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="2"/>
  <rect x="30" y="235" width="295" height="30" rx="5" fill="#8b4513"/>
  <rect x="30" y="257" width="295" height="8" fill="#8b4513"/>
  <text x="177" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Heavy Oil (400/s)</text>

  <text x="177" y="280" text-anchor="middle" font-size="16" fill="#d4a017">Priority: Lubricant Production</text>
  <text x="177" y="300" text-anchor="middle" font-size="16" fill="#888">Excess → 1× H→L Cracker</text>

  <rect x="80" y="315" width="200" height="55" rx="4" fill="#2a1a0a" stroke="#d4a017" stroke-width="1.5"/>
  <text x="180" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">H→L Cracker × 1</text>
  <text x="180" y="355" text-anchor="middle" font-size="16" fill="#999">40 Heavy → 30 Light (2s)</text>

  <!-- Arrow from Heavy to Cracker -->
  <line x1="177" y1="305" x2="177" y2="313" stroke="#8b4513" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Light Oil Column -->
  <rect x="352" y="235" width="295" height="150" rx="5" fill="#1a1a00" stroke="#d4a017" stroke-width="2"/>
  <rect x="352" y="235" width="295" height="30" rx="5" fill="#d4a017"/>
  <rect x="352" y="257" width="295" height="8" fill="#d4a017"/>
  <text x="500" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Light Oil (400/s)</text>

  <text x="500" y="280" text-anchor="middle" font-size="16" fill="#f0c040">Priority: Solid / Rocket Fuel</text>
  <text x="500" y="300" text-anchor="middle" font-size="16" fill="#888">Excess → 7× L→P Crackers</text>

  <rect x="395" y="315" width="210" height="55" rx="4" fill="#2a2a00" stroke="#d4a017" stroke-width="1.5"/>
  <text x="500" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c040">L→P Cracker × 7</text>
  <text x="500" y="355" text-anchor="middle" font-size="16" fill="#999">30 Light → 20 Petro (2s) each</text>

  <line x1="500" y1="305" x2="500" y2="313" stroke="#d4a017" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Petroleum Column -->
  <rect x="674" y="235" width="295" height="150" rx="5" fill="#000d1a" stroke="#5599ee" stroke-width="2"/>
  <rect x="674" y="235" width="295" height="30" rx="5" fill="#5599ee"/>
  <rect x="674" y="257" width="295" height="8" fill="#5599ee"/>
  <text x="822" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Petroleum Gas (240/s + 85/s)</text>

  <text x="822" y="280" text-anchor="middle" font-size="16" fill="#88bbff">From refining: 240/s baseline</text>
  <text x="822" y="300" text-anchor="middle" font-size="16" fill="#88bbff">From cracking: +85/s (15 + 70)</text>

  <rect x="720" y="315" width="200" height="55" rx="4" fill="#001a2a" stroke="#5599ee" stroke-width="1.5"/>
  <text x="820" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#88bbff">Total Petro Output</text>
  <text x="820" y="355" text-anchor="middle" font-size="16" fill="#999">≈ 325/s at full cracking</text>

  <!-- Cross-column arrow: H→L feeds Light -->
  <line x1="295" y1="345" x2="352" y2="345" stroke="#8b4513" stroke-width="2.5" opacity="0.6"/>
  <polygon points="345,341 355,345 345,349" fill="#8b4513" opacity="0.6"/>

  <!-- Cross-column arrow: L→P feeds Petro -->
  <line x1="605" y1="345" x2="674" y2="345" stroke="#d4a017" stroke-width="2.5" opacity="0.6"/>
  <polygon points="667,341 677,345 667,349" fill="#d4a017" opacity="0.6"/>

  <!-- ===== ROW 3: FINAL PRODUCTION ===== -->
  <rect x="15" y="410" width="970" height="135" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="500" y="432" text-anchor="middle" font-size="16" font-weight="700" fill="#ccc">STEP 3: FINAL PRODUCTS</text>

  <!-- Plastic -->
  <rect x="30" y="448" width="227" height="85" rx="5" fill="#0a1f0a" stroke="#5599ee" stroke-width="1.5"/>
  <rect x="30" y="448" width="227" height="26" rx="5" fill="#5599ee"/>
  <rect x="30" y="466" width="227" height="8" fill="#5599ee"/>
  <text x="143" y="468" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Plastic Bars</text>
  <text x="143" y="494" text-anchor="middle" font-size="16" fill="#88bbff">20 Petro + 1 Coal = 2 Plastic</text>
  <text x="143" y="514" text-anchor="middle" font-size="16" fill="#777">Feeds → Red Circuits</text>

  <!-- Sulfur -->
  <rect x="272" y="448" width="227" height="85" rx="5" fill="#0a1f0a" stroke="#5599ee" stroke-width="1.5"/>
  <rect x="272" y="448" width="227" height="26" rx="5" fill="#5599ee"/>
  <rect x="272" y="466" width="227" height="8" fill="#5599ee"/>
  <text x="385" y="468" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Sulfur</text>
  <text x="385" y="494" text-anchor="middle" font-size="16" fill="#88bbff">30 Petro + 30 Water = 2 Sulfur</text>
  <text x="385" y="514" text-anchor="middle" font-size="16" fill="#777">Feeds → Sulfuric Acid</text>

  <!-- Solid Fuel -->
  <rect x="514" y="448" width="227" height="85" rx="5" fill="#1a1a00" stroke="#d4a017" stroke-width="1.5"/>
  <rect x="514" y="448" width="227" height="26" rx="5" fill="#d4a017"/>
  <rect x="514" y="466" width="227" height="8" fill="#d4a017"/>
  <text x="627" y="468" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Solid / Rocket Fuel</text>
  <text x="627" y="494" text-anchor="middle" font-size="16" fill="#f0c040">From excess Light Oil</text>
  <text x="627" y="514" text-anchor="middle" font-size="16" fill="#777">Feeds → Rocket Launch</text>

  <!-- Lubricant -->
  <rect x="756" y="448" width="215" height="85" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="1.5"/>
  <rect x="756" y="448" width="215" height="26" rx="5" fill="#8b4513"/>
  <rect x="756" y="466" width="215" height="8" fill="#8b4513"/>
  <text x="863" y="468" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Lubricant</text>
  <text x="863" y="494" text-anchor="middle" font-size="16" fill="#d4a017">1 Heavy = 1 Lubricant</text>
  <text x="863" y="514" text-anchor="middle" font-size="16" fill="#777">Feeds → Electric Engines</text>
</svg>
