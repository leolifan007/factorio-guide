<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <title>Aquilo Survival Checklist - Factorio Space Age Guide</title>
  <defs><filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1000" height="480" fill="#1f1f1f" rx="6"/>
  <line x1="0" y1="65" x2="1000" y2="65" stroke="#333"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#3498db">AQUILO - COLD SURVIVAL ESSENTIALS CHECKLIST</text>

  <!-- ===== Column 1: Essentials ===== -->
  <rect x="30" y="90" width="440" height="155" rx="6" fill="#1a1a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="250" y="118" text-anchor="middle" font-size="17" fill="#3498db" font-weight="bold">WHAT TO BRING</text>

  <rect x="45" y="135" width="195" height="50" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="142" y="158" text-anchor="middle" font-size="15" fill="#ddd">Heating Towers + Fuel</text>
  <text x="142" y="178" text-anchor="middle" font-size="13" fill="#888">Without heat, buildings freeze</text>

  <rect x="255" y="135" width="200" height="50" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="355" y="158" text-anchor="middle" font-size="15" fill="#ddd">Ice Platforms</text>
  <text x="355" y="178" text-anchor="middle" font-size="13" fill="#888">Walk on ice/frozen water</text>

  <rect x="45" y="190" width="195" height="48" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="142" y="212" text-anchor="middle" font-size="15" fill="#ddd">Rocket Turrets + Ammo</text>
  <text x="142" y="230" text-anchor="middle" font-size="13" fill="#888">Strafers need rocket fire</text>

  <rect x="255" y="190" width="200" height="48" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="355" y="212" text-anchor="middle" font-size="15" fill="#ddd">Energy Weapons / Laser Turrets</text>
  <text x="355" y="230" text-anchor="middle" font-size="13" fill="#888">Free ammo, limited by power</text>

  <!-- ===== Column 2: Threats ===== -->
  <rect x="530" y="90" width="440" height="155" rx="6" fill="#2a1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="750" y="118" text-anchor="middle" font-size="17" fill="#e74c3c" font-weight="bold">THREATS ON AQUILO</text>

  <rect x="545" y="135" width="195" height="50" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="642" y="158" text-anchor="middle" font-size="15" fill="#ddd">Freezing Temps (-80 C)</text>
  <text x="642" y="178" text-anchor="middle" font-size="13" fill="#888">All buildings need heat pipes</text>

  <rect x="755" y="135" width="200" height="50" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="855" y="158" text-anchor="middle" font-size="15" fill="#ddd">Strafers (Flying Biters)</text>
  <text x="855" y="178" text-anchor="middle" font-size="13" fill="#888">Fast, ignore walls</text>

  <rect x="545" y="190" width="195" height="48" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="642" y="212" text-anchor="middle" font-size="15" fill="#ddd">Ice & Frozen Water</text>
  <text x="642" y="230" text-anchor="middle" font-size="13" fill="#888">No building on ice without</text>
  <text x="642" y="245" text-anchor="middle" font-size="11" fill="#666">foundations</text>

  <rect x="755" y="190" width="200" height="48" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="855" y="212" text-anchor="middle" font-size="15" fill="#ddd">Limited Space</text>
  <text x="855" y="230" text-anchor="middle" font-size="13" fill="#888">Buildable terrain is scarce</text>
  <text x="855" y="245" text-anchor="middle" font-size="11" fill="#666">on small islands</text>

  <!-- ===== Row 2: Build Order ===== -->
  <text x="500" y="285" text-anchor="middle" font-size="16" fill="#555">--- AQUILO BUILD ORDER ---</text>

  <rect x="40" y="305" width="170" height="75" rx="5" fill="#2a2a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="125" y="330" text-anchor="middle" font-size="15" fill="#3498db" font-weight="bold">1. HEAT PIPE GRID</text>
  <text x="125" y="352" text-anchor="middle" font-size="13" fill="#888">Heating tower + kerosene</text>
  <text x="125" y="370" text-anchor="middle" font-size="13" fill="#888">power to all buildings</text>

  <line x1="210" y1="340" x2="245" y2="340" stroke="#3498db" stroke-width="2"/>
  <polygon points="245,335 255,340 245,345" fill="#3498db"/>

  <rect x="260" y="305" width="170" height="75" rx="5" fill="#2a2a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="345" y="330" text-anchor="middle" font-size="15" fill="#3498db" font-weight="bold">2. ENERGY SETUP</text>
  <text x="345" y="352" text-anchor="middle" font-size="13" fill="#888">Heating towers power engines</text>
  <text x="345" y="370" text-anchor="middle" font-size="13" fill="#888">Import rocket fuel for fuel</text>

  <line x1="430" y1="340" x2="465" y2="340" stroke="#3498db" stroke-width="2"/>
  <polygon points="465,335 475,340 465,345" fill="#3498db"/>

  <rect x="480" y="305" width="170" height="75" rx="5" fill="#2a2a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="565" y="330" text-anchor="middle" font-size="15" fill="#3498db" font-weight="bold">3. DEFENSE</text>
  <text x="565" y="352" text-anchor="middle" font-size="13" fill="#888">Rocket turrets around base</text>
  <text x="565" y="370" text-anchor="middle" font-size="13" fill="#888">Laser turrets for backup</text>

  <line x1="650" y1="340" x2="685" y2="340" stroke="#3498db" stroke-width="2"/>
  <polygon points="685,335 695,340 685,345" fill="#3498db"/>

  <rect x="700" y="305" width="170" height="75" rx="5" fill="#2a2a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="785" y="330" text-anchor="middle" font-size="15" fill="#3498db" font-weight="bold">4. SCIENCE</text>
  <text x="785" y="352" text-anchor="middle" font-size="13" fill="#888">Aquilo science pack</text>
  <text x="785" y="370" text-anchor="middle" font-size="13" fill="#888">Research cryogenics tech</text>

  <!-- Tips -->
  <text x="500" y="425" text-anchor="middle" font-size="14" fill="#555">Tip: Aquilo has no iron, copper, oil, or coal. You must import everything via rocket or space platform.</text>
  <text x="500" y="450" text-anchor="middle" font-size="14" fill="#555">Laser turrets are viable because freezing reduces biter speed but not turret damage.</text>
  <text x="500" y="475" text-anchor="middle" font-size="14" fill="#555">Plan your base on a single island. Expand by bridging with ice platforms.</text>
</svg>