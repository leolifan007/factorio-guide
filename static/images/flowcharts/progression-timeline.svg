  <text x="220" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Blue Science</text>

  <rect x="285" y="235" width="100" height="75" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
