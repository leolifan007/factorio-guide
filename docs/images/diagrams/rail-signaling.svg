<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <title>Rail Signaling — Factorio Guide</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#e8941c"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="48" fill="#1f1f1f" rx="8"/>
  <rect x="0" y="42" width="900" height="6" fill="#1f1f1f"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#e8941c">RAIL SIGNAL RULES — CHAIN BEFORE, RAIL AFTER</text>

  <!-- ===== LEFT PANEL: T-Junction ===== -->
  <rect x="10" y="60" width="435" height="290" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="228" y="82" text-anchor="middle" font-size="15" fill="#888" font-weight="bold">T-JUNCTION SIGNALING</text>

  <!-- Horizontal rail -->
  <line x1="20" y1="175" x2="370" y2="175" stroke="#555" stroke-width="3"/>
  <line x1="20" y1="190" x2="370" y2="190" stroke="#555" stroke-width="3"/>
  <!-- Vertical rail -->
  <line x1="280" y1="100" x2="280" y2="350" stroke="#555" stroke-width="3"/>
  <line x1="265" y1="100" x2="265" y2="350" stroke="#555" stroke-width="3"/>

  <!-- Chain signals (before junction) -->
  <rect x="150" y="155" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="158" y="169" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <line x1="158" y1="175" x2="158" y2="160" stroke="#e8941c" stroke-width="1"/>
  <text x="158" y="148" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬆ Chain</text>

  <rect x="290" y="155" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="298" y="169" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <line x1="298" y1="175" x2="298" y2="160" stroke="#e8941c" stroke-width="1"/>
  <text x="298" y="148" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬆ Chain</text>

  <!-- Rail signals (after junction) -->
  <rect x="150" y="192" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="158" y="206" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>
  <line x1="158" y1="192" x2="158" y2="208" stroke="#6abe30" stroke-width="1"/>
  <text x="158" y="220" text-anchor="middle" font-size="15" fill="#6abe30" font-weight="bold">⬇ Rail</text>

  <rect x="290" y="192" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="298" y="206" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>
  <line x1="298" y1="192" x2="298" y2="208" stroke="#6abe30" stroke-width="1"/>
  <text x="298" y="220" text-anchor="middle" font-size="15" fill="#6abe30" font-weight="bold">⬇ Rail</text>

  <!-- Train -->
  <rect x="40" y="168" width="40" height="24" rx="3" fill="#3a2a1a" stroke="#e8941c" stroke-width="1.5"/>
  <text x="60" y="183" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">Train</text>
  <line x1="80" y1="182" x2="110" y2="182" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <polygon points="110,180 118,182 110,184" fill="#888"/>

  <!-- Arrow on rail -->
  <polygon points="180,178 190,175 190,181" fill="#555"/>
  <polygon points="245,178 255,175 255,181" fill="#555"/>

  <!-- ===== RIGHT PANEL: 4-Way Intersection ===== -->
  <rect x="455" y="60" width="435" height="290" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="672" y="82" text-anchor="middle" font-size="15" fill="#888" font-weight="bold">4-WAY CROSSING SIGNALING</text>

  <!-- Horizontal rail -->
  <line x1="465" y1="140" x2="840" y2="140" stroke="#555" stroke-width="3"/>
  <line x1="465" y1="155" x2="840" y2="155" stroke="#555" stroke-width="3"/>
  <line x1="465" y1="230" x2="840" y2="230" stroke="#555" stroke-width="3"/>
  <line x1="465" y1="245" x2="840" y2="245" stroke="#555" stroke-width="3"/>
  <!-- Vertical rail -->
  <line x1="650" y1="65" x2="650" y2="350" stroke="#555" stroke-width="3"/>
  <line x1="635" y1="65" x2="635" y2="350" stroke="#555" stroke-width="3"/>

  <!-- Chain signals (all entrances) -->
  <rect x="590" y="120" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="598" y="134" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <text x="598" y="115" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬆</text>

  <rect x="700" y="120" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="708" y="134" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <text x="708" y="115" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬆</text>

  <rect x="590" y="250" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="598" y="264" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <text x="598" y="272" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬇</text>

  <rect x="700" y="250" width="16" height="20" rx="2" fill="#e8941c" stroke="#fff" stroke-width="1.5"/>
  <text x="708" y="264" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <text x="708" y="272" text-anchor="middle" font-size="15" fill="#e8941c" font-weight="bold">⬇</text>

  <!-- Rail signals (all exits) -->
  <rect x="530" y="220" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="538" y="234" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>

  <rect x="530" y="145" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="538" y="159" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>

  <rect x="776" y="220" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="784" y="234" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>

  <rect x="776" y="145" width="16" height="20" rx="2" fill="#6abe30" stroke="#fff" stroke-width="1.5"/>
  <text x="784" y="159" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>

  <!-- ===== BOTTOM: RULE EXPLANATION ===== -->
  <rect x="10" y="365" width="880" height="145" rx="8" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" font-size="15" font-weight="700" fill="#ccc">GOLDEN RULE</text>

  <rect x="25" y="405" width="420" height="90" rx="6" fill="#1a1f1a" stroke="#3a6a3a" stroke-width="1.5"/>
  <circle cx="50" cy="430" r="12" fill="#6abe30"/>
  <text x="50" y="435" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">C</text>
  <text x="72" y="433" font-size="15" fill="#ccc" font-weight="bold">Chain Signal BEFORE</text>
  <text x="42" y="455" font-size="15" fill="#999" text-anchor="middle">Place chain signal at every intersection</text>
  <text x="42" y="471" font-size="15" fill="#999" text-anchor="middle">entrance. Train only enters if it can</text>
  <text x="42" y="487" font-size="15" fill="#999" text-anchor="middle">clear the entire intersection.</text>

  <rect x="460" y="405" width="420" height="90" rx="6" fill="#1f1a1a" stroke="#6a3a3a" stroke-width="1.5"/>
  <circle cx="485" cy="430" r="12" fill="#c9463d"/>
  <text x="485" y="435" text-anchor="middle" font-size="15" fill="#111" font-weight="bold">R</text>
  <text x="507" y="433" font-size="15" fill="#ccc" font-weight="bold">Rail Signal AFTER</text>
  <text x="477" y="455" font-size="15" fill="#999" text-anchor="middle">Place rail signal at every intersection</text>
  <text x="477" y="471" font-size="15" fill="#999" text-anchor="middle">exit. Shows green if the next block</text>
  <text x="477" y="487" font-size="15" fill="#999" text-anchor="middle">is clear after the crossing.</text>
</svg>