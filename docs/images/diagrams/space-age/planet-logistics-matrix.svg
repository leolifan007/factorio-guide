  <text x="265" y="458" font-size="11" fill="#66bbdd">Circuits, fuel, ammo</text>
  <polygon points="240,426 235,431 240,436" fill="#66bbdd"/>

  <!-- === Row 2: Vulcanus → Planet === -->

  <!-- Vulcanus → Nauvis -->
  <rect x="240" y="524" width="220" height="56" rx="6" fill="#1e1e2e" stroke="#88bb88" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="460" y1="524" x2="460" y2="580" stroke="#88bb88" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="265" y="546" font-size="11" fill="#88bb88">Calcite, foundry</text>
  <text x="265" y="564" font-size="11" fill="#aa8855">Big miner, tungsten</text>
  <polygon points="240,532 235,537 240,542" fill="#88bb88" opacity="0.5"/>

