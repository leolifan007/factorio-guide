  <rect x="152" y="90" width="110" height="60" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="2"/>
  <text x="207" y="114" text-anchor="middle" font-size="12" fill="#d4a017">Refinery 2</text>
  <rect x="274" y="90" width="110" height="60" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="2"/>
