  <rect x="620" y="85" width="42" height="137" rx="3" fill="#2277cc" fill-opacity="0.2" stroke="#44aaff"/>
  <text x="640" y="145" text-anchor="middle" font-size="10" fill="#44aaff">H₂O</text>
