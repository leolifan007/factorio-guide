<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="100%" height="auto" style="display:block;margin:0 auto;max-width:1000px;background:#1f1f1f;border-radius:6px;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#888" /></marker>
  </defs>

  
  <rect x="0" y="0" width="1000" height="46" fill="#252525" rx="6" />
  <text x="500" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#ff4400">🔌 CIRCUIT-CONTROLLED CRACKING — Red Wire Condition</text>

  

  
  <rect x="40" y="60" width="100" height="70" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="2" />
  <text x="90" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Heavy</text>
  <text x="90" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Tank</text>
  
  <rect x="55" y="106" width="70" height="14" rx="2" fill="#0a0500" stroke="#8b4513" stroke-width="1" />
  <rect x="56" y="107" width="55" height="12" rx="1" fill="#8b4513" opacity="0.7" />
  <text x="90" y="117" text-anchor="middle" font-size="16" fill="#d4a017">25k / 25k</text>

  
  <line x1="200" y1="85" x2="230" y2="85" stroke="#ff3333" stroke-width="2" stroke-dasharray="6,3" />
  <text x="215" y="78" text-anchor="middle" font-size="16" fill="#ff4444">🔴 Red Wire</text>

  
  <rect x="230" y="65" width="40" height="40" rx="4" fill="#2a1a00" stroke="#d4a017" stroke-width="1.5" />
  <text x="250" y="79" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">⏏</text>
  <text x="250" y="97" text-anchor="middle" font-size="16" fill="#888">Pump</text>

  
  <rect x="225" y="108" width="50" height="18" rx="3" fill="#2a0000" stroke="#ff3333" stroke-width="1" />
  <text x="250" y="121" text-anchor="middle" font-size="16" font-weight="600" fill="#ff4444">Heavy &gt; 20k</text>

  
  <line x1="270" y1="85" x2="295" y2="85" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)" />

  
  <rect x="295" y="60" width="130" height="70" rx="6" fill="#1a0f00" stroke="#d4a017" stroke-width="2" />
  <text x="360" y="84" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Cracker H→L</text>
  <text x="360" y="104" text-anchor="middle" font-size="16" fill="#888">40 Heavy → 30 Light</text>
  <text x="360" y="120" text-anchor="middle" font-size="16" fill="#555">Enabled when Heavy &gt; 20k</text>

  

  
  <rect x="40" y="145" width="100" height="65" rx="5" fill="#1a1a00" stroke="#d4a017" stroke-width="2" />
  <text x="90" y="167" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c040">Light</text>
  <text x="90" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c040">Tank</text>
  <rect x="55" y="193" width="70" height="12" rx="2" fill="#0a0a00" stroke="#d4a017" stroke-width="1" />
  <rect x="56" y="194" width="50" height="10" rx="1" fill="#d4a017" opacity="0.7" />
  <text x="90" y="202" text-anchor="middle" font-size="16" fill="#f0c040">22k / 25k</text>

  
  <line x1="200" y1="170" x2="230" y2="170" stroke="#ff3333" stroke-width="2" stroke-dasharray="6,3" />

  
  <rect x="230" y="150" width="40" height="40" rx="4" fill="#2a1a00" stroke="#d4a017" stroke-width="1.5" />
  <text x="250" y="164" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">⏏</text>
  <text x="250" y="182" text-anchor="middle" font-size="16" fill="#888">Pump</text>

  <rect x="225" y="138" width="50" height="18" rx="3" fill="#2a0000" stroke="#ff3333" stroke-width="1" />
  <text x="250" y="151" text-anchor="middle" font-size="16" font-weight="600" fill="#ff4444">Light &gt; 20k</text>

  
  <line x1="270" y1="170" x2="295" y2="170" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)" />

  
  <rect x="295" y="145" width="130" height="65" rx="6" fill="#1a1a00" stroke="#d4a017" stroke-width="2" />
  <text x="360" y="169" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c040">Cracker L→P</text>
  <text x="360" y="189" text-anchor="middle" font-size="16" fill="#888">30 Light → 20 Petroleum</text>
  <text x="360" y="203" text-anchor="middle" font-size="16" fill="#555">Enabled when Light &gt; 20k</text>

  
  <rect x="470" y="55" width="500" height="160" rx="6" fill="#151515" stroke="#333" stroke-width="1" />

  <text x="720" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#ff4400">Circuit Control Logic</text>

  <line x1="490" y1="90" x2="950" y2="90" stroke="#333" stroke-width="1" />

  
  <rect x="490" y="100" width="460" height="50" rx="4" fill="#1a0f00" stroke="#333" stroke-width="1" />
  <circle cx="510" cy="120" r="5" fill="#8b4513" />
  <text x="525" y="118" font-size="16" fill="#d4a017" font-weight="600">Heavy Oil Control:</text>
  <text x="525" y="138" font-size="16" fill="#888">Red wire from Heavy Tank → Pump. Enable pump when Heavy Oil &gt; 20,000.</text>
  <text x="525" y="145" font-size="16" fill="#666">This ensures lubricant buffer is preserved before cracking kicks in.</text>

  
  <rect x="490" y="155" width="460" height="50" rx="4" fill="#1a1a00" stroke="#333" stroke-width="1" />
  <circle cx="510" cy="175" r="5" fill="#d4a017" />
  <text x="525" y="173" font-size="16" fill="#f0c040" font-weight="600">Light Oil Control:</text>
  <text x="525" y="193" font-size="16" fill="#888">Red wire from Light Tank → Pump. Enable pump when Light Oil &gt; 20,000.</text>
  <text x="525" y="200" font-size="16" fill="#666">Prevents total depletion of light oil needed for solid/rocket fuel.</text>
</svg>