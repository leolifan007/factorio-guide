<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960" height="340">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e8941c"/>
    </marker>
  </defs>
  <rect width="960" height="340" fill="#1f1f1f" rx="6"/>
  <text x="480" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="16" font-weight="900" fill="#e8941c">FACTORIO GAME PROGRESSION TIMELINE</text>

  <!-- Timeline axis -->
  <line x1="40" y1="70" x2="920" y2="70" stroke="#444" stroke-width="2"/>
  <!-- Arrow head -->
  <polygon points="920,66 930,70 920,74" fill="#e8941c"/>

  <!-- Phase 1: cx=80 -->
  <circle cx="80" cy="70" r="8" fill="#e8941c"/>
  <text x="80" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#e8941c">HOUR 1</text>
  <rect x="20" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#e8941c" stroke-width="1"/>
  <text x="80" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#f5aa2e">EARLY GAME</text>
  <text x="80" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Hand crafting</text>
  <text x="80" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">First belts</text>
  <text x="80" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Red + Green science</text>
  <text x="80" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">First automation</text>
  <text x="80" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">Biter-free map</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="70" x2="231" y2="70" stroke="#e8941c" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Phase 2: cx=240 -->
  <circle cx="240" cy="70" r="8" fill="#6abe30"/>
  <text x="240" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#6abe30">HOUR 2-3</text>
  <rect x="180" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#6abe30" stroke-width="1"/>
  <text x="240" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#8ad44a">BASIC FACTORY</text>
  <text x="240" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Main bus layout</text>
  <text x="240" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Blue science</text>
  <text x="240" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Steel production</text>
  <text x="240" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Electric smelting</text>
  <text x="240" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">First defense walls</text>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="70" x2="391" y2="70" stroke="#6abe30" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Phase 3: cx=400 -->
  <circle cx="400" cy="70" r="8" fill="#d7b940"/>
  <text x="400" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#d7b940">HOUR 3-5</text>
  <rect x="340" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#d7b940" stroke-width="1"/>
  <text x="400" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#e8cc55">MID GAME</text>
  <text x="400" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Purple + Yellow science</text>
  <text x="400" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Oil processing</text>
  <text x="400" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Sulfur + Plastics</text>
  <text x="400" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Advanced circuits</text>
  <text x="400" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">Military research</text>

  <!-- Arrow 3→4 -->
  <line x1="460" y1="70" x2="551" y2="70" stroke="#d7b940" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Phase 4: cx=560 -->
  <circle cx="560" cy="70" r="8" fill="#3778c8"/>
  <text x="560" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#3778c8">HOUR 5-8</text>
  <rect x="500" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#3778c8" stroke-width="1"/>
  <text x="560" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#5599ee">LOGISTICS</text>
  <text x="560" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Train network</text>
  <text x="560" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Roboports + Bots</text>
  <text x="560" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Logistic network</text>
  <text x="560" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Modules + Beacons</text>
  <text x="560" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">Nuclear power</text>

  <!-- Arrow 4→5 -->
  <line x1="620" y1="70" x2="711" y2="70" stroke="#3778c8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Phase 5: cx=720 -->
  <circle cx="720" cy="70" r="8" fill="#9d4edd"/>
  <text x="720" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#9d4edd">HOUR 8-15</text>
  <rect x="660" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#9d4edd" stroke-width="1"/>
  <text x="720" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#b366ff">PRODUCTION</text>
  <text x="720" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Rocket silo</text>
  <text x="720" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Low density</text>
  <text x="720" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Rocket fuel</text>
  <text x="720" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Satellite</text>
  <text x="720" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">~45 SPM target</text>

  <!-- Arrow 5→6 -->
  <line x1="780" y1="70" x2="871" y2="70" stroke="#9d4edd" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Phase 6: cx=880 (fits within 960px width) -->
  <circle cx="880" cy="70" r="8" fill="#e0e0e0"/>
  <text x="880" y="90" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#e0e0e0">LAUNCH!</text>
  <rect x="820" y="100" width="120" height="90" rx="4" fill="#2a2a2a" stroke="#e0e0e0" stroke-width="1"/>
  <text x="880" y="118" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#f5f5f5">ROCKET LAUNCH</text>
  <text x="880" y="133" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Win condition!</text>
  <text x="880" y="146" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">~100 SPM</text>
  <text x="880" y="159" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Space Age unlocks</text>
  <text x="880" y="172" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">New planets</text>
  <text x="880" y="185" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="#666">Vulcanus / Gleba</text>

  <!-- Key items row -->
  <text x="480" y="220" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="12" font-weight="700" fill="#888">KEY MILESTONES</text>

  <!-- Milestone items: 7 cards × 110px = 770px, spread evenly across 960px with margins -->
  <!-- Available width: 960 - 40(left margin) - 40(right margin) = 880px -->
