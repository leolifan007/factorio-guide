<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="lavaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8941c"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e8941c"/>
    </linearGradient>
    <linearGradient id="ironGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8b8b0"/>
      <stop offset="100%" stop-color="#e0ddd0"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4845a"/>
      <stop offset="100%" stop-color="#e8a878"/>
    </linearGradient>
    <linearGradient id="calciteGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#a8e0f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899aa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8941c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="480" fill="url(#bgGrad)" rx="8"/>

  <!-- Grid dots -->
  <g fill="#2a2a4e" opacity="0.3">
    <circle cx="20" cy="20" r="1"/><circle cx="60" cy="20" r="1"/><circle cx="100" cy="20" r="1"/>
    <circle cx="140" cy="20" r="1"/><circle cx="180" cy="20" r="1"/><circle cx="220" cy="20" r="1"/>
    <circle cx="260" cy="20" r="1"/><circle cx="300" cy="20" r="1"/><circle cx="340" cy="20" r="1"/>
    <circle cx="380" cy="20" r="1"/><circle cx="420" cy="20" r="1"/><circle cx="460" cy="20" r="1"/>
    <circle cx="500" cy="20" r="1"/><circle cx="540" cy="20" r="1"/><circle cx="580" cy="20" r="1"/>
    <circle cx="620" cy="20" r="1"/><circle cx="660" cy="20" r="1"/><circle cx="700" cy="20" r="1"/>
    <circle cx="740" cy="20" r="1"/><circle cx="20" cy="60" r="1"/><circle cx="20" cy="100" r="1"/>
    <circle cx="20" cy="140" r="1"/><circle cx="20" cy="180" r="1"/><circle cx="20" cy="220" r="1"/>
    <circle cx="20" cy="260" r="1"/><circle cx="20" cy="300" r="1"/><circle cx="20" cy="340" r="1"/>
    <circle cx="20" cy="380" r="1"/><circle cx="20" cy="420" r="1"/><circle cx="20" cy="460" r="1"/>
    <circle cx="740" cy="60" r="1"/><circle cx="740" cy="100" r="1"/><circle cx="740" cy="140" r="1"/>
    <circle cx="740" cy="180" r="1"/><circle cx="740" cy="220" r="1"/><circle cx="740" cy="260" r="1"/>
    <circle cx="740" cy="300" r="1"/><circle cx="740" cy="340" r="1"/><circle cx="740" cy="380" r="1"/>
    <circle cx="740" cy="420" r="1"/><circle cx="740" cy="460" r="1"/>
  </g>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#glow)">Lava Processing Flow — Vulcanus</text>

  <!-- ============ LAVA PUMP (left) ============ -->
  <rect x="40" y="105" width="120" height="65" rx="8" fill="#3d1f0a" stroke="#e8941c" stroke-width="2" filter="url(#shadow)"/>
  <!-- Lava animation -->
  <rect x="50" y="115" width="100" height="12" rx="6" fill="url(#lavaGrad)" opacity="0.8"/>
  <rect x="50" y="133" width="100" height="8" rx="4" fill="url(#lavaGrad)" opacity="0.6"/>
  <rect x="50" y="147" width="100" height="6" rx="3" fill="url(#lavaGrad)" opacity="0.4"/>
  <text x="100" y="160" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold">LAVA PUMP</text>
  <text x="100" y="175" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="9">∞ Lava Source</text>

  <!-- Arrow: Lava Pump → Foundry -->
  <line x1="160" y1="120" x2="235" y2="120" stroke="#e8941c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <line x1="160" y1="155" x2="235" y2="155" stroke="#e8941c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <!-- Pipe icon representation -->
  <rect x="165" y="127" width="65" height="20" rx="10" fill="none" stroke="#e8941c" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="197" y="142" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Pipe (1,000/s)</text>

  <!-- ============ CALCITE INPUT (top-right) ============ -->
  <rect x="480" y="50" width="110" height="50" rx="8" fill="#0a2a3a" stroke="#7ec8e3" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="68" text-anchor="middle" fill="#7ec8e3" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">✧ CALCITE</text>
  <text x="535" y="85" text-anchor="middle" fill="#aac" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Space / Vulcanus Mining</text>

  <!-- Arrow: Calcite → Foundry -->
  <line x1="535" y1="100" x2="535" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>

  <!-- ============ FOUNDRY (center) ============ -->
  <rect x="240" y="85" width="130" height="105" rx="10" fill="#1a2a1a" stroke="#5a9a5a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="305" y="108" text-anchor="middle" fill="#5a9a5a" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold">🏭 FOUNDRY</text>
  <line x1="255" y1="115" x2="355" y2="115" stroke="#3a5a3a" stroke-width="1"/>
  <text x="305" y="132" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="10">Lava + Calcite</text>
  <text x="305" y="148" text-anchor="middle" fill="#b8b8b0" font-family="'Segoe UI', Arial, sans-serif" font-size="10">→ Molten Iron (15/s)</text>
  <text x="305" y="163" text-anchor="middle" fill="#d4845a" font-family="'Segoe UI', Arial, sans-serif" font-size="10">→ Molten Copper (15/s)</text>
  <text x="305" y="183" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-style="italic">50°C lava + calcite = molten metal</text>

  <!-- ============ MOLTEN IRON path (upper) ============ -->
  <line x1="370" y1="100" x2="425" y2="100" stroke="#b8b8b0" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="397" y="93" text-anchor="middle" fill="#b8b8b0" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Iron</text>

  <!-- Iron Casting Recipes -->
  <rect x="430" y="60" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#b8b8b0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="80" text-anchor="middle" fill="#b8b8b0" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">⬡ IRON CASTING</text>
  <line x1="440" y1="87" x2="560" y2="87" stroke="#3a3a4a" stroke-width="1"/>
  <text x="500" y="102" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">⚙ Iron Gear Wheel (2/s)</text>
  <text x="500" y="116" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">⎯ Iron Pipe (4/s)</text>
  <text x="500" y="132" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">🟫 Iron Stick (8/s)</text>

  <!-- ============ MOLTEN COPPER path (lower) ============ -->
  <line x1="370" y1="120" x2="425" y2="120" stroke="#d4845a" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="397" y="115" text-anchor="middle" fill="#d4845a" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Copper</text>

  <!-- Copper Casting Recipes -->
  <rect x="430" y="145" width="140" height="65" rx="8" fill="#1a1a2e" stroke="#d4845a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="163" text-anchor="middle" fill="#d4845a" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">⏚ COPPER CASTING</text>
  <line x1="440" y1="170" x2="560" y2="170" stroke="#3a3a4a" stroke-width="1"/>
  <text x="500" y="185" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">～ Copper Wire (3/s)</text>
  <text x="500" y="199" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">⬡ Copper Plate (4/s)</text>

  <!-- ============ LDS & STEEL (right side, shared iron+copper) ============ -->
  <!-- Arrow from iron to LDS -->
  <line x1="570" y1="100" x2="610" y2="100" stroke="#b8b8b0" stroke-width="2" marker-end="url(#arrowGray)"/>
  <!-- Arrow from copper to LDS -->
  <line x1="570" y1="160" x2="610" y2="160" stroke="#d4845a" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- LDS (Low Density Structure) -->
  <rect x="615" y="75" width="125" height="60" rx="8" fill="#1a1a2e" stroke="#e8941c" stroke-width="2" filter="url(#shadow)"/>
  <text x="677" y="95" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">🛩 LDS</text>
  <line x1="625" y1="102" x2="730" y2="102" stroke="#3a3a4a" stroke-width="1"/>
  <text x="677" y="117" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Molten Iron + Copper</text>
  <text x="677" y="129" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Direct casting, no plates!</text>

  <!-- Steel (from Molten Iron) - long arrow from iron casting area -->
  <line x1="500" y1="140" x2="500" y2="230" stroke="#b8b8b0" stroke-width="1.5" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>

  <rect x="435" y="240" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#8899aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="260" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">🪨 STEEL</text>
  <text x="500" y="278" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Molten Iron → Steel (1/s)</text>

  <!-- ============ LEGEND ============ -->
  <rect x="40" y="220" width="320" height="90" rx="8" fill="#12122a" stroke="#3a3a5a" stroke-width="1" opacity="0.9"/>
  <text x="200" y="242" text-anchor="middle" fill="#8899aa" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold">LEGEND — Material Flow</text>
  <line x1="60" y1="249" x2="340" y2="249" stroke="#2a2a4a" stroke-width="1"/>
  <rect x="60" y="258" width="14" height="14" rx="2" fill="#e8941c" opacity="0.8"/>
  <text x="80" y="270" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Lava / Molten Flow</text>
  <rect x="200" y="258" width="14" height="14" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <text x="220" y="270" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Calcite Input</text>
  <rect x="60" y="280" width="14" height="14" rx="2" fill="#b8b8b0" opacity="0.8"/>
  <text x="80" y="292" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Iron Products</text>
  <rect x="200" y="280" width="14" height="14" rx="2" fill="#d4845a" opacity="0.8"/>
  <text x="220" y="292" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Copper Products</text>

  <!-- ============ BOTTOM NOTES ============ -->
  <text x="380" y="340" text-anchor="middle" fill="#5a5a7a" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Vulcanus lava processing — an infinite supply of iron and copper with zero mining</text>

  <!-- Rocket export note -->
  <rect x="615" y="200" width="125" height="50" rx="8" fill="#1a1a2e" stroke="#5a9a5a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="677" y="220" text-anchor="middle" fill="#5a9a5a" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">🚀 TO NAUVIS</text>
  <text x="677" y="238" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="8">Rocket cargo export</text>
  <line x1="677" y1="135" x2="677" y2="195" stroke="#5a9a5a" stroke-width="1.5" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>

  <!-- Throughput note box -->
  <rect x="40" y="340" width="700" height="120" rx="8" fill="#12122a" stroke="#3a3a5a" stroke-width="1" opacity="0.9"/>
  <text x="380" y="362" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold">Throughput Estimates (per Foundry)</text>
  <line x1="60" y1="370" x2="720" y2="370" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="378" width="130" height="20" rx="4" fill="#2a2a4a"/>
  <text x="125" y="392" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">Recipe</text>
  <rect x="195" y="378" width="100" height="20" rx="4" fill="#2a2a4a"/>
  <text x="245" y="392" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">Input / s</text>
  <rect x="300" y="378" width="100" height="20" rx="4" fill="#2a2a4a"/>
  <text x="350" y="392" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">Output / s</text>
  <rect x="405" y="378" width="100" height="20" rx="4" fill="#2a2a4a"/>
  <text x="455" y="392" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">Calcite / s</text>
  <rect x="510" y="378" width="100" height="20" rx="4" fill="#2a2a4a"/>
  <text x="560" y="392" text-anchor="middle" fill="#ccc" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold">H₂O / s</text>

  <!-- Table rows -->
  <text x="125" y="412" text-anchor="middle" fill="#b8b8b0" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Molten Iron</text>
  <text x="245" y="412" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">500 lava</text>
  <text x="350" y="412" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">15 iron</text>
  <text x="455" y="412" text-anchor="middle" fill="#7ec8e3" font-family="'Segoe UI', Arial, sans-serif" font-size="9">0.5</text>
  <text x="560" y="412" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="9">—</text>
  <line x1="60" y1="418" x2="720" y2="418" stroke="#2a2a3a" stroke-width="0.5"/>

  <text x="125" y="432" text-anchor="middle" fill="#d4845a" font-family="'Segoe UI', Arial, sans-serif" font-size="9">Molten Copper</text>
  <text x="245" y="432" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">500 lava</text>
  <text x="350" y="432" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">15 copper</text>
  <text x="455" y="432" text-anchor="middle" fill="#7ec8e3" font-family="'Segoe UI', Arial, sans-serif" font-size="9">0.5</text>
  <text x="560" y="432" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="9">—</text>
  <line x1="60" y1="438" x2="720" y2="438" stroke="#2a2a3a" stroke-width="0.5"/>

  <text x="125" y="452" text-anchor="middle" fill="#e8941c" font-family="'Segoe UI', Arial, sans-serif" font-size="9">LDS (direct)</text>
  <text x="245" y="452" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">50+50 molten</text>
  <text x="350" y="452" text-anchor="middle" fill="#ddd" font-family="'Segoe UI', Arial, sans-serif" font-size="9">2 LDS</text>
  <text x="455" y="452" text-anchor="middle" fill="#7ec8e3" font-family="'Segoe UI', Arial, sans-serif" font-size="9">—</text>
  <text x="560" y="452" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="9">—</text>
</svg>
