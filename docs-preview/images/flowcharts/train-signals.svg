<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1f1f1f" rx="6"/>
  <text x="400" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="18" font-weight="900" fill="#e8941c">TRAIN SIGNAL GUIDE — CHAIN vs RAIL</text>

  <!-- Left: Rail Signal -->
  <rect x="20" y="50" width="340" height="160" rx="6" fill="#2a2a2a" stroke="#6abe30" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="13" font-weight="900" fill="#6abe30">RAIL SIGNAL</text>
  <text x="190" y="94" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Divides track into blocks • Controls entry</text>

  <!-- Signal icons -->
  <rect x="60" y="105" width="80" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="100" cy="145" r="28" fill="#2a2a2a" stroke="#6abe30" stroke-width="3"/>
  <circle cx="100" cy="145" r="18" fill="#6abe30"/>
  <circle cx="100" cy="145" r="8" fill="#8ad44a"/>
  <text x="100" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Green = Clear</text>

  <rect x="170" y="105" width="80" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="210" cy="145" r="28" fill="#2a2a2a" stroke="#c9463d" stroke-width="3"/>
  <circle cx="210" cy="145" r="18" fill="#c9463d"/>
  <text x="210" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Red = Blocked</text>

  <rect x="280" y="105" width="60" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="310" cy="145" r="28" fill="#2a2a2a" stroke="#d7b940" stroke-width="3"/>
  <circle cx="310" cy="145" r="18" fill="#d7b940"/>
  <text x="310" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Yellow</text>

  <!-- Right: Chain Signal -->
  <rect x="380" y="50" width="340" height="160" rx="6" fill="#2a2a2a" stroke="#e8941c" stroke-width="2"/>
  <text x="550" y="75" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="13" font-weight="900" fill="#e8941c">CHAIN SIGNAL</text>
  <text x="550" y="94" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Propagates downstream • Forces full clear</text>

  <!-- Chain signal icons -->
  <rect x="410" y="105" width="80" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="450" cy="145" r="28" fill="#2a2a2a" stroke="#e8941c" stroke-width="3"/>
  <circle cx="450" cy="145" r="18" fill="#e8941c"/>
  <circle cx="450" cy="145" r="8" fill="#6abe30"/>
  <line x1="450" y1="130" x2="450" y2="160" stroke="#2a2a2a" stroke-width="3"/>
  <text x="450" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Green = Clear</text>

  <rect x="520" y="105" width="80" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="560" cy="145" r="28" fill="#2a2a2a" stroke="#e8941c" stroke-width="3"/>
  <circle cx="560" cy="145" r="18" fill="#e8941c"/>
  <circle cx="560" cy="145" r="8" fill="#c9463d"/>
  <line x1="560" y1="130" x2="560" y2="160" stroke="#2a2a2a" stroke-width="3"/>
  <text x="560" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Red = Stop!</text>

  <rect x="630" y="105" width="60" height="80" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="660" cy="145" r="28" fill="#2a2a2a" stroke="#e8941c" stroke-width="3"/>
  <circle cx="660" cy="145" r="18" fill="#e8941c"/>
  <line x1="660" y1="130" x2="660" y2="160" stroke="#2a2a2a" stroke-width="3"/>
  <text x="660" y="200" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Chain</text>

  <!-- Golden Rule Box -->
  <rect x="20" y="230" width="700" height="70" rx="6" fill="#2a2a2a" stroke="#e8941c" stroke-width="2"/>
  <text x="370" y="255" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="900" fill="#e8941c">THE GOLDEN RULE</text>
  <text x="370" y="278" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="11" font-weight="700" fill="#f5aa2e">CHAIN SIGNAL at ENTRANCE → RAIL SIGNAL at EXIT</text>
  <text x="370" y="295" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Place chain signals before the intersection. Place rail signals after the intersection.</text>

  <!-- Intersection Example -->
  <text x="400" y="325" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="12" font-weight="700" fill="#888">4-WAY INTERSECTION SIGNAL LAYOUT</text>

  <!-- Intersection tracks -->
  <rect x="200" y="345" width="400" height="50" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <!-- Horizontal track -->
  <rect x="200" y="362" width="400" height="16" rx="2" fill="#8b6914"/>
  <rect x="205" y="365" width="390" height="10" rx="1" fill="#6b4c10"/>
  <!-- Vertical track -->
  <rect x="385" y="345" width="30" height="50" rx="2" fill="#8b6914"/>
  <rect x="388" y="345" width="24" height="50" rx="1" fill="#6b4c10"/>

  <!-- Chain signals at entrances (4 sides) -->
  <!-- Top -->
  <rect x="395" y="332" width="12" height="14" rx="2" fill="#e8941c"/>
  <circle cx="401" cy="339" r="5" fill="#e8941c"/>
  <line x1="401" y1="334" x2="401" y2="344" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Bottom -->
  <rect x="395" y="349" width="12" height="14" rx="2" fill="#e8941c"/>
  <circle cx="401" cy="356" r="5" fill="#e8941c"/>
  <line x1="401" y1="351" x2="401" y2="361" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Left -->
  <rect x="180" y="360" width="14" height="12" rx="2" fill="#e8941c"/>
  <circle cx="187" cy="366" r="5" fill="#e8941c"/>
  <line x1="182" y1="366" x2="192" y2="366" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right -->
  <rect x="394" y="360" width="14" height="12" rx="2" fill="#e8941c"/>
  <circle cx="401" cy="366" r="5" fill="#e8941c"/>
  <line x1="396" y1="366" x2="406" y2="366" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Rail signals at exits (4 sides) -->
  <!-- Top -->
  <rect x="395" y="315" width="12" height="14" rx="2" fill="#6abe30"/>
  <circle cx="401" cy="322" r="5" fill="#6abe30"/>
  <circle cx="401" cy="322" r="2" fill="#8ad44a"/>
  <!-- Bottom -->
  <rect x="395" y="366" width="12" height="14" rx="2" fill="#6abe30"/>
  <circle cx="401" cy="373" r="5" fill="#6abe30"/>
  <circle cx="401" cy="373" r="2" fill="#8ad44a"/>
  <!-- Left -->
  <rect x="163" y="360" width="14" height="12" rx="2" fill="#6abe30"/>
  <circle cx="170" cy="366" r="5" fill="#6abe30"/>
  <circle cx="170" cy="366" r="2" fill="#8ad44a"/>
  <!-- Right -->
  <rect x="411" y="360" width="14" height="12" rx="2" fill="#6abe30"/>
  <circle cx="418" cy="366" r="5" fill="#6abe30"/>
  <circle cx="418" cy="366" r="2" fill="#8ad44a"/>

  <!-- Legend -->
  <rect x="20" y="365" width="10" height="10" rx="2" fill="#e8941c"/>
  <text x="35" y="374" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Chain Signal (Entrance)</text>
  <rect x="165" y="365" width="10" height="10" rx="2" fill="#6abe30"/>
  <text x="180" y="374" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Rail Signal (Exit)</text>
  <rect x="270" y="365" width="10" height="10" rx="2" fill="#8b6914"/>
  <text x="285" y="374" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Track</text>
</svg>