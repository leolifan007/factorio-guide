{{ define "main" }}
<div class="single-page">
  <div class="article-hero-full">
    <div class="article-hero-bg" style="background-image:url('{{ `images/hero-bg.jpg` | relURL }}')"></div>
    <div class="article-hero-fade"></div>
    <div class="article-hero-text">
      <h1>{{ .Title }}</h1>
      <div class="article-meta">
        <span class="meta-date">Updated: {{ .Date.Format "Jan 2, 2006" }}</span>
      </div>
    </div>
  </div>

  <div class="article-layout">
    <aside class="floating-toc" id="floatingToc"></aside>
    <main class="article-body">
      {{ .Content | safeHTML }}
    </main>
  </div>
</div>
{{ end }}
