<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="100%" height="auto" style="background:#151515;font-family:system-ui,-apple-system,sans-serif">
  <title>Circuit Wires — Red vs Green Network Use Cases</title>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#c9463d"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#6abe30"/></marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="48" fill="#1f1f1f" rx="6"/>
  <rect x="0" y="42" width="900" height="6" fill="#1f1f1f"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#e8941c" filter="url(#glow)">CIRCUIT NETWORK — Red Wire vs Green Wire</text>

  <!-- ===== LEFT PANEL: RED WIRE ===== -->
  <rect x="12" y="58" width="432" height="370" rx="6" fill="#1a0f0f" stroke="#c9463d" stroke-width="2"/>
  <rect x="12" y="58" width="432" height="35" rx="6" fill="#c9463d"/>
  <rect x="12" y="83" width="432" height="10" fill="#c9463d"/>
  <text x="228" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#111">🔴 RED WIRE — Production Control</text>

  <!-- Entity: Storage Tank -->
  <rect x="35" y="110" width="140" height="85" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="2"/>
  <rect x="35" y="110" width="140" height="28" rx="5" fill="#8b4513"/>
  <rect x="35" y="130" width="140" height="8" fill="#8b4513"/>
  <text x="105" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Storage Tank</text>
  <!-- Fluid level -->
  <rect x="50" y="146" width="110" height="16" rx="2" fill="#0a0500" stroke="#8b4513" stroke-width="1"/>
  <rect x="51" y="147" width="88" height="14" rx="1" fill="#8b4513" opacity="0.7"/>
  <text x="105" y="159" text-anchor="middle" font-size="15" fill="#d4a017">Heavy Oil: 24k</text>
  <!-- Unit icon -->
  <rect x="105" y="168" width="38" height="18" rx="3" fill="#252525" stroke="#666" stroke-width="1"/>
  <text x="124" y="181" text-anchor="middle" font-size="15" fill="#999">Tank</text>

  <!-- Red wire line -->
  <line x1="175" y1="145" x2="215" y2="145" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="195" y="137" text-anchor="middle" font-size="15" fill="#c9463d">🔴 Red Wire</text>

  <!-- Entity: Decider Combinator -->
  <rect x="220" y="110" width="140" height="85" rx="5" fill="#1a2a1a" stroke="#6abe30" stroke-width="2"/>
  <rect x="220" y="110" width="140" height="28" rx="5" fill="#6abe30"/>
  <rect x="220" y="130" width="140" height="8" fill="#6abe30"/>
  <text x="290" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Decider</text>
  <rect x="235" y="146" width="110" height="40" rx="3" fill="#0f0f0f" stroke="#555" stroke-width="1"/>
  <text x="290" y="160" text-anchor="middle" font-size="15" fill="#6abe30" font-weight="600">heavy &gt; 20000</text>
  <text x="290" y="178" text-anchor="middle" font-size="15" fill="#888">→ output H = 1</text>

  <!-- Wire: Decider → Pump -->
  <line x1="360" y1="145" x2="400" y2="145" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Entity: Pump -->
  <rect x="400" y="115" width="35" height="50" rx="4" fill="#2a1a00" stroke="#d4a017" stroke-width="1.5"/>
  <text x="417" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#d4a017">⏏</text>
  <text x="417" y="155" text-anchor="middle" font-size="15" fill="#888">Pump</text>

  <!-- Arrow to Cracker -->
  <line x1="435" y1="140" x2="435" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Entity: Chemical Plant -->
  <rect x="130" y="255" width="220" height="85" rx="5" fill="#1a0f00" stroke="#d4a017" stroke-width="2"/>
  <rect x="130" y="255" width="220" height="28" rx="5" fill="#d4a017"/>
  <rect x="130" y="275" width="220" height="8" fill="#d4a017"/>
  <text x="240" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Cracker (Chemical Plant)</text>
  <text x="240" y="300" text-anchor="middle" font-size="15" fill="#ddd">40 Heavy → 30 Light</text>
  <text x="240" y="320" text-anchor="middle" font-size="15" fill="#888">Enabled when Heavy &gt; 20k</text>

  <!-- Step labels -->
  <text x="105" y="370" text-anchor="middle" font-size="15" fill="#777">① Tank reads level</text>
  <text x="290" y="370" text-anchor="middle" font-size="15" fill="#777">② Condition check</text>
  <text x="417" y="370" text-anchor="middle" font-size="15" fill="#777">③ Pump activates</text>

  <line x1="105" y1="360" x2="105" y2="350" stroke="#444" stroke-width="1"/>
  <line x1="290" y1="360" x2="290" y2="350" stroke="#444" stroke-width="1"/>
  <line x1="417" y1="360" x2="417" y2="350" stroke="#444" stroke-width="1"/>

  <text x="228" y="410" text-anchor="middle" font-size="15" fill="#555">Red wire carries production values (fluid level, item count)</text>

  <!-- ===== RIGHT PANEL: GREEN WIRE ===== -->
  <rect x="456" y="58" width="432" height="370" rx="6" fill="#0f1a0f" stroke="#6abe30" stroke-width="2"/>
  <rect x="456" y="58" width="432" height="35" rx="6" fill="#6abe30"/>
  <rect x="456" y="83" width="432" height="10" fill="#6abe30"/>
  <text x="672" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#111">🟢 GREEN WIRE — Logistics &amp; Train Signals</text>

  <!-- Entity: Provider Chest -->
  <rect x="475" y="110" width="140" height="85" rx="5" fill="#1a1a2a" stroke="#4488ff" stroke-width="2"/>
  <rect x="475" y="110" width="140" height="28" rx="5" fill="#4488ff"/>
  <rect x="475" y="130" width="140" height="8" fill="#4488ff"/>
  <text x="545" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Provider Chest</text>
  <rect x="490" y="146" width="110" height="16" rx="2" fill="#0a0a1f" stroke="#4488ff" stroke-width="1"/>
  <text x="545" y="159" text-anchor="middle" font-size="15" fill="#88bbff">Iron: 1.2k</text>
  <rect x="545" y="168" width="38" height="18" rx="3" fill="#252525" stroke="#666" stroke-width="1"/>
  <text x="564" y="181" text-anchor="middle" font-size="15" fill="#999">Chest</text>

  <!-- Green wire line -->
  <line x1="615" y1="145" x2="655" y2="145" stroke="#6abe30" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="635" y="137" text-anchor="middle" font-size="15" fill="#6abe30">🟢 Green Wire</text>

  <!-- Entity: Arithmetic Combinator -->
  <rect x="660" y="110" width="140" height="85" rx="5" fill="#1a2a1a" stroke="#44cccc" stroke-width="2"/>
  <rect x="660" y="110" width="140" height="28" rx="5" fill="#44cccc"/>
  <rect x="660" y="130" width="140" height="8" fill="#44cccc"/>
  <text x="730" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Arithmetic</text>
  <rect x="675" y="146" width="110" height="40" rx="3" fill="#0f0f0f" stroke="#555" stroke-width="1"/>
  <text x="730" y="160" text-anchor="middle" font-size="15" fill="#44cccc" font-weight="600">iron / 1000</text>
  <text x="730" y="178" text-anchor="middle" font-size="15" fill="#888">→ output T = 2</text>
  
  <!-- Wire: Arithmetic → Inserter -->
  <line x1="760" y1="195" x2="760" y2="255" stroke="#6abe30" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Entity: Inserter -->
  <rect x="690" y="255" width="140" height="60" rx="5" fill="#1a1a1a" stroke="#ddaa33" stroke-width="1.5"/>
  <rect x="690" y="255" width="140" height="25" rx="5" fill="#ddaa33"/>
  <rect x="690" y="272" width="140" height="8" fill="#ddaa33"/>
  <text x="760" y="274" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Inserter</text>
  <text x="760" y="296" text-anchor="middle" font-size="15" fill="#ddd">Enable if T &gt; 2</text>
  <text x="760" y="310" text-anchor="middle" font-size="15" fill="#888">Moves items from chest</text>

  <!-- Step labels -->
  <text x="545" y="365" text-anchor="middle" font-size="15" fill="#777">① Chest reports stock</text>
  <text x="730" y="365" text-anchor="middle" font-size="15" fill="#777">② Signal transform</text>
  <text x="760" y="340" text-anchor="middle" font-size="15" fill="#777">③ Enable/disable</text>

  <line x1="545" y1="355" x2="545" y2="345" stroke="#444" stroke-width="1"/>
  <line x1="730" y1="355" x2="730" y2="345" stroke="#444" stroke-width="1"/>

  <text x="672" y="410" text-anchor="middle" font-size="15" fill="#555">Green wire carries global signals (train IDs, chest totals)</text>
</svg>
