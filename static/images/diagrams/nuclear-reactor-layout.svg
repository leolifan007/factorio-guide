  <rect x="210" y="165" width="126" height="75" rx="4" fill="#0a1a2a" stroke="#44ff88" stroke-width="2"/>
  <text x="270" y="191" text-anchor="middle" font-size="13" fill="#44ff88" font-weight="700">Reactor D</text>
  <text x="270" y="207" text-anchor="middle" font-size="12" fill="#888">160°C</text>
  <!-- Center bonus -->
  <rect x="180" y="170" width="42" height="62" rx="3" fill="#44ff88" fill-opacity="0.25" stroke="#44ff88" stroke-width="1" stroke-dasharray="3"/>
  <text x="200" y="199" text-anchor="middle" font-size="11" fill="#44ff88">×3</text>
  <!-- Bonus labels -->
  <text x="130" y="158" text-anchor="middle" font-size="10" fill="#44ff88" opacity="0.7">+100%</text>
  <text x="270" y="158" text-anchor="middle" font-size="10" fill="#44ff88" opacity="0.7">+100%</text>
  <text x="130" y="236" text-anchor="middle" font-size="10" fill="#44ff88" opacity="0.7">+100%</text>
  <text x="270" y="236" text-anchor="middle" font-size="10" fill="#44ff88" opacity="0.7">+100%</text>
