<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect width="800" height="300" fill="#1f1f1f" rx="6"/>
  <text x="400" y="28" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="16" font-weight="900" fill="#44aa66">NUCLEAR POWER PLANT — 2x2 REACTOR SETUP (480 MW)</text>

  <!-- REACTOR CORE -->
  <rect x="100" y="50" width="180" height="180" rx="4" fill="#2a2a2a" stroke="#44aa66" stroke-width="2"/>
  <!-- Reactor label -->
  <text x="190" y="72" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#88cc66">NUCLEAR REACTOR</text>
  <text x="190" y="87" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">4 cores, 480 MW</text>

  <!-- 2x2 reactor cores -->
  <rect x="130" y="95" width="50" height="50" rx="3" fill="#3d5c3d" stroke="#66aa44" stroke-width="2"/>
  <circle cx="155" cy="120" r="16" fill="#66aa44"/>
  <circle cx="155" cy="120" r="10" fill="#88cc66"/>
  <circle cx="152" cy="117" r="4" fill="#aaffaa" opacity="0.5"/>

  <rect x="200" y="95" width="50" height="50" rx="3" fill="#3d5c3d" stroke="#66aa44" stroke-width="2"/>
  <circle cx="225" cy="120" r="16" fill="#66aa44"/>
  <circle cx="225" cy="120" r="10" fill="#88cc66"/>

  <rect x="130" y="155" width="50" height="50" rx="3" fill="#3d5c3d" stroke="#66aa44" stroke-width="2"/>
  <circle cx="155" cy="180" r="16" fill="#66aa44"/>
  <circle cx="155" cy="180" r="10" fill="#88cc66"/>

  <rect x="200" y="155" width="50" height="50" rx="3" fill="#3d5c3d" stroke="#66aa44" stroke-width="2"/>
  <circle cx="225" cy="180" r="16" fill="#66aa44"/>
  <circle cx="225" cy="180" r="10" fill="#88cc66"/>

  <!-- Heat pipes from reactor -->
  <rect x="280" y="160" width="80" height="18" rx="3" fill="#c8824c"/>
  <rect x="283" y="163" width="74" height="12" rx="2" fill="#e09860"/>
  <text x="320" y="195" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Heat Pipe</text>

  <!-- HEAT EXCHANGER -->
  <rect x="370" y="50" width="100" height="180" rx="4" fill="#2a2a2a" stroke="#3778c8" stroke-width="2"/>
  <text x="420" y="72" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#5599ee">HEAT</text>
  <text x="420" y="85" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#5599ee">EXCHANGER</text>
  <text x="420" y="100" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">×4 units</text>
  <!-- Heat exchanger icon -->
  <rect x="388" y="108" width="64" height="100" rx="3" fill="#3778c8"/>
  <rect x="394" y="114" width="52" height="88" rx="2" fill="#4488dd"/>
  <rect x="400" y="120" width="40" height="76" rx="1" fill="#5599ee"/>
  <rect x="405" y="125" width="30" height="66" fill="#2255a0"/>
  <!-- Steam output -->
  <rect x="388" y="208" width="64" height="14" rx="2" fill="#e0e0e0"/>
  <text x="420" y="240" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Steam Output</text>

  <!-- Pipe: Heat Exchanger → Steam Turbine -->
  <rect x="470" y="160" width="60" height="18" rx="3" fill="#e0e0e0"/>
  <rect x="473" y="163" width="54" height="12" rx="2" fill="#f5f5f5"/>
  <text x="500" y="195" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Steam Pipe</text>

  <!-- STEAM TURBINE -->
  <rect x="540" y="50" width="100" height="180" rx="4" fill="#2a2a2a" stroke="#d7b940" stroke-width="2"/>
  <text x="590" y="72" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#e8cc55">STEAM TURBINE</text>
  <text x="590" y="87" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">×4 units</text>
  <!-- Turbine icon -->
  <rect x="558" y="95" width="64" height="115" rx="3" fill="#d7b940"/>
  <rect x="564" y="101" width="52" height="103" rx="2" fill="#e8cc55"/>
  <circle cx="590" cy="152" r="22" fill="#ffee66"/>
  <circle cx="590" cy="152" r="14" fill="#ffcc00"/>
  <circle cx="590" cy="152" r="6" fill="#cc9900"/>
  <!-- Power output line -->
  <line x1="590" y1="210" x2="590" y2="230" stroke="#d7b940" stroke-width="3"/>
  <text x="590" y="248" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#e8cc55">→ 480 MW</text>

  <!-- POWER GRID -->
  <rect x="650" y="110" width="100" height="80" rx="4" fill="#2a2a2a" stroke="#6abe30" stroke-width="2"/>
  <text x="700" y="132" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="9" font-weight="700" fill="#8ad44a">POWER</text>
  <text x="700" y="147" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Grid</text>
  <text x="700" y="168" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="900" fill="#6abe30">480 MW</text>

  <!-- Connector line -->
  <line x1="640" y1="150" x2="650" y2="150" stroke="#6abe30" stroke-width="3"/>
  <polygon points="650,146 658,150 650,154" fill="#6abe30"/>

  <!-- Stats row -->
  <rect x="20" y="248" width="760" height="45" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="60" y="273" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">⚡ 480 MW Output</text>
  <text x="200" y="273" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">☢ 8 Kovarex Centrifuges (for 100% uptime)</text>
  <text x="430" y="273" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">🛢 0.8 U-235 per 90s (enrichment loop)</text>
  <text x="660" y="273" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">💧 103.5 Water/s per exchanger</text>
</svg>