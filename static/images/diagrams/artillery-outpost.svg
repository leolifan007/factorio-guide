<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <radialGradient id="rangeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d8a4e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2d8a4e" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f0883e"/>
    </marker>
    <style>
      .label { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #c9d1d9; }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #e6edf3; }
      .sublabel { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #8b949e; }
      .signal { font-family: monospace; font-size: 9px; fill: #ffa657; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="8" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" class="title">Artillery Outpost — Circuit-Controlled Auto-Fire Layout</text>
  <line x1="20" y1="36" x2="780" y2="36" stroke="#21262d" stroke-width="1"/>

  <!-- ===================== LEFT SECTION: Main Outpost ===================== -->
  <!-- Coverage range circle -->
  <circle cx="150" cy="200" r="130" fill="url(#rangeGrad)" stroke="#2d8a4e" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.8"/>
  <text x="150" y="72" text-anchor="middle" class="sublabel" fill="#2d8a4e">Targeting Range</text>

  <!-- Wall -->
  <rect x="60" y="270" width="180" height="14" rx="2" fill="#484f58" stroke="#6e7681" stroke-width="1"/>
  <text x="150" y="264" text-anchor="middle" class="sublabel">Stone Wall</text>

  <!-- Artillery Turret -->
  <rect x="112" y="176" width="76" height="64" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <rect x="150" y="190" width="24" height="36" rx="3" fill="#30363d" stroke="#f0883e" stroke-width="1.5"/>
  <circle cx="162" cy="202" r="7" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="162" y1="195" x2="162" y2="215" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="155" y1="202" x2="169" y2="202" stroke="#f0883e" stroke-width="1.5"/>
  <text x="150" y="252" text-anchor="middle" class="label" fill="#f0883e">Artillery Turret</text>
  <!-- Shell icon inside turret -->
  <ellipse cx="162" cy="234" rx="5" ry="9" fill="#484f58" stroke="#8b949e" stroke-width="1"/>

  <!-- Requester Chest -->
  <rect x="60" y="292" width="44" height="34" rx="2" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="82" y="300" text-anchor="middle" class="sublabel" fill="#58a6ff">REQ</text>
  <text x="82" y="311" text-anchor="middle" class="signal" fill="#ffa657">200 shells</text>
  <text x="82" y="322" text-anchor="middle" class="sublabel" fill="#8b949e">&lt; 50 → fire</text>
  <text x="82" y="335" text-anchor="middle" class="label">Requester Chest</text>

  <!-- Inserter from chest to turret -->
  <line x1="104" y1="309" x2="112" y2="309" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="105" y="304" width="8" height="10" rx="1" fill="#58a6ff"/>
  <text x="108" y="297" text-anchor="middle" class="sublabel" fill="#58a6ff">ins</text>

  <!-- Provider Chest -->
  <rect x="196" y="292" width="44" height="34" rx="2" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="218" y="300" text-anchor="middle" class="sublabel" fill="#3fb950">PROV</text>
  <text x="218" y="311" text-anchor="middle" class="signal" fill="#ffa657">≥ 50 shells</text>
  <text x="218" y="335" text-anchor="middle" class="label">Provider Chest</text>

  <!-- Radar -->
  <rect x="60" y="170" width="40" height="40" rx="3" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="80" y1="178" x2="80" y2="190" stroke="#79c0ff" stroke-width="1"/>
  <line x1="72" y1="190" x2="88" y2="190" stroke="#79c0ff" stroke-width="1"/>
  <circle cx="80" cy="190" r="12" fill="none" stroke="#79c0ff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="80" y="165" text-anchor="middle" class="label" fill="#79c0ff">Radar</text>

  <!-- Radar wire to turret -->
  <line x1="100" y1="190" x2="112" y2="200" stroke="#79c0ff" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Biter bases in range -->
  <circle cx="95" cy="130" r="10" fill="#1c2128" stroke="#da3633" stroke-width="1.5"/>
  <text x="95" y="133" text-anchor="middle" font-size="9" fill="#da3633">W</text>
  <text x="95" y="116" text-anchor="middle" class="sublabel" fill="#da3633">Nest</text>

  <circle cx="185" cy="100" r="10" fill="#1c2128" stroke="#da3633" stroke-width="1.5"/>
  <text x="185" y="103" text-anchor="middle" font-size="9" fill="#da3633">W</text>
  <text x="185" y="86" text-anchor="middle" class="sublabel" fill="#da3633">Nest</text>

  <!-- ===================== CENTER: Circuit Network ===================== -->
  <!-- Decider Combinator -->
  <rect x="342" y="180" width="56" height="50" rx="3" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="370" y="200" text-anchor="middle" class="label" fill="#d2a8ff" font-size="10">?</text>
  <text x="370" y="214" text-anchor="middle" class="label" fill="#d2a8ff" font-size="10">1</text>
  <text x="370" y="238" text-anchor="middle" class="label" fill="#d2a8ff">Combinator</text>

  <!-- Wire connections -->
  <line x1="220" y1="309" x2="270" y2="309" stroke="#ff7b72" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="270" y1="309" x2="342" y2="220" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="300" y="304" text-anchor="middle" class="sublabel" fill="#ff7b72">Red Wire</text>

  <line x1="150" y1="240" x2="150" y2="290" stroke="#ff7b72" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="290" x2="342" y2="230" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="240" y="275" text-anchor="middle" class="sublabel" fill="#ff7b72">Red Wire (shells)</text>

  <!-- Combinator to turret -->
  <line x1="398" y1="205" x2="440" y2="205" stroke="#ff7b72" stroke-width="1.5"/>
  <line x1="440" y1="205" x2="440" y2="208" stroke="#ff7b72" stroke-width="1.5"/>
  <line x1="440" y1="208" x2="452" y2="208" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="420" y="199" text-anchor="middle" class="sublabel" fill="#ff7b72">Fire Signal</text>

  <!-- ===================== RIGHT SECTION: Supply Train ===================== -->
  <!-- Train tracks -->
  <line x1="480" y1="300" x2="780" y2="300" stroke="#6e7681" stroke-width="4"/>
  <line x1="480" y1="308" x2="780" y2="308" stroke="#6e7681" stroke-width="4"/>
  <line x1="500" y1="295" x2="500" y2="315" stroke="#484f58" stroke-width="2"/>
  <line x1="540" y1="295" x2="540" y2="315" stroke="#484f58" stroke-width="2"/>
  <line x1="580" y1="295" x2="580" y2="315" stroke="#484f58" stroke-width="2"/>
  <text x="630" y="292" text-anchor="middle" class="sublabel" fill="#6e7681">Rail</text>

  <!-- Train (Loco + 2 wagons + cargo) -->
  <!-- Loco -->
  <rect x="485" y="282" width="42" height="34" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <rect x="495" y="290" width="22" height="18" rx="2" fill="#21262d"/>
  <circle cx="493" cy="318" r="5" fill="#30363d" stroke="#6e7681"/>
  <circle cx="519" cy="318" r="5" fill="#30363d" stroke="#6e7681"/>
  <text x="506" y="295" text-anchor="middle" font-size="8" fill="#f0883e">L</text>
  <text x="506" y="275" text-anchor="middle" class="label" fill="#f0883e">Locomotive</text>

  <!-- Cargo wagon 1 -->
  <rect x="530" y="283" width="40" height="32" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="535" y="288" width="30" height="22" rx="2" fill="#21262d"/>
  <circle cx="532" cy="317" r="5" fill="#30363d" stroke="#6e7681"/>
  <circle cx="558" cy="317" r="5" fill="#30363d" stroke="#6e7681"/>
  <text x="550" y="276" text-anchor="middle" class="label" fill="#58a6ff">Shell Wagon</text>
  <!-- Shells in wagon -->
  <ellipse cx="543" cy="299" rx="4" ry="7" fill="#484f58" stroke="#8b949e"/>
  <ellipse cx="552" cy="299" rx="4" ry="7" fill="#484f58" stroke="#8b949e"/>

  <!-- Cargo wagon 2 -->
  <rect x="572" y="283" width="40" height="32" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="577" y="288" width="30" height="22" rx="2" fill="#21262d"/>
  <circle cx="574" cy="317" r="5" fill="#30363d" stroke="#6e7681"/>
  <circle cx="600" cy="317" r="5" fill="#30363d" stroke="#6e7681"/>
  <!-- Shells in wagon 2 -->
  <ellipse cx="585" cy="299" rx="4" ry="7" fill="#484f58" stroke="#8b949e"/>
  <ellipse cx="594" cy="299" rx="4" ry="7" fill="#484f58" stroke="#8b949e"/>

  <!-- Depot Stop -->
  <rect x="618" y="330" width="80" height="28" rx="3" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="658" y="348" text-anchor="middle" class="label" fill="#58a6ff">LTN Depot</text>
  <text x="658" y="368" text-anchor="middle" class="sublabel" fill="#8b949e">Idle trains wait here</text>

  <!-- Arrows showing flow -->
  <!-- Arrow: Wagon to outpost -->
  <line x1="610" y1="299" x2="700" y2="299" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrOrange)" stroke-dasharray="5,3"/>
  <text x="655" y="290" text-anchor="middle" class="sublabel" fill="#ffa657">Supply Route</text>

  <!-- Arrow: Train circle back -->
  <path d="M 698 299 Q 720 250 700 210" stroke="#ffa657" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>

  <!-- ===================== BOTTOM LEGEND ===================== -->
  <line x1="20" y1="395" x2="780" y2="395" stroke="#21262d" stroke-width="1"/>
  <text x="25" y="410" class="sublabel" fill="#6e7681">● Orange border = Artillery turret   ● Blue border = Logistic chests   ● Purple = Circuit combinator   ● Red dashed = Fire signal</text>

  <!-- Legend items -->
  <rect x="20" y="400" width="12" height="10" rx="1" fill="none" stroke="#f0883e" stroke-width="1.5"/>
  <text x="36" y="409" class="sublabel" fill="#8b949e">Artillery Turret</text>

  <rect x="140" y="400" width="12" height="10" rx="1" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="156" y="409" class="sublabel" fill="#8b949e">Logistic Chest</text>

  <rect x="268" y="400" width="12" height="10" rx="1" fill="none" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="284" y="409" class="sublabel" fill="#8b949e">Combinator</text>

  <line x1="372" y1="405" x2="384" y2="405" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="390" y="409" class="sublabel" fill="#8b949e">Red Wire</text>

  <circle cx="490" y="405" r="5" fill="#484f58" stroke="#8b949e"/>
  <text x="500" y="409" class="sublabel" fill="#8b949e">Artillery Shell</text>

  <line x1="600" y1="405" x2="612" y2="405" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <text x="618" y="409" class="sublabel" fill="#8b949e">Train path</text>
</svg>
