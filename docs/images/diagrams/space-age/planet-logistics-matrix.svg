<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" height="760" style="background:#1a1a2e;border-radius:8px;font-family:sans-serif">
  <title>Planet Import/Export Logistics Matrix — Factorio Space Age Guide</title>

  <!-- Header -->
  <rect x="0" y="0" height="48" fill="#1f1f2e" rx="8"/>
  <rect x="0" y="42" height="6" fill="#1a1a2e"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#e8941c">PLANET EXPORT/IMPORT LOGISTICS MATRIX</text>

  <!-- Column headers (Destination →) -->
  <text x="155" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#8899bb">SHIP TO →</text>
  <text x="155" y="98" text-anchor="middle" font-size="11" fill="#667788">(Destination)</text>

  <text x="155" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#88bb88">Nauvis</text>
  <text x="155" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#ee7733">Vulcanus</text>
  <text x="155" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#bb88ee">Fulgora</text>
  <text x="155" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#88dd44">Gleba</text>
  <text x="155" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#66bbdd">Aquilo</text>

  <!-- Source ↔ arrow icon -->
  <polygon points="170,78 180,88 170,98" fill="#667788"/>
  <polygon points="170,140 180,150 170,160" fill="#667788"/>
  <polygon points="170,246 180,256 170,266" fill="#667788"/>
  <polygon points="170,352 180,362 170,372" fill="#667788"/>
  <polygon points="170,458 180,468 170,478" fill="#667788"/>
  <polygon points="170,564 180,574 170,584" fill="#667788"/>

  <!-- Row labels (Source ↑) -->
  <text x="60" y="120" transform="rotate(-90,60,120)" font-size="12" font-weight="700" fill="#8899bb">↑ SHIP FROM (Source)</text>

  <circle cx="45" cy="155" r="16" fill="#1a3a1a" stroke="#88bb88" stroke-width="1.5"/>
  <text x="45" y="160" text-anchor="middle" font-size="11" fill="#88bb88">🪐</text>

  <circle cx="45" cy="261" r="16" fill="#2a1a0a" stroke="#ee7733" stroke-width="1.5"/>
  <text x="45" y="266" text-anchor="middle" font-size="11" fill="#ee7733">🌋</text>

  <circle cx="45" cy="367" r="16" fill="#1a0a2e" stroke="#bb88ee" stroke-width="1.5"/>
  <text x="45" y="372" text-anchor="middle" font-size="11" fill="#bb88ee">⚡</text>

  <circle cx="45" cy="473" r="16" fill="#0a2e0a" stroke="#88dd44" stroke-width="1.5"/>
  <text x="45" y="478" text-anchor="middle" font-size="11" fill="#88dd44">🌿</text>

  <circle cx="45" cy="579" r="16" fill="#0a1a2e" stroke="#66bbdd" stroke-width="1.5"/>
  <text x="45" y="584" text-anchor="middle" font-size="11" fill="#66bbdd">❄️</text>

  <!-- ===== CELLS ===== -->

  <!-- === Row 1: Nauvis → Planet === -->

  <!-- Nauvis → Vulcanus -->
  <rect x="240" y="100" width="220" height="56" rx="6" fill="#1e1e2e" stroke="#ee7733" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="460" y1="100" x2="460" y2="156" stroke="#ee7733" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="265" y="122" font-size="11" fill="#ee7733">Uranium fuel cells</text>
  <text x="265" y="140" font-size="11" fill="#aa8855">Quality module 3</text>
  <polygon points="240,108 235,113 240,118" fill="#ee7733" opacity="0.5"/>

  <!-- Nauvis → Fulgora -->
  <rect x="240" y="206" width="220" height="56" rx="6" fill="#1e1e2e" stroke="#bb88ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="460" y1="206" x2="460" y2="262" stroke="#bb88ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="265" y="228" font-size="11" fill="#bb88ee">Rocket fuel</text>
  <text x="265" y="246" font-size="11" fill="#aa8855">Building materials</text>
  <polygon points="240,214 235,219 240,224" fill="#bb88ee" opacity="0.5"/>

  <!-- Nauvis → Gleba -->
  <rect x="240" y="312" width="220" height="56" rx="6" fill="#1e1e2e" stroke="#88dd44" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="460" y1="312" x2="460" y2="368" stroke="#88dd44" stroke-width="0.5" stroke-opacity="0.3"/>
