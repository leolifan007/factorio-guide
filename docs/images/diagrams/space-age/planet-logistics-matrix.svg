  <!-- === Column: Ship FROM each planet === -->

  <!-- To Nauvis (row 1 header) -->
  <text x="530" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#e8941c">↑ To Nauvis</text>

  <!-- From Vulcanus → to Nauvis (shown above already) -->
  <!-- Let me reorg: Right side = summary per destination -->

  <!-- Nauvis imports column -->
  <rect x="478" y="100" width="260" height="140" rx="6" fill="#1a1f1a" stroke="#88bb88" stroke-width="1" stroke-opacity="0.4"/>

  <text x="490" y="122" font-size="12" font-weight="700" fill="#88bb88">Nauvis imports (science hub)</text>

  <circle cx="492" cy="138" r="6" fill="#ee7733"/>
  <text x="502" y="142" font-size="11" fill="#ccc">Calcite, foundry, big miner</text>

  <circle cx="492" cy="156" r="6" fill="#bb88ee"/>
  <text x="502" y="160" font-size="11" fill="#ccc">EM science, EM plants</text>

  <circle cx="492" cy="174" r="6" fill="#88dd44"/>
  <text x="502" y="178" font-size="11" fill="#ccc">Agri science, bioflux</text>

  <circle cx="492" cy="192" r="6" fill="#66bbdd"/>
  <text x="502" y="196" font-size="11" fill="#ccc">Cryogenic science, fusion</text>

  <circle cx="492" cy="210" r="6" fill="#aa8855"/>
  <text x="502" y="214" font-size="11" fill="#ccc">Rocket fuel (from Gleba)</text>

  <circle cx="492" cy="228" r="6" fill="#888"/>
  <text x="502" y="232" font-size="11" fill="#ccc">Rocket parts (from Vulcanus)</text>

  <!-- Vulcanus imports column -->
  <rect x="478" y="250" width="260" height="78" rx="6" fill="#1e1a16" stroke="#ee7733" stroke-width="1" stroke-opacity="0.4"/>
  <text x="490" y="272" font-size="12" font-weight="700" fill="#ee7733">Vulcanus imports</text>
  <circle cx="492" cy="290" r="6" fill="#aa8855"/>
  <text x="502" y="294" font-size="11" fill="#ccc">Bioflux, quality modules</text>
  <circle cx="492" cy="310" r="6" fill="#888"/>
  <text x="502" y="314" font-size="11" fill="#ccc">Uranium fuel cells</text>

  <!-- Fulgora imports column -->
  <rect x="478" y="338" width="260" height="100" rx="6" fill="#1a1620" stroke="#bb88ee" stroke-width="1" stroke-opacity="0.4"/>
  <text x="490" y="360" font-size="12" font-weight="700" fill="#bb88ee">Fulgora imports</text>
  <circle cx="492" cy="378" r="6" fill="#ee7733"/>
  <text x="502" y="382" font-size="11" fill="#ccc">Calcite, tungsten</text>
  <circle cx="492" cy="396" r="6" fill="#88dd44"/>
  <text x="502" y="400" font-size="11" fill="#ccc">Bioflux, rocket fuel</text>
  <circle cx="492" cy="414" r="6" fill="#aa8855"/>
  <text x="502" y="418" font-size="11" fill="#ccc">Building materials</text>

  <!-- Gleba imports column -->
  <rect x="478" y="448" width="260" height="78" rx="6" fill="#162014" stroke="#88dd44" stroke-width="1" stroke-opacity="0.4"/>
  <text x="490" y="470" font-size="12" font-weight="700" fill="#88dd44">Gleba imports</text>
  <circle cx="492" cy="488" r="6" fill="#ee7733"/>
  <text x="502" y="492" font-size="11" fill="#ccc">Calcite, artillery shells</text>
  <circle cx="492" cy="508" r="6" fill="#aa8855"/>
  <text x="502" y="512" font-size="11" fill="#ccc">Rocket fuel, uranium ammo</text>

  <!-- Aquilo imports column -->
  <rect x="478" y="536" width="260" height="156" rx="6" fill="#0e1a24" stroke="#66bbdd" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="490" y="558" font-size="12" font-weight="700" fill="#66bbdd">Aquilo imports (everything)</text>
  <circle cx="492" cy="576" r="6" fill="#888"/>
  <text x="502" y="580" font-size="11" fill="#66bbdd">Iron / copper / steel / stone</text>
  <circle cx="492" cy="594" r="6" fill="#888"/>
  <text x="502" y="598" font-size="11" fill="#66bbdd">Calcite, circuits, modules</text>
  <circle cx="492" cy="612" r="6" fill="#888"/>
  <text x="502" y="616" font-size="11" fill="#66bbdd">Rocket fuel, nuclear fuel</text>
  <circle cx="492" cy="630" r="6" fill="#888"/>
  <text x="502" y="634" font-size="11" fill="#66bbdd">Ammo (red + rockets)</text>
  <circle cx="492" cy="648" r="6" fill="#888"/>
  <text x="502" y="652" font-size="11" fill="#66bbdd">Bioflux, heating tower fuel</text>
  <circle cx="492" cy="666" r="6" fill="#888"/>
  <text x="502" y="670" font-size="11" fill="#66bbdd">Everything else!</text>

  <!-- ===== Bottom Legend ===== -->
  <rect x="10" y="700" width="730" height="48" rx="6" fill="#1f1f2e" stroke="#333" stroke-width="1"/>

  <rect x="20" y="710" width="12" height="12" rx="2" fill="#88bb88" opacity="0.5"/>
  <text x="36" y="720" font-size="10" fill="#8899bb">Nauvis</text>

  <rect x="100" y="710" width="12" height="12" rx="2" fill="#ee7733" opacity="0.5"/>
  <text x="116" y="720" font-size="10" fill="#8899bb">Vulcanus</text>

  <rect x="185" y="710" width="12" height="12" rx="2" fill="#bb88ee" opacity="0.5"/>
  <text x="201" y="720" font-size="10" fill="#8899bb">Fulgora</text>

  <rect x="270" y="710" width="12" height="12" rx="2" fill="#88dd44" opacity="0.5"/>
  <text x="286" y="720" font-size="10" fill="#8899bb">Gleba</text>

  <rect x="345" y="710" width="12" height="12" rx="2" fill="#66bbdd" opacity="0.5"/>
  <text x="361" y="720" font-size="10" fill="#8899bb">Aquilo</text>

  <line x1="430" y1="715" x2="460" y2="715" stroke="#888" stroke-width="1.5"/>
  <polygon points="460,711 470,715 460,719" fill="#888"/>
  <text x="476" y="720" font-size="10" fill="#8899bb">Ship flow</text>

  <text x="580" y="720" font-size="10" fill="#667788">Colors: Each row = source planet</text>
