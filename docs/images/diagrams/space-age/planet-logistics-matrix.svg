  <text x="265" y="352" font-size="11" fill="#aa8855">Uranium ammo</text>
  <polygon points="240,320 235,325 240,330" fill="#88dd44" opacity="0.5"/>

  <!-- Nauvis → Aquilo -->
  <rect x="240" y="418" width="220" height="56" rx="6" fill="#1e2e3e" stroke="#66bbdd" stroke-width="1.5"/>
  <line x1="460" y1="418" x2="460" y2="474" stroke="#66bbdd" stroke-width="1"/>
