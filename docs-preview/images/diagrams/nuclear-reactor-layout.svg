<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" width="980" height="700">
  <defs>
    <style>
      .lbl { font-family: "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="980" height="700" fill="#12121f" rx="10"/>

  <!-- ========== TITLE BAR ========== -->
  <rect x="0" y="0" width="980" height="48" fill="#0a1628" rx="10"/>
  <text x="490" y="32" text-anchor="middle" class="lbl" font-size="15" font-weight="900" fill="#44ff88" letter-spacing="2">NUCLEAR POWER — 2×2 REACTOR LAYOUT</text>

  <!-- ============================================================ -->
  <!-- ROW 1: REACTORS (y: 65 → 230) -->
  <!-- ============================================================ -->
  <text x="220" y="82" class="lbl" font-size="11" fill="#888" font-weight="700">REACTORS (4×)</text>

  <!-- Reactor A (top-left) -->
  <rect x="90" y="95" width="110" height="56" rx="5" fill="#0d1b2a" stroke="#44ff88" stroke-width="2"/>
  <text x="145" y="120" text-anchor="middle" class="lbl" font-size="12" fill="#44ff88" font-weight="700">A</text>
  <text x="145" y="138" text-anchor="middle" class="lbl" font-size="8" fill="#999">1 neighbor · 80 MW</text>

  <!-- Reactor B (top-right) -->
  <rect x="220" y="95" width="110" height="56" rx="5" fill="#0d1b2a" stroke="#44ff88" stroke-width="2"/>
  <text x="275" y="120" text-anchor="middle" class="lbl" font-size="12" fill="#44ff88" font-weight="700">B</text>
  <text x="275" y="138" text-anchor="middle" class="lbl" font-size="8" fill="#ffaa44">2 nbr · 160 MW</text>

  <!-- Reactor C (bottom-left) -->
  <rect x="90" y="165" width="110" height="56" rx="5" fill="#0d1b2a" stroke="#44ff88" stroke-width="2"/>
  <text x="145" y="190" text-anchor="middle" class="lbl" font-size="12" fill="#44ff88" font-weight="700">C</text>
  <text x="145" y="208" text-anchor="middle" class="lbl" font-size="8" fill="#999">1 neighbor · 80 MW</text>

  <!-- Reactor D (bottom-right) -->
  <rect x="220" y="165" width="110" height="56" rx="5" fill="#0d1b2a" stroke="#44ff88" stroke-width="2"/>
  <text x="275" y="190" text-anchor="middle" class="lbl" font-size="12" fill="#44ff88" font-weight="700">D</text>
  <text x="275" y="208" text-anchor="middle" class="lbl" font-size="8" fill="#ffaa44">2 nbr · 160 MW</text>

  <!-- Neighbor bonus: A↔B (horizontal) -->
  <line x1="200" y1="115" x2="220" y2="115" stroke="#44ff88" stroke-width="1.2" stroke-dasharray="4"/>
  <text x="210" y="111" text-anchor="middle" class="lbl" font-size="7" fill="#44ff88">+100%</text>

  <!-- Neighbor bonus: C↔D (horizontal) -->
  <line x1="200" y1="185" x2="220" y2="185" stroke="#44ff88" stroke-width="1.2" stroke-dasharray="4"/>
  <text x="210" y="181" text-anchor="middle" class="lbl" font-size="7" fill="#44ff88">+100%</text>

  <!-- Neighbor bonus: A↔C (vertical) -->
  <line x1="145" y1="151" x2="145" y2="165" stroke="#44ff88" stroke-width="1.2" stroke-dasharray="4"/>
  <text x="155" y="161" class="lbl" font-size="7" fill="#44ff88">+100%</text>

  <!-- Neighbor bonus: B↔D (vertical) -->
  <line x1="275" y1="151" x2="275" y2="165" stroke="#44ff88" stroke-width="1.2" stroke-dasharray="4"/>
  <text x="285" y="161" class="lbl" font-size="7" fill="#ffaa44">+300%</text>

  <!-- Total output -->
  <text x="275" y="250" text-anchor="end" class="lbl" font-size="11" fill="#ffaa44" font-weight="700">Total: 480 MW</text>
  <text x="275" y="265" text-anchor="end" class="lbl" font-size="8" fill="#666">Each pair of touching reactors doubles output</text>

  <!-- ============================================================ -->
  <!-- ARROW: REACTORS → HEAT PIPES -->
  <!-- ============================================================ -->
  <line x1="340" y1="160" x2="400" y2="160" stroke="#cc7733" stroke-width="2.5"/>
  <polygon points="400,155 408,160 400,165" fill="#cc7733"/>
  <text x="370" y="152" text-anchor="middle" class="lbl" font-size="8" fill="#cc7733">1000°C</text>

  <!-- ============================================================ -->
  <!-- ROW 2: HEAT PIPES + HEAT EXCHANGERS + TURBINES (y: 65 → 300) -->
  <!-- ============================================================ -->
  <text x="560" y="82" class="lbl" font-size="11" fill="#cc7733" font-weight="700">HEAT PIPES (3× parallel)</text>

  <!-- 3 parallel heat pipes -->
  <rect x="460" y="95" width="14" height="130" rx="3" fill="#2a1a0a" stroke="#cc7733" stroke-width="1.2"/>
  <rect x="482" y="95" width="14" height="130" rx="3" fill="#2a1a0a" stroke="#cc7733" stroke-width="1.2"/>
  <rect x="504" y="95" width="14" height="130" rx="3" fill="#2a1a0a" stroke="#cc7733" stroke-width="1.2"/>
  <text x="487" y="140" text-anchor="middle" class="lbl" font-size="8" fill="#cc7733" font-weight="700">3×</text>
  <text x="487" y="155" text-anchor="middle" class="lbl" font-size="7" fill="#aa7744">1000°C</text>
  <text x="487" y="168" text-anchor="middle" class="lbl" font-size="7" fill="#aa7744">↓</text>
  <text x="487" y="180" text-anchor="middle" class="lbl" font-size="7" fill="#aa7744">500°C</text>

  <!-- Arrow: heat pipes → exchangers -->
  <line x1="520" y1="160" x2="560" y2="160" stroke="#ff6644" stroke-width="2.5"/>
  <polygon points="560,155 568,160 560,165" fill="#ff6644"/>

  <!-- Heat Exchangers (right of pipes) -->
  <text x="730" y="82" class="lbl" font-size="11" fill="#ff6644" font-weight="700">HEAT EXCHANGERS ×48</text>
  <text x="730" y="96" text-anchor="middle" class="lbl" font-size="8" fill="#884422">12 per reactor · output: 500°C steam</text>

  <rect x="570" y="108" width="200" height="20" rx="3" fill="#1a0a0a" stroke="#ff6644" stroke-width="1.2"/>
  <text x="670" y="122" text-anchor="middle" class="lbl" font-size="9" fill="#ff6644">×12  →  500°C steam</text>

  <rect x="570" y="134" width="200" height="20" rx="3" fill="#1a0a0a" stroke="#ff6644" stroke-width="1.2"/>
  <text x="670" y="148" text-anchor="middle" class="lbl" font-size="9" fill="#ff6644">×12  →  500°C steam</text>

  <rect x="570" y="160" width="200" height="20" rx="3" fill="#1a0a0a" stroke="#ff6644" stroke-width="1.2"/>
  <text x="670" y="174" text-anchor="middle" class="lbl" font-size="9" fill="#ff6644">×12  →  500°C steam</text>

  <rect x="570" y="186" width="200" height="20" rx="3" fill="#1a0a0a" stroke="#ff6644" stroke-width="1.2"/>
  <text x="670" y="200" text-anchor="middle" class="lbl" font-size="9" fill="#ff6644">×12  →  500°C steam</text>

  <!-- Arrow: exchangers → turbines -->
  <line x1="772" y1="190" x2="810" y2="190" stroke="#88ccff" stroke-width="2.5"/>
  <polygon points="810,185 818,190 810,195" fill="#88ccff"/>

  <!-- Steam Turbines (right of exchangers) -->
  <text x="910" y="82" class="lbl" font-size="11" fill="#88ccff" font-weight="700">TURBINES ×84</text>
  <text x="910" y="96" text-anchor="middle" class="lbl" font-size="8" fill="#445566">21 per reactor · 5.8 MW each</text>

  <rect x="820" y="108" width="180" height="20" rx="3" fill="#0a1628" stroke="#88ccff" stroke-width="1.2"/>
  <text x="910" y="122" text-anchor="middle" class="lbl" font-size="9" fill="#88ccff">×21  →  121.8 MW</text>

  <rect x="820" y="134" width="180" height="20" rx="3" fill="#0a1628" stroke="#88ccff" stroke-width="1.2"/>
  <text x="910" y="148" text-anchor="middle" class="lbl" font-size="9" fill="#88ccff">×21  →  121.8 MW</text>

  <rect x="820" y="160" width="180" height="20" rx="3" fill="#0a1628" stroke="#88ccff" stroke-width="1.2"/>
  <text x="910" y="174" text-anchor="middle" class="lbl" font-size="9" fill="#88ccff">×21  →  121.8 MW</text>

  <rect x="820" y="186" width="180" height="20" rx="3" fill="#0a1628" stroke="#88ccff" stroke-width="1.2"/>
  <text x="910" y="200" text-anchor="middle" class="lbl" font-size="9" fill="#88ccff">×21  →  121.8 MW</text>

  <!-- Water supply (far right) -->
  <rect x="930" y="108" width="36" height="98" rx="4" fill="#0a1a2a" stroke="#44aaff" stroke-width="1.2"/>
  <text x="948" y="148" text-anchor="middle" class="lbl" font-size="9" fill="#44aaff" font-weight="700">H₂O</text>
  <text x="948" y="163" text-anchor="middle" class="lbl" font-size="7" fill="#4488cc">4×</text>
  <text x="948" y="175" text-anchor="middle" class="lbl" font-size="7" fill="#4488cc">pumps</text>

  <!-- ============================================================ -->
  <!-- SEPARATOR -->
  <!-- ============================================================ -->
  <line x1="40" y1="240" x2="940" y2="240" stroke="#222" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- SUMMARY BAR (y: 252 → 345) -->
  <!-- ============================================================ -->
  <rect x="40" y="252" width="900" height="93" rx="6" fill="#0a1628" stroke="#44ff88" stroke-width="1.5"/>

  <text x="490" y="278" text-anchor="middle" class="lbl" font-size="13" fill="#44ff88" font-weight="900">2×2 REACTOR = 480 MW TOTAL</text>

  <line x1="40" y1="290" x2="940" y2="290" stroke="#1a3a1a" stroke-width="0.5"/>

  <!-- 5 stat columns, evenly spaced -->
  <text x="146" y="308" text-anchor="middle" class="lbl" font-size="8" fill="#666">REACTORS</text>
  <text x="146" y="328" text-anchor="middle" class="lbl" font-size="13" fill="#44ff88" font-weight="700">4</text>
  <text x="146" y="340" text-anchor="middle" class="lbl" font-size="7" fill="#444">+neighbor bonus</text>

  <text x="302" y="308" text-anchor="middle" class="lbl" font-size="8" fill="#666">HEAT EXCHANGERS</text>
  <text x="302" y="328" text-anchor="middle" class="lbl" font-size="13" fill="#ff6644" font-weight="700">48</text>
  <text x="302" y="340" text-anchor="middle" class="lbl" font-size="7" fill="#444">12 per reactor</text>

  <text x="458" y="308" text-anchor="middle" class="lbl" font-size="8" fill="#666">STEAM TURBINES</text>
  <text x="458" y="328" text-anchor="middle" class="lbl" font-size="13" fill="#88ccff" font-weight="700">84</text>
  <text x="458" y="340" text-anchor="middle" class="lbl" font-size="7" fill="#444">21 per reactor</text>

  <text x="614" y="308" text-anchor="middle" class="lbl" font-size="8" fill="#666">OFFSHORE PUMPS</text>
  <text x="614" y="328" text-anchor="middle" class="lbl" font-size="13" fill="#44aaff" font-weight="700">4</text>
  <text x="614" y="340" text-anchor="middle" class="lbl" font-size="7" fill="#444">1 per 12 HX</text>

  <text x="770" y="308" text-anchor="middle" class="lbl" font-size="8" fill="#666">FUEL CELLS / HR</text>
  <text x="770" y="328" text-anchor="middle" class="lbl" font-size="13" fill="#ffaa44" font-weight="700">~72</text>
  <text x="770" y="340" text-anchor="middle" class="lbl" font-size="7" fill="#444">18 per reactor</text>

  <!-- ============================================================ -->
  <!-- SEPARATOR -->
  <!-- ============================================================ -->
  <line x1="40" y1="360" x2="940" y2="360" stroke="#222" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- FUEL CYCLE (y: 372 → 430) -->
  <!-- ============================================================ -->
  <text x="490" y="388" text-anchor="middle" class="lbl" font-size="10" fill="#aaa" font-weight="700">FUEL CYCLE</text>

  <!-- Node 1: Mining -->
  <rect x="120" y="400" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="170" y="416" text-anchor="middle" class="lbl" font-size="8" fill="#ccc">Uranium Mining</text>
  <text x="170" y="428" text-anchor="middle" class="lbl" font-size="7" fill="#555">1 drill</text>

  <!-- Arrow 1→2 -->
  <line x1="222" y1="418" x2="250" y2="418" stroke="#555" stroke-width="1.5"/>
  <polygon points="248,414 254,418 248,422" fill="#555"/>

  <!-- Node 2: Centrifuge -->
  <rect x="255" y="400" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="305" y="416" text-anchor="middle" class="lbl" font-size="8" fill="#ccc">Centrifuge ×5</text>
  <text x="305" y="428" text-anchor="middle" class="lbl" font-size="7" fill="#555">0.7% → U-235</text>

  <!-- Arrow 2→3 -->
  <line x1="357" y1="418" x2="385" y2="418" stroke="#555" stroke-width="1.5"/>
  <polygon points="383,414 389,418 383,422" fill="#555"/>

  <!-- Node 3: Fuel Assembler -->
  <rect x="390" y="400" width="110" height="36" rx="4" fill="#1a1a2e" stroke="#aa8800" stroke-width="1"/>
  <text x="445" y="416" text-anchor="middle" class="lbl" font-size="8" fill="#ccc">Fuel Assembler</text>
  <text x="445" y="428" text-anchor="middle" class="lbl" font-size="7" fill="#aa8800">19 U-238 + 1 U-235</text>

  <!-- Arrow 3→4 -->
  <line x1="502" y1="418" x2="530" y2="418" stroke="#555" stroke-width="1.5"/>
  <polygon points="528,414 534,418 528,422" fill="#555"/>

  <!-- Node 4: Reactor -->
  <rect x="535" y="400" width="100" height="36" rx="4" fill="#0a1a2a" stroke="#44ff88" stroke-width="1.5"/>
  <text x="585" y="416" text-anchor="middle" class="lbl" font-size="8" fill="#44ff88" font-weight="700">→ Reactor</text>
  <text x="585" y="428" text-anchor="middle" class="lbl" font-size="7" fill="#44ff88">200 s / cell</text>

  <!-- Kovarex note -->
  <text x="700" y="414" class="lbl" font-size="7" fill="#ffaa44">⚡ Kovarex needs 40 U-235</text>
  <text x="700" y="426" class="lbl" font-size="7" fill="#ffaa44">   then fuel is infinite</text>

  <!-- ============================================================ -->
  <!-- NOTES (bottom) -->
  <!-- ============================================================ -->
  <text x="490" y="468" text-anchor="middle" class="lbl" font-size="8" fill="#444">Note: 1 offshore pump feeds 12 heat exchangers. 3 parallel heat pipes minimum for 2×2. Use ≥50 steam tanks before circuit-controlled fuel.</text>

</svg>
