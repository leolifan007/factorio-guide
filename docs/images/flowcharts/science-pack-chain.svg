<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="520" fill="#1f1f1f" rx="6"/>
  <!-- Grid lines -->
  <line x1="0" y1="85" x2="960" y2="85" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="260" x2="960" y2="260" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="435" x2="960" y2="435" stroke="#333" stroke-width="1"/>
  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="18" font-weight="900" fill="#e8941c">FACTORIO SCIENCE PACK PRODUCTION CHAIN</text>

  <!-- ==================== TIER 1: RED SCIENCE ==================== -->
  <text x="105" y="77" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="3">TIER 1</text>

  <!-- Iron ore -->
  <rect x="10" y="100" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <circle cx="45" cy="123" r="16" fill="#b8b8b8"/>
  <circle cx="45" cy="123" r="9" fill="#909090"/>
  <text x="45" y="168" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Iron Ore</text>

  <!-- Arrow: Iron ore → Furnace -->
  <line x1="80" y1="127" x2="100" y2="127" stroke="#e8941c" stroke-width="2"/>
  <polygon points="100,123 106,127 100,131" fill="#e8941c"/>

  <!-- Furnace -->
  <rect x="106" y="100" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <rect x="114" y="106" width="54" height="43" rx="2" fill="#888"/>
  <rect x="120" y="110" width="42" height="35" rx="1" fill="#9a9a9a"/>
  <text x="141" y="168" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Furnace</text>

  <!-- Arrow: Furnace → Iron plate -->
  <line x1="176" y1="127" x2="196" y2="127" stroke="#e8941c" stroke-width="2"/>
  <polygon points="196,123 202,127 196,131" fill="#e8941c"/>

  <!-- Iron plate -->
  <rect x="202" y="100" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="214" y="110" width="46" height="35" rx="1" fill="#b8b8b8"/>
  <rect x="220" y="115" width="34" height="25" rx="1" fill="#d0d0d0"/>
  <text x="237" y="168" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Iron Plate</text>

  <!-- Second chain: Coal → Copper plate → Copper cable -->
  <rect x="10" y="175" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <polygon points="45,180 65,225 25,225" fill="#3a3a3a"/>
  <text x="45" y="243" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Coal</text>

  <line x1="80" y1="202" x2="100" y2="202" stroke="#e8941c" stroke-width="2"/>
  <polygon points="100,198 106,202 100,206" fill="#e8941c"/>

  <rect x="106" y="175" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <rect x="114" y="181" width="54" height="43" rx="2" fill="#c8824c"/>
  <rect x="120" y="185" width="42" height="35" rx="1" fill="#e09860"/>
  <text x="141" y="243" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Copper Plate</text>

  <line x1="176" y1="202" x2="196" y2="202" stroke="#e8941c" stroke-width="2"/>
  <polygon points="196,198 202,202 196,206" fill="#e8941c"/>

  <rect x="202" y="175" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <path d="M215 217 Q237 195 259 217" stroke="#c8824c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="237" y="243" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Copper Cable</text>

  <!-- Gear from iron plate (arrow goes right to gear) -->
  <line x1="237" y1="155" x2="237" y2="182" stroke="#e8941c" stroke-width="2"/>
  <line x1="237" y1="182" x2="310" y2="182" stroke="#e8941c" stroke-width="2"/>
  <polygon points="310,179 316,182 310,185" fill="#e8941c"/>

  <!-- Iron Gear -->
  <rect x="310" y="138" width="70" height="55" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <circle cx="345" cy="163" r="14" fill="#888"/>
  <circle cx="345" cy="163" r="8" fill="#aaa"/>
  <text x="345" y="205" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Iron Gear</text>

  <!-- Arrow: Gear → Red Science Assembler -->
  <line x1="380" y1="165" x2="408" y2="165" stroke="#e8941c" stroke-width="2"/>
  <polygon points="408,161 415,165 408,169" fill="#e8941c"/>

  <!-- Red science pack output -->
  <rect x="415" y="135" width="85" height="62" rx="4" fill="#2a2a2a" stroke="#e8941c" stroke-width="2"/>
  <rect x="428" y="146" width="59" height="40" rx="3" fill="#e8941c"/>
  <rect x="434" y="151" width="47" height="30" rx="2" fill="#f5aa2e"/>
  <text x="457" y="212" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="11" font-weight="700" fill="#e8941c">RED SCIENCE</text>

  <!-- ==================== TIER 2: GREEN SCIENCE ==================== -->
  <text x="535" y="77" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="3">TIER 2</text>

  <!-- Inserter -->
  <rect x="520" y="100" width="72" height="58" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <circle cx="556" cy="124" r="12" fill="#888"/>
  <rect x="552" y="106" width="8" height="16" rx="1" fill="#aaa" transform="rotate(30 556 124)"/>
  <text x="556" y="170" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Inserter</text>

  <!-- Belt -->
  <rect x="612" y="100" width="72" height="58" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="622" y="124" width="52" height="16" rx="2" fill="#8b6914"/>
  <rect x="628" y="128" width="8" height="8" rx="1" fill="#6b4c10"/>
  <rect x="642" y="128" width="8" height="8" rx="1" fill="#6b4c10"/>
  <text x="648" y="170" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Transport Belt</text>

  <!-- Splitter -->
  <rect x="704" y="100" width="72" height="58" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="714" y="124" width="52" height="16" rx="2" fill="#8b6914"/>
  <rect x="732" y="106" width="14" height="50" rx="2" fill="#c8824c"/>
  <text x="740" y="170" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="10" fill="#999">Splitter</text>

  <!-- Arrow: Splitter → Green Science -->
  <line x1="776" y1="129" x2="802" y2="129" stroke="#6abe30" stroke-width="2"/>
  <polygon points="802,125 809,129 802,133" fill="#6abe30"/>

  <!-- Green science pack output -->
  <rect x="809" y="100" width="95" height="58" rx="4" fill="#2a2a2a" stroke="#6abe30" stroke-width="2"/>
  <rect x="822" y="112" width="69" height="34" rx="2" fill="#6abe30"/>
  <rect x="828" y="117" width="57" height="24" rx="1" fill="#8ad44a"/>
  <text x="856" y="172" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="11" font-weight="700" fill="#6abe30">GREEN SCIENCE</text>

  <!-- ==================== TIER 3: BLUE SCIENCE ==================== -->
  <text x="535" y="252" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="3">TIER 3</text>

  <!-- Steel Plate -->
  <rect x="462" y="275" width="68" height="52" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="471" y="283" width="50" height="36" rx="2" fill="#7070a0"/>
  <text x="496" y="340" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Steel Plate</text>

  <!-- Engine Unit -->
  <rect x="542" y="275" width="68" height="52" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <circle cx="576" cy="299" r="12" fill="#888"/>
  <rect x="572" y="281" width="8" height="14" rx="1" fill="#aaa"/>
  <text x="576" y="340" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Engine Unit</text>

  <!-- Electric Circuit -->
  <rect x="620" y="275" width="68" height="52" rx="4" fill="#2a2a2a" stroke="#44bb44" stroke-width="2"/>
  <rect x="628" y="283" width="52" height="36" rx="2" fill="#44bb44"/>
  <rect x="634" y="289" width="40" height="24" rx="1" fill="#228822"/>
  <text x="654" y="340" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#999">Elec. Circuit</text>

  <!-- Arrows: Steel → Engine → Elec Circuit -->
  <line x1="530" y1="301" x2="542" y2="301" stroke="#3778c8" stroke-width="2"/>
  <polygon points="542,297 549,301 542,305" fill="#3778c8"/>
  <line x1="610" y1="301" x2="620" y2="301" stroke="#3778c8" stroke-width="2"/>
  <polygon points="620,297 627,301 620,305" fill="#3778c8"/>

  <!-- Blue science pack output -->
  <rect x="700" y="270" width="88" height="64" rx="4" fill="#2a2a2a" stroke="#3778c8" stroke-width="2"/>
  <rect x="713" y="281" width="62" height="42" rx="3" fill="#3778c8"/>
  <rect x="719" y="287" width="50" height="30" rx="2" fill="#5599ff"/>
  <text x="744" y="348" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="11" font-weight="700" fill="#5599ff">BLUE SCIENCE</text>

  <!-- ==================== TIER 4+5: PURPLE / YELLOW / SPACE (vertical column) ==================== -->
  <text x="850" y="252" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#888" letter-spacing="2">TIER 4-5</text>

  <!-- Purple Science -->
  <rect x="800" y="270" width="100" height="48" rx="4" fill="#2a2a2a" stroke="#9d4edd" stroke-width="2"/>
  <rect x="814" y="280" width="72" height="28" rx="3" fill="#9d4edd"/>
  <rect x="820" y="285" width="60" height="18" rx="2" fill="#b366ff"/>
  <text x="850" y="332" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#9d4edd">PURPLE</text>

  <!-- Yellow Science -->
  <rect x="800" y="350" width="100" height="48" rx="4" fill="#2a2a2a" stroke="#ff7700" stroke-width="2"/>
  <rect x="814" y="360" width="72" height="28" rx="3" fill="#ff7700"/>
  <rect x="820" y="365" width="60" height="18" rx="2" fill="#ff9922"/>
  <text x="850" y="412" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#ff7700">YELLOW</text>

  <!-- Space Science -->
  <rect x="800" y="430" width="100" height="48" rx="4" fill="#2a2a2a" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="814" y="440" width="72" height="28" rx="3" fill="#e0e0e0"/>
  <rect x="820" y="445" width="60" height="18" rx="2" fill="#f5f5f5"/>
  <text x="850" y="492" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#e0e0e0">SPACE</text>

  <!-- Rocket icon below Space -->
  <polygon points="850,498 862,538 838,538" fill="#888"/>
  <rect x="841" y="512" width="18" height="18" rx="2" fill="#4488ff"/>

  <!-- Legend -->
  <rect x="10" y="450" width="12" height="12" rx="2" fill="#2a2a2a" stroke="#444"/>
  <rect x="12" y="452" width="8" height="8" rx="1" fill="#888"/>
  <text x="28" y="461" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Machine / Building</text>
  <rect x="160" y="450" width="12" height="12" rx="2" fill="#2a2a2a" stroke="#444"/>
  <rect x="162" y="452" width="8" height="8" rx="1" fill="#b8b8b8"/>
  <text x="178" y="461" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Raw Resource</text>
  <rect x="300" y="450" width="12" height="12" rx="2" fill="#e8941c"/>
  <text x="318" y="461" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Arrow = Recipe Flow</text>
  <rect x="460" y="450" width="12" height="12" rx="2" fill="#2a2a2a" stroke="#6abe30" stroke-width="2"/>
  <rect x="462" y="452" width="8" height="8" rx="1" fill="#6abe30"/>
  <text x="478" y="461" font-family="Rajdhani,sans-serif" font-size="10" fill="#888">Science Pack Output</text>
</svg>