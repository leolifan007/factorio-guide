<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#58a6ff"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#f0883e"/></marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#3fb950"/></marker>
  </defs>
  <style>.bg{fill:#0d1117}.box{fill:#161b22;stroke-width:2;rx:8}.lbl{font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:bold;fill:#e6edf3}.sub{font-family:'Segoe UI',sans-serif;font-size:14px;fill:#8b949e}.arr{stroke-width:3;fill:none}.tag{font-family:'Segoe UI',sans-serif;font-size:12px;fill:#c9d1d9}</style>
  <rect width="900" height="420" class="bg" rx="10"/>
  <text x="450" y="38" text-anchor="middle" style="font-family:'Segoe UI';font-size:22px;font-weight:bold;fill:#e6edf3">Aquilo Power Chain</text>
  <line x1="30" y1="52" x2="870" y2="52" stroke="#21262d" stroke-width="1"/>
  <rect x="40" y="80" width="160" height="90" class="box" stroke="#58a6ff"/><text x="120" y="125" text-anchor="middle" class="lbl">Ice Patch</text><text x="120" y="150" text-anchor="middle" class="sub">Burner Drill</text>
  <line x1="200" y1="125" x2="260" y2="125" class="arr" stroke="#58a6ff" marker-end="url(#a1)"/><text x="230" y="115" text-anchor="middle" class="tag">Ice Chunks</text>
  <rect x="270" y="80" width="180" height="90" class="box" stroke="#f0883e"/><text x="360" y="118" text-anchor="middle" class="lbl">Smelter Array</text><text x="360" y="145" text-anchor="middle" class="sub">4 units → Heat + Steam</text>
  <line x1="450" y1="125" x2="520" y2="125" class="arr" stroke="#f0883e" marker-end="url(#a2)"/><text x="485" y="115" text-anchor="middle" class="tag">Heat + Steam</text>
  <rect x="530" y="75" width="150" height="50" class="box" stroke="#3fb950"/><text x="605" y="106" text-anchor="middle" class="lbl" style="font-size:16px">Steam Turbine</text>
  <rect x="530" y="135" width="150" height="45" class="box" stroke="#f0883e"/><text x="605" y="163" text-anchor="middle" class="lbl" style="font-size:15px">Heat Pipes</text>
  <line x1="680" y1="100" x2="750" y2="100" class="arr" stroke="#3fb950" marker-end="url(#a3)"/><rect x="760" y="72" width="120" height="55" class="box" stroke="#3fb950"/><text x="820" y="98" text-anchor="middle" class="lbl" style="font-size:17px">~500 kW</text><text x="820" y="117" text-anchor="middle" class="sub">Electricity</text>
  <line x1="680" y1="158" x2="750" y2="158" class="arr" stroke="#f0883e" marker-end="url(#a2)"/><rect x="760" y="135" width="120" height="55" class="box" stroke="#f0883e"/><text x="820" y="161" text-anchor="middle" class="lbl" style="font-size:17px">Heat Net</text><text x="820" y="180" text-anchor="middle" class="sub">All Buildings</text>
  <rect x="40" y="220" width="820" height="180" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="450" y="252" text-anchor="middle" style="font-family:'Segoe UI';font-size:18px;font-weight:bold;fill:#e6edf3">Key Numbers</text><line x1="60" y1="265" x2="840" y2="265" stroke="#21262d"/>
  <text x="70" y="295" style="font-family:'Segoe UI';font-size:16px;font-weight:bold;fill:#58a6ff">4 Smelters</text><text x="70" y="318" class="sub">= ~500 kW power output</text>
  <text x="280" y="295" style="font-family:'Segoe UI';font-size:16px;font-weight:bold;fill:#f0883e">Heat Pipe Range</text><text x="280" y="318" class="sub">4 tiles per pipe segment</text>
  <text x="500" y="295" style="font-family:'Segoe UI';font-size:16px;font-weight:bold;fill:#3fb950">Buffer Rule</text><text x="500" y="318" class="sub">Build 50% extra heat capacity</text>
  <text x="700" y="295" style="font-family:'Segoe UI';font-size:16px;font-weight:bold;fill:#da3633">Lithium Source</text><text x="700" y="318" class="sub">Import from Gleba (not local)</text>
  <rect x="60" y="340" width="780" height="48" rx="6" fill="#da3633" fill-opacity="0.12" stroke="#da3633" stroke-width="1"/><text x="450" y="370" text-anchor="middle" style="font-family:'Segoe UI';font-size:15px;font-weight:bold;fill:#f85149">No gap in heat network = no freeze point. No ice = no heat = no power.</text>
</svg>