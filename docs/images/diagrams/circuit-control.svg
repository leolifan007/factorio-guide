<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 390" width="100%" height="auto" style="background:#151515;font-family:system-ui,-apple-system,sans-serif">
  <title>Circuit Control — Oil Cracking Automation</title>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr-flow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#888"/></marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="950" height="44" fill="#1f1f1f" rx="6"/>
  <rect x="0" y="38" width="950" height="6" fill="#1f1f1f"/>
  <text x="475" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#e8941c" filter="url(#glow)">CIRCUIT-CONTROLLED CRACKING — Deadlock Prevention</text>

  <!-- ===== TOP ROW: Heavy Oil Control ===== -->
  <rect x="12" y="55" width="455" height="150" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="1.5"/>
  <text x="239" y="76" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">Heavy Oil Control</text>

  <!-- Tank -->
  <rect x="25" y="90" width="120" height="65" rx="5" fill="#1a0f00" stroke="#8b4513" stroke-width="2"/>
  <rect x="25" y="90" width="120" height="22" rx="5" fill="#8b4513"/>
  <rect x="25" y="105" width="120" height="7" fill="#8b4513"/>
  <text x="85" y="107" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Storage Tank</text>
  <!-- Fluid bar -->
  <rect x="35" y="120" width="100" height="14" rx="2" fill="#0a0500" stroke="#8b4513" stroke-width="1"/>
  <rect x="36" y="121" width="80" height="12" rx="1" fill="#8b4513" opacity="0.7"/>
  <text x="85" y="145" text-anchor="middle" font-size="16" fill="#d4a017">Heavy: 24k / 25k</text>

  <!-- Red Wire -->
  <line x1="145" y1="120" x2="178" y2="120" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="161" y="112" text-anchor="middle" font-size="16" fill="#c9463d">🔴</text>

  <!-- Decider Combinator -->
  <rect x="182" y="90" width="145" height="65" rx="5" fill="#1a2a1a" stroke="#6abe30" stroke-width="2"/>
  <rect x="182" y="90" width="145" height="22" rx="5" fill="#6abe30"/>
  <rect x="182" y="105" width="145" height="7" fill="#6abe30"/>
  <text x="254" y="107" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Decider</text>

  <rect x="190" y="118" width="130" height="30" rx="3" fill="#0f0f0f" stroke="#555" stroke-width="1"/>
  <text x="255" y="131" text-anchor="middle" font-size="16" fill="#6abe30" font-weight="600">heavy &gt; 20000</text>
  <text x="255" y="148" text-anchor="middle" font-size="16" fill="#888">→ output H = 1</text>

  <!-- Wire -->
  <line x1="327" y1="120" x2="355" y2="120" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Pump -->
  <rect x="358" y="95" width="35" height="40" rx="4" fill="#2a1a00" stroke="#d4a017" stroke-width="1.5"/>
  <text x="375" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">⏏</text>
  <text x="375" y="130" text-anchor="middle" font-size="16" fill="#888">Pump</text>

  <!-- Arrow to right -->
  <line x1="393" y1="115" x2="410" y2="115" stroke="#888" stroke-width="2" marker-end="url(#arr-flow)"/>
  <text x="415" y="118" font-size="16" fill="#777">→ Cracker H→L</text>

  <!-- ===== BOTTOM ROW: Light Oil Control ===== -->
  <rect x="12" y="215" width="455" height="150" rx="5" fill="#1a1a00" stroke="#d4a017" stroke-width="1.5"/>
  <text x="239" y="236" text-anchor="middle" font-size="16" font-weight="700" fill="#f0c040">Light Oil Control</text>

  <!-- Tank -->
  <rect x="25" y="250" width="120" height="65" rx="5" fill="#1a1a00" stroke="#d4a017" stroke-width="2"/>
  <rect x="25" y="250" width="120" height="22" rx="5" fill="#d4a017"/>
  <rect x="25" y="265" width="120" height="7" fill="#d4a017"/>
  <text x="85" y="267" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Storage Tank</text>
  <rect x="35" y="280" width="100" height="14" rx="2" fill="#0a0a00" stroke="#d4a017" stroke-width="1"/>
  <rect x="36" y="281" width="70" height="12" rx="1" fill="#d4a017" opacity="0.7"/>
  <text x="85" y="305" text-anchor="middle" font-size="16" fill="#f0c040">Light: 21k / 25k</text>

  <!-- Red Wire -->
  <line x1="145" y1="280" x2="178" y2="280" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Decider -->
  <rect x="182" y="250" width="145" height="65" rx="5" fill="#1a2a1a" stroke="#6abe30" stroke-width="2"/>
  <rect x="182" y="250" width="145" height="22" rx="5" fill="#6abe30"/>
  <rect x="182" y="265" width="145" height="7" fill="#6abe30"/>
  <text x="254" y="267" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Decider</text>

  <rect x="190" y="278" width="130" height="30" rx="3" fill="#0f0f0f" stroke="#555" stroke-width="1"/>
  <text x="255" y="291" text-anchor="middle" font-size="16" fill="#6abe30" font-weight="600">light &gt; 20000</text>
  <text x="255" y="308" text-anchor="middle" font-size="16" fill="#888">→ output L = 1</text>

  <!-- Wire -->
  <line x1="327" y1="280" x2="355" y2="280" stroke="#c9463d" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Pump -->
  <rect x="358" y="255" width="35" height="40" rx="4" fill="#2a1a00" stroke="#d4a017" stroke-width="1.5"/>
  <text x="375" y="273" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a017">⏏</text>
  <text x="375" y="290" text-anchor="middle" font-size="16" fill="#888">Pump</text>

  <!-- Arrow -->
  <line x1="393" y1="275" x2="410" y2="275" stroke="#888" stroke-width="2" marker-end="url(#arr-flow)"/>
  <text x="415" y="278" font-size="16" fill="#777">→ Cracker L→P</text>

  <!-- ===== RIGHT PANEL: LOGIC EXPLANATION ===== -->
  <rect x="480" y="55" width="458" height="310" rx="6" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="709" y="78" text-anchor="middle" font-size="16" font-weight="700" fill="#e8941c">Circuit Control Logic</text>
  <line x1="495" y1="88" x2="923" y2="88" stroke="#333" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="495" y="100" width="428" height="55" rx="4" fill="#0a0f00" stroke="#8b4513" stroke-width="1"/>
  <circle cx="515" cy="122" r="10" fill="#c9463d"/>
  <text x="515" y="127" text-anchor="middle" font-size="16" fill="#111" font-weight="700">1</text>
  <text x="535" y="120" font-size="16" fill="#ccc" font-weight="600">Connect Red Wire</text>
  <text x="535" y="140" font-size="16" fill="#888">From heavy oil tank → decider combinator</text>

  <!-- Step 2 -->
  <rect x="495" y="165" width="428" height="55" rx="4" fill="#0a0f00" stroke="#d4a017" stroke-width="1"/>
  <circle cx="515" cy="187" r="10" fill="#c9463d"/>
  <text x="515" y="192" text-anchor="middle" font-size="16" fill="#111" font-weight="700">2</text>
  <text x="535" y="185" font-size="16" fill="#ccc" font-weight="600">Set Condition</text>
  <text x="535" y="205" font-size="16" fill="#888">heavy_oil &gt; 20000 → output H = 1</text>

  <!-- Step 3 -->
  <rect x="495" y="230" width="428" height="55" rx="4" fill="#0a0f00" stroke="#5599ee" stroke-width="1"/>
  <circle cx="515" cy="252" r="10" fill="#c9463d"/>
  <text x="515" y="257" text-anchor="middle" font-size="16" fill="#111" font-weight="700">3</text>
  <text x="535" y="250" font-size="16" fill="#ccc" font-weight="600">Connect to Pump</text>
  <text x="535" y="270" font-size="16" fill="#888">Decoder output → pump feeding cracker</text>

  <!-- Note -->
  <rect x="495" y="300" width="428" height="50" rx="4" fill="#0a1f0a" stroke="#44aa77" stroke-width="1"/>
  <text x="709" y="322" text-anchor="middle" font-size="16" font-weight="600" fill="#66cc99">Repeat for Light Oil: light &gt; 20000 → L = 1 → L→P pump</text>
  <text x="709" y="340" text-anchor="middle" font-size="16" fill="#777">This prevents deadlock while preserving lubricant and fuel buffers</text>
</svg>
