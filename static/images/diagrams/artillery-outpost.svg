<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs><marker id="b1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#58a6ff"/></marker><marker id="b2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#f0883e"/></marker><marker id="b3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#3fb950"/></marker></defs>
  <style>.bg{fill:#0d1117}.box{fill:#161b22;stroke-width:2;rx:8}.lbl{font-family:'Segoe UI',sans-serif;font-size:17px;font-weight:bold;fill:#e6edf3}.sub{font-family:'Segoe UI',sans-serif;font-size:13px;fill:#8b949e}.arr{stroke-width:3;fill:none}</style>
  <rect width="900" height="420" class="bg" rx="10"/>
  <text x="450" y="38" text-anchor="middle" style="font-family:'Segoe UI';font-size:22px;font-weight:bold;fill:#e6edf3">Artillery Outpost Chain</text>
  <line x1="30" y1="52" x2="870" y2="52" stroke="#21262d"/>

  <!-- Main Base -->
  <rect x="40" y="80" width="170" height="90" class="box" stroke="#58a6ff"/><text x="125" y="120" text-anchor="middle" class="lbl">Main Base</text><text x="125" y="145" text-anchor="middle" class="sub">Shell Assembler</text>
  <line x1="210" y1="125" x2="280" y2="125" class="arr" stroke="#58a6ff" marker-end="url(#b1)"/><text x="245" y="115" text-anchor="middle" style="font-size:12px;fill:#c9d1d9">Shells</line>

  <!-- Train Depot -->
  <rect x="290" y="80" width="160" height="90" class="box" stroke="#f0883e"/><text x="370" y="118" text-anchor="middle" class="lbl">Train Depot</text><text x="370" y="143" text-anchor="middle" class="sub">Idle trains wait here</text>
  <line x1="450" y1="125" x2="520" y2="125" class="arr" stroke="#f0883e" marker-end="url(#b2)"/><text x="485" y="115" text-anchor="middle" style="font-size:12px;fill:#c9d1d9">Delivery</line>

  <!-- Outpost -->
  <rect x="530" y="75" width="180" height="95" class="box" stroke="#da3633"/><text x="620" y="110" text-anchor="middle" class="lbl">Artillery Outpost</text><text x="620" y="133" text-anchor="middle" class="sub">Turret + Buffer Chest</text><text x="620" y="153" text-anchor="middle" style="font-size:12px;fill:#8b949e">200 shells stored</text>

  <!-- Target -->
  <line x1="710" y1="122" x2="780" y2="122" class="arr" stroke="#da3633" marker-end="url(#b3)"/><text x="745" y="112" text-anchor="middle" style="font-size:12px;fill:#c9d1d9">Fire!</line>
  <rect x="790" y="82" width="90" height="80" rx="8" fill="#161b22" stroke="#da3633" stroke-width="2" stroke-dasharray="5,3"/><text x="835" y="118" text-anchor="middle" class="lbl" style="font-size:15px">Biter</text><text x="835" y="140" text-anchor="middle" class="sub">Base</text>

  <!-- Bottom: Range Table -->
  <rect x="40" y="210" width="820" height="190" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="242" text-anchor="middle" style="font-family:'Segoe UI';font-size:18px;font-weight:bold;fill:#e6edf3">Targeting Range by Research Level</text>
  <line x1="60" y1="255" x2="840" y2="255" stroke="#21262d"/>

  <!-- Table headers -->
  <text x="100" y="285" text-anchor="middle" style="font-family:'Segoe UI';font-size:15px;font-weight:bold;fill:#58a6ff">Level</text>
  <text x="250" y="285" text-anchor="middle" style="font-family:'Segoe UI';font-size:15px;font-weight:bold;fill:#58a6ff">Range</text>
  <text x="430" y="285" text-anchor="middle" style="font-family:'Segoe UI';font-size:15px;font-weight:bold;fill:#58a6ff">Coverage</text>
  <text x="650" y="285" text-anchor="middle" style="font-family:'Segoe UI';font-size:15px;font-weight:bold;fill:#58a6ff">Use Case</text>

  <line x1="60" y1="295" x2="840" y2="295" stroke="#30363d"/>

  <text x="100" y="320" text-anchor="middle" class="sub">0 (base)</text><text x="250" y="320" text-anchor="middle" class="sub">7 tiles</text><text x="430" y="320" text-anchor="middle" class="sub">Nearly useless</text><text x="650" y="320" text-anchor="middle" class="sub">Skip this</text>

  <text x="100" y="350" text-anchor="middle" class="sub">3</text><text x="250" y="350" text-anchor="middle" class="sub">60 tiles</text><text x="430" y="350" text-anchor="middle" class="sub">Small perimeter</text><text x="650" y="350" text-anchor="middle" class="sub">First real outpost</text>

  <text x="100" y="380" text-anchor="middle" class="sub">7 (max)</text><text x="250" y="380" text-anchor="middle" class="sub">140 tiles</text><text x="430" y="380" text-anchor="middle" class="sub">Entire small map</text><text x="650" y="380" text-anchor="middle" class="sub">Endgame coverage</text>
</svg>