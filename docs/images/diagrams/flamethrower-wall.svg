<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" width="100%" height="auto" style="background:#1a1a1a;border-radius:8px;font-family:system-ui,-apple-system,sans-serif">
  <title>Flamethrower Wall — Factorio Guide</title>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="50" fill="#1f1f1f" rx="8"/>
  <rect x="0" y="44" width="1100" height="6" fill="#1f1f1f"/>
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#ff6622">FLAMETHROWER WALL — KILL CORRIDOR LAYOUT</text>

  <!-- ===== LAYOUT AREA (left side) ===== -->

  <!-- 1. BITERS -->
  <rect x="20" y="70" width="80" height="320" rx="6" fill="#1a0f00" stroke="#442200" stroke-width="1.5"/>
  <text x="60" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#dd8822">BITERS</text>
  <text x="60" y="118" text-anchor="middle" font-size="17" fill="#886633">Attack Wave</text>

  <!-- Biter triangles -->
  <polygon points="35,140 60,130 85,140 80,160 40,160" fill="#553300" opacity="0.5"/>
  <polygon points="30,175 55,165 80,175 75,195 35,195" fill="#774400" opacity="0.4"/>
  <polygon points="35,210 60,200 85,210 80,230 40,230" fill="#663300" opacity="0.35"/>
  <polygon points="30,280 55,270 80,280 75,300 35,300" fill="#553300" opacity="0.3"/>
  <polygon points="35,315 60,305 85,315 80,335 40,335" fill="#774400" opacity="0.25"/>

  <!-- Arrow -->
  <line x1="100" y1="220" x2="118" y2="220" stroke="#ff6622" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#ff6622"/></marker>
  </defs>

  <!-- 2. OUTER WALL -->
  <rect x="122" y="70" width="16" height="320" rx="2" fill="#555" stroke="#888" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" font-size="17" fill="#ddd" transform="rotate(-90,130,240)" font-weight="600">Outer Wall (Double)</text>

  <!-- 3. KILL CORRIDOR -->
  <rect x="148" y="70" width="90" height="320" rx="4" fill="#330000" stroke="#cc4422" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="193" y="150" text-anchor="middle" font-size="17" font-weight="800" fill="#cc4422">KILL</text>
  <text x="193" y="172" text-anchor="middle" font-size="17" font-weight="800" fill="#cc4422">CORRIDOR</text>
  <text x="193" y="200" text-anchor="middle" font-size="17" fill="#aa4433">3-4 tile gap</text>
  <text x="193" y="285" text-anchor="middle" font-size="17" fill="#885544">Biters funnel here</text>
  <text x="193" y="305" text-anchor="middle" font-size="17" fill="#885544">Hit from both sides</text>

  <!-- Fire effect in corridor -->
  <ellipse cx="193" cy="355" rx="35" ry="6" fill="#cc4422" opacity="0.15"/>

  <!-- 4. INNER WALL -->
  <rect x="248" y="70" width="12" height="320" rx="2" fill="#555" stroke="#888" stroke-width="1.5"/>
  <text x="254" y="240" text-anchor="middle" font-size="17" fill="#ddd" transform="rotate(-90,254,240)" font-weight="600">Inner Wall</text>

  <!-- 5. FLAMETHROWER TURRETS -->
  <rect x="270" y="70" width="140" height="320" rx="6" fill="#1a0800" stroke="#ff6622" stroke-width="1.5"/>
  <text x="340" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#ff6622">FLAMETHROWER</text>
  <text x="340" y="114" text-anchor="middle" font-size="17" fill="#cc6622">×3 (every 4 tiles)</text>

  <!-- Flame turret row 1 -->
  <rect x="280" y="125" width="120" height="60" rx="4" fill="#221100" stroke="#ff6622" stroke-width="1"/>
  <circle cx="310" cy="155" r="16" fill="#ff4400" opacity="0.3"/>
  <circle cx="310" cy="155" r="10" fill="#ff6622" opacity="0.5"/>
  <circle cx="310" cy="155" r="4" fill="#ffcc00"/>
  <!-- Flame wisps -->
  <ellipse cx="325" cy="148" rx="6" ry="3" fill="#ff4400" opacity="0.4"/>
  <ellipse cx="322" cy="160" rx="5" ry="3" fill="#ff6600" opacity="0.3"/>
  <text x="370" y="155" text-anchor="middle" font-size="17" font-weight="700" fill="#ff6622">Flame F</text>
  <text x="370" y="173" text-anchor="middle" font-size="17" fill="#884422">primary DPS</text>

  <!-- Flame turret row 2 -->
  <rect x="280" y="200" width="120" height="60" rx="4" fill="#221100" stroke="#ff6622" stroke-width="1"/>
  <circle cx="310" cy="230" r="16" fill="#ff4400" opacity="0.3"/>
  <circle cx="310" cy="230" r="10" fill="#ff6622" opacity="0.5"/>
  <circle cx="310" cy="230" r="4" fill="#ffcc00"/>
  <ellipse cx="325" cy="223" rx="6" ry="3" fill="#ff4400" opacity="0.4"/>
  <ellipse cx="322" cy="235" rx="5" ry="3" fill="#ff6600" opacity="0.3"/>
  <text x="370" y="230" text-anchor="middle" font-size="17" font-weight="700" fill="#ff6622">Flame F</text>
  <text x="370" y="248" text-anchor="middle" font-size="17" fill="#884422">primary DPS</text>

  <!-- Flame turret row 3 -->
  <rect x="280" y="275" width="120" height="60" rx="4" fill="#221100" stroke="#ff6622" stroke-width="1"/>
  <circle cx="310" cy="305" r="16" fill="#ff4400" opacity="0.3"/>
  <circle cx="310" cy="305" r="10" fill="#ff6622" opacity="0.5"/>
  <circle cx="310" cy="305" r="4" fill="#ffcc00"/>
  <ellipse cx="325" cy="298" rx="6" ry="3" fill="#ff4400" opacity="0.4"/>
  <ellipse cx="322" cy="310" rx="5" ry="3" fill="#ff6600" opacity="0.3"/>
  <text x="370" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#ff6622">Flame F</text>
  <text x="370" y="323" text-anchor="middle" font-size="17" fill="#884422">primary DPS</text>

  <!-- 6. GUN TURRETS -->
  <rect x="430" y="70" width="140" height="320" rx="6" fill="#140000" stroke="#cc4400" stroke-width="1.5"/>
  <text x="500" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#cc4400">GUN TURRETS</text>
  <text x="500" y="114" text-anchor="middle" font-size="17" fill="#aa4433">×3 (between flames)</text>

  <!-- Gun turret row 1 -->
  <rect x="440" y="125" width="120" height="60" rx="4" fill="#200000" stroke="#cc4400" stroke-width="1"/>
  <circle cx="470" cy="155" r="12" fill="#555" stroke="#888" stroke-width="1.5"/>
  <rect x="465" y="147" width="10" height="16" rx="2" fill="#888"/>
  <text x="530" y="155" text-anchor="middle" font-size="17" font-weight="700" fill="#cc4400">Gun G</text>
  <text x="530" y="173" text-anchor="middle" font-size="17" fill="#883322">cleanup crew</text>

  <!-- Gun turret row 2 -->
  <rect x="440" y="200" width="120" height="60" rx="4" fill="#200000" stroke="#cc4400" stroke-width="1"/>
  <circle cx="470" cy="230" r="12" fill="#555" stroke="#888" stroke-width="1.5"/>
  <rect x="465" y="222" width="10" height="16" rx="2" fill="#888"/>
  <text x="530" y="230" text-anchor="middle" font-size="17" font-weight="700" fill="#cc4400">Gun G</text>
  <text x="530" y="248" text-anchor="middle" font-size="17" fill="#883322">cleanup crew</text>

  <!-- Gun turret row 3 -->
  <rect x="440" y="275" width="120" height="60" rx="4" fill="#200000" stroke="#cc4400" stroke-width="1"/>
  <circle cx="470" cy="305" r="12" fill="#555" stroke="#888" stroke-width="1.5"/>
  <rect x="465" y="297" width="10" height="16" rx="2" fill="#888"/>
  <text x="530" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#cc4400">Gun G</text>
  <text x="530" y="323" text-anchor="middle" font-size="17" fill="#883322">cleanup crew</text>

  <!-- 7. AMMO BELT -->
  <rect x="585" y="70" width="22" height="320" rx="4" fill="#181810" stroke="#aa6622" stroke-width="1.5"/>
  <!-- Ammo dots on belt -->
  <circle cx="596" cy="100" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="140" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="180" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="220" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="260" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="300" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="340" r="5" fill="#bb7744" opacity="0.6"/>
  <circle cx="596" cy="370" r="5" fill="#bb7744" opacity="0.4"/>
  <circle cx="596" cy="380" r="5" fill="#bb7744" opacity="0.3"/>
  <text x="596" y="240" text-anchor="middle" font-size="17" fill="#aa6622" transform="rotate(-90,596,240)" font-weight="600">Ammo Belt</text>

  <!-- 8. OIL PIPE -->
  <rect x="618" y="70" width="22" height="320" rx="11" fill="#1a1200" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="629" cy="110" r="4" fill="#d4a017" opacity="0.5"/>
  <circle cx="629" cy="170" r="4" fill="#d4a017" opacity="0.5"/>
  <circle cx="629" cy="230" r="4" fill="#d4a017" opacity="0.5"/>
  <circle cx="629" cy="290" r="4" fill="#d4a017" opacity="0.5"/>
  <circle cx="629" cy="350" r="4" fill="#d4a017" opacity="0.5"/>
  <text x="629" y="240" text-anchor="middle" font-size="17" fill="#d4a017" transform="rotate(-90,629,240)" font-weight="600">Oil Pipe</text>

  <!-- ===== INFO PANEL (right side) ===== -->
  <rect x="670" y="70" width="410" height="320" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>

  <!-- Pattern Card -->
  <rect x="685" y="85" width="380" height="70" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="875" y="108" text-anchor="middle" font-size="17" font-weight="700" fill="#ddd">Spacing Pattern</text>
  <text x="875" y="135" text-anchor="middle" font-size="17" font-weight="800" fill="#ff6622">F — G — F — G — F — G</text>
  <text x="875" y="150" text-anchor="middle" font-size="17" fill="#666">F = Flamethrower, G = Gun Turret</text>

  <!-- Efficiency Card -->
  <rect x="685" y="170" width="380" height="70" rx="6" fill="#0a1f0a" stroke="#33aa55" stroke-width="1"/>
  <text x="875" y="193" text-anchor="middle" font-size="17" font-weight="700" fill="#33aa55">Resource Efficiency</text>
  <text x="875" y="220" text-anchor="middle" font-size="17" fill="#aaa">1 pumpjack @ 2/s → supplies 30+ flame turrets</text>

  <!-- Roboport Card -->
  <rect x="685" y="255" width="380" height="55" rx="6" fill="#0a0a1f" stroke="#4488cc" stroke-width="1"/>
  <text x="875" y="278" text-anchor="middle" font-size="17" font-weight="700" fill="#4488cc">Roboport Repair Coverage</text>
  <text x="875" y="298" text-anchor="middle" font-size="17" fill="#aaa">1 roboport per 30 tiles</text>

  <!-- Stats -->
  <rect x="685" y="325" width="380" height="50" rx="6" fill="#1f1f10" stroke="#888" stroke-width="1"/>
  <text x="875" y="348" text-anchor="middle" font-size="17" font-weight="700" fill="#ccc">Key Stats</text>
  <text x="875" y="366" text-anchor="middle" font-size="17" fill="#888">3 oil/sec consumed per row | Ammo: 1 piercing assembler = full wall</text>

  <!-- ===== BOTTOM LEGEND BAR ===== -->
  <rect x="20" y="410" width="1060" height="80" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
  <text x="550" y="430" text-anchor="middle" font-size="17" font-weight="600" fill="#777">Cross-Section (Outside → Inside)</text>

  <rect x="40" y="445" width="36" height="16" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
  <text x="100" y="457" font-size="17" fill="#aaa">Outer Wall</text>

  <line x1="155" y1="450" x2="180" y2="450" stroke="#cc4422" stroke-width="2.5" stroke-dasharray="5,2"/>
  <text x="185" y="457" font-size="17" fill="#aaa">Kill Corridor</text>

  <rect x="280" y="445" width="28" height="16" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
  <text x="330" y="457" font-size="17" fill="#aaa">Inner Wall</text>

  <circle cx="385" cy="453" r="7" fill="#ff4400" opacity="0.5"/>
  <circle cx="385" cy="453" r="3" fill="#ffcc00"/>
  <text x="405" y="457" font-size="17" fill="#ff6622">Flamethrower</text>

  <rect x="520" y="446" width="8" height="14" rx="1" fill="#666"/>
  <text x="545" y="457" font-size="17" fill="#cc4400">Gun Turret</text>

  <rect x="640" y="446" width="18" height="14" rx="2" fill="#aa6622"/>
  <text x="665" y="457" font-size="17" fill="#aa6622">Ammo Belt</text>

  <circle cx="755" cy="453" r="5" fill="#d4a017"/>
  <text x="768" y="457" font-size="17" fill="#d4a017">Oil Pipe</text>

  <rect x="860" y="445" width="14" height="16" rx="3" fill="#334466"/>
  <text x="885" y="457" font-size="17" fill="#4488cc">Roboport</text>

  <!-- Bottom line -->
  <text x="550" y="495" text-anchor="middle" font-size="17" fill="#555">★ Pattern: F — G repeats every 4 tiles | One crude oil pipe + one ammo belt = full perimeter defense</text>
</svg>
