<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" style="background:#111;font-family:system-ui,sans-serif;">
  <text x="300" y="30" fill="#e8941c" font-size="16" text-anchor="middle" font-weight="bold">SR Latch for Nuclear Power</text>
  <rect x="30" y="60" width="100" height="50" rx="4" fill="#252525" stroke="#888" stroke-width="2"/>
  <text x="80" y="85" fill="#ccc" font-size="11" text-anchor="middle">Tank</text><text x="80" y="98" fill="#888" font-size="9" text-anchor="middle">steam: 10k</text>
  <line x1="130" y1="85" x2="180" y2="70" stroke="#c9463d" stroke-width="2"/>
  <line x1="130" y1="85" x2="180" y2="100" stroke="#6abe30" stroke-width="2"/>
  <rect x="180" y="50" width="110" height="40" rx="4" fill="#252525" stroke="#6abe30" stroke-width="2"/>
  <text x="235" y="72" fill="#6abe30" font-size="10" text-anchor="middle">S: steam&lt;10k</text>
  <rect x="180" y="100" width="110" height="40" rx="4" fill="#252525" stroke="#6abe30" stroke-width="2"/>
  <text x="235" y="122" fill="#6abe30" font-size="10" text-anchor="middle">R: steam&gt;24k</text>
  <line x1="290" y1="70" x2="340" y2="85" stroke="#c9463d" stroke-width="2"/>
  <line x1="290" y1="120" x2="340" y2="115" stroke="#6abe30" stroke-width="2"/>
  <rect x="340" y="65" width="110" height="50" rx="4" fill="#252525" stroke="#3778c8" stroke-width="2"/>
  <text x="395" y="90" fill="#ccc" font-size="11" text-anchor="middle">Memory</text>
  <text x="395" y="105" fill="#3778c8" font-size="9" text-anchor="middle">S > R, output S</text>
  <line x1="450" y1="90" x2="510" y2="90" stroke="#c9463d" stroke-width="2"/>
  <path d="M510,90 Q530,90 530,110 Q530,130 510,130" fill="none" stroke="#c9463d" stroke-width="2"/>
  <line x1="510" y1="130" x2="395" y2="130" stroke="#c9463d" stroke-dasharray="4,3" stroke-width="2"/>
  <line x1="395" y1="130" x2="395" y2="115" stroke="#c9463d" stroke-width="2"/>
  <line x1="520" y1="90" x2="560" y2="90" stroke="#c9463d" stroke-width="2"/>
  <rect x="550" y="65" width="40" height="50" rx="4" fill="#252525" stroke="#888" stroke-width="2"/>
  <text x="570" y="95" fill="#ccc" font-size="9" text-anchor="middle">Ins</text>
  <text x="235" y="170" fill="#777" font-size="10" text-anchor="middle">Two deciders for Set/Reset</text>
  <text x="395" y="170" fill="#777" font-size="10" text-anchor="middle">Memory with feedback loop</text>
  <path d="M60,250 L90,230 L120,250 L150,230 L180,250 L210,230 L240,250" fill="none" stroke="#3778c8" stroke-width="2" opacity="0.4"/>
  <text x="150" y="270" fill="#3778c8" font-size="10" text-anchor="middle">Steam level</text>
  <line x1="60" y1="240" x2="60" y2="275" stroke="#3778c8" stroke-width="1"/><text x="60" y="290" fill="#6abe30" font-size="9" text-anchor="middle">10k</text>
  <line x1="240" y1="240" x2="240" y2="275" stroke="#3778c8" stroke-width="1"/><text x="240" y="290" fill="#6abe30" font-size="9" text-anchor="middle">24k</text>
</svg>
