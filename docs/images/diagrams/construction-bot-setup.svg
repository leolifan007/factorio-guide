<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <title>Construction Robot Network Setup - Factorio Guide</title>
  <defs><filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1000" height="520" fill="#1f1f1f" rx="6"/>
  <line x1="0" y1="65" x2="1000" y2="65" stroke="#333"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#f39c12">CONSTRUCTION ROBOT NETWORK - SETUP AND SCALING GUIDE</text>

  <!-- ===== Robot Types ===== -->
  <rect x="30" y="90" width="200" height="130" rx="6" fill="#2a2a2a" stroke="#f39c12" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle" font-size="16" fill="#f39c12" font-weight="bold">ROBOT TYPES</text>

  <!-- Construction Robot -->
  <rect x="45" y="135" width="170" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="130" y="152" text-anchor="middle" font-size="15" fill="#ddd">Construction Robot</text>
  <text x="130" y="170" text-anchor="middle" font-size="12" fill="#888">Builds and repairs structures</text>

  <!-- Logistic Robot -->
  <rect x="45" y="178" width="170" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="130" y="195" text-anchor="middle" font-size="15" fill="#ddd">Logistic Robot</text>
  <text x="130" y="213" text-anchor="middle" font-size="12" fill="#888">Transports items between chests</text>

  <!-- ===== Infrastructure ===== -->
  <rect x="280" y="90" width="230" height="130" rx="6" fill="#2a2a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="395" y="118" text-anchor="middle" font-size="16" fill="#3498db" font-weight="bold">INFRASTRUCTURE</text>

  <rect x="295" y="135" width="200" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="395" y="152" text-anchor="middle" font-size="15" fill="#ddd">Roboport</text>
  <text x="395" y="170" text-anchor="middle" font-size="12" fill="#888">Charges and stores robots in network</text>

  <rect x="295" y="178" width="200" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="395" y="195" text-anchor="middle" font-size="15" fill="#ddd">Roboport Range: 50x50 tiles</text>
  <text x="395" y="213" text-anchor="middle" font-size="12" fill="#888">Orange zone = coverage area</text>

  <!-- ===== Chest Types ===== -->
  <rect x="560" y="90" width="230" height="130" rx="6" fill="#2a2a2a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="675" y="118" text-anchor="middle" font-size="16" fill="#2ecc71" font-weight="bold">LOGISTIC CHESTS</text>

  <rect x="575" y="135" width="200" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="675" y="152" text-anchor="middle" font-size="15" fill="#ddd">Active Provider (Red)</text>
  <text x="675" y="170" text-anchor="middle" font-size="12" fill="#888">Pushes items out to network</text>

  <rect x="575" y="178" width="200" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="675" y="195" text-anchor="middle" font-size="15" fill="#ddd">Storage Chest (Yellow)</text>
  <text x="675" y="213" text-anchor="middle" font-size="12" fill="#888">Storage for returned/unused items</text>

  <!-- ===== Chest Types 2 ===== -->
  <rect x="840" y="90" width="130" height="130" rx="6" fill="#2a2a2a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="905" y="118" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">MORE CHESTS</text>

  <rect x="850" y="135" width="110" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="905" y="152" text-anchor="middle" font-size="13" fill="#ddd">Requester</text>
  <text x="905" y="170" text-anchor="middle" font-size="11" fill="#888">Yellow/Blue</text>

  <rect x="850" y="178" width="110" height="38" rx="4" fill="#2a2a2a" stroke="#555"/>
  <text x="905" y="195" text-anchor="middle" font-size="13" fill="#ddd">Buffer</text>
  <text x="905" y="213" text-anchor="middle" font-size="11" fill="#888">Green</text>

  <!-- ===== Build Order ===== -->
  <text x="500" y="260" text-anchor="middle" font-size="15" fill="#555">--- BUILD ORDER ---</text>

  <rect x="40" y="280" width="440" height="180" rx="6" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="260" y="308" text-anchor="middle" font-size="16" fill="#2ecc71" font-weight="bold">SETUP STEPS</text>

  <text x="60" y="336" font-size="14" fill="#ddd">1. Research Robotics (Logistic System + Construction Robotics)</text>
  <text x="60" y="360" font-size="14" fill="#ddd">2. Build 1 roboport + 10 construction robots</text>
  <text x="60" y="384" font-size="14" fill="#ddd">3. Place roboport near your mall. Add storage chests</text>
  <text x="60" y="408" font-size="14" fill="#ddd">4. Put items (belts, inserters, assemblers) in storage chests</text>
  <text x="60" y="432" font-size="14" fill="#ddd">5. Place a blueprint anywhere in orange coverage. Robots build it!</text>
  <text x="60" y="456" font-size="14" fill="#ddd">6. Scale: 1 roboport per ~10 robots for charging throughput</text>

  <!-- ===== Rules ===== -->
  <rect x="520" y="280" width="440" height="180" rx="6" fill="#1a1a2a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="740" y="308" text-anchor="middle" font-size="16" fill="#e74c3c" font-weight="bold">COMMON MISTAKES</text>

  <text x="540" y="336" font-size="14" fill="#ddd">- Red chests near assemblers without filter -> items overflow</text>
  <text x="540" y="360" font-size="14" fill="#ddd">- Too few roboports = robots queue to charge</text>
  <text x="540" y="384" font-size="14" fill="#ddd">- Missing storage chests = items clutter the network</text>
  <text x="540" y="408" font-size="14" fill="#ddd">- Belts buffer inserted into yellow chests = loops forever</text>
  <text x="540" y="432" font-size="14" fill="#ddd">- Personal roboport needs 3+ slots for large builds</text>
  <text x="540" y="456" font-size="14" fill="#ddd">- Robots die in walls/dense belts - keep paths clear</text>

</svg>