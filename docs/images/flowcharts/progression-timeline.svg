  <!-- Card positions: 40, 168.33, 296.67, 425, 553.33, 681.67, 810 -->
  <!-- Rounded for clean numbers: gaps=18, start=41, cards at 41,169,297,425,553,681,809 -->

  <rect x="41" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="54" y="245" width="84" height="40" rx="3" fill="#e8941c"/>
  <rect x="61" y="250" width="70" height="30" rx="2" fill="#f5aa2e"/>
  <text x="96" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Red + Green</text>

  <rect x="169" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="182" y="245" width="84" height="40" rx="3" fill="#3778c8"/>
  <rect x="189" y="250" width="70" height="30" rx="2" fill="#5599ff"/>
  <text x="224" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Blue Science</text>

  <rect x="297" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="310" y="245" width="84" height="40" rx="3" fill="#c8824c"/>
  <rect x="318" y="255" width="68" height="20" rx="1" fill="#e09860"/>
  <text x="352" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Oil Refinery</text>

  <rect x="425" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="438" y="245" width="84" height="40" rx="3" fill="#4488ff"/>
  <rect x="446" y="251" width="68" height="28" rx="2" fill="#5599ee"/>
  <text x="480" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Blue Circuits</text>

  <rect x="553" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#c9463d" stroke-width="1"/>
  <rect x="564" y="242" width="92" height="46" rx="2" fill="#c9463d"/>
  <rect x="571" y="248" width="78" height="34" rx="1" fill="#dd5550"/>
  <text x="608" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Train Network</text>

  <rect x="681" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#9d4edd" stroke-width="1"/>
  <rect x="694" y="245" width="84" height="40" rx="3" fill="#9d4edd"/>
  <rect x="702" y="251" width="68" height="28" rx="2" fill="#b366ff"/>
  <text x="736" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">Rocket Silo</text>

  <rect x="809" y="235" width="110" height="75" rx="4" fill="#2a2a2a" stroke="#e0e0e0" stroke-width="2"/>
  <polygon points="864,245 879,275 849,275" fill="#888"/>
  <rect x="850" y="262" width="28" height="25" rx="2" fill="#4488ff"/>
  <text x="864" y="327" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" fill="#888">LAUNCH ROCKET</text>
</svg>