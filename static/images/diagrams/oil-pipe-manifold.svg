<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="100%" height="auto" style="display:block;margin:0 auto;max-width:960px">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="400" fill="#1f1f1f" rx="8"/>
  <line x1="0" y1="58" x2="960" y2="58" stroke="#333"/>
