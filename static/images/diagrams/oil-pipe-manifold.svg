  <text x="480" y="218" text-anchor="middle" font-size="12" fill="#555">Use underground pipes every 2 tiles between refineries for walkability</text>
  <rect x="50" y="238" width="150" height="45" rx="4" fill="#2a2a2a" stroke="#8b4513" stroke-width="2"/>
