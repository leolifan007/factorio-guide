<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="auto" style="background:#1f1f1f;border-radius:8px;font-family:system-ui,-apple-system,sans-serif">
  <title>Greenscience Layout — Factorio Guide</title>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
    <marker id="arr-green" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#6abe30" /></marker>
  </defs>

  
  <rect x="0" y="0" width="1000" height="60" fill="#252525" rx="8" />
  <rect x="0" y="52" width="1000" height="8" fill="#252525" />
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#6abe30" filter="url(#glow)">🔧 GREEN SCIENCE — PHYSICAL LAYOUT (Top-Down View)</text>

  <!-- ==================== SUPPLY BUS ==================== -->
  <rect x="40" y="75" width="920" height="36" rx="4" fill="#151515" stroke="#333" stroke-width="1"/>
  <text x="500" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="#888">SUPPLY BUS (Top Belts)</text>

  <!-- Iron Belt -->
  <rect x="60" y="104" width="880" height="8" rx="2" fill="#777"/>
  <rect x="60" y="108" width="880" height="4" rx="1" fill="#555"/>
  <rect x="60" y="106" width="880" height="2" fill="#999" opacity="0.3"/>
  <rect x="120" y="103" width="40" height="10" rx="1" fill="#888" opacity="0.5"/>
  <text x="500" y="90" text-anchor="middle" font-size="16" fill="#ccc">Iron Plate Lane</text>

  <!-- Circuit Belt -->
  <rect x="60" y="116" width="880" height="8" rx="2" fill="#777"/>
  <rect x="60" y="120" width="880" height="4" rx="1" fill="#555"/>
  <rect x="60" y="118" width="880" height="2" fill="#999" opacity="0.3"/>
  <rect x="120" y="115" width="40" height="10" rx="1" fill="#6abe30" opacity="0.5"/>
  <text x="500" y="102" text-anchor="middle" font-size="16" fill="#6abe30">Green Circuit Lane</text>

  <!-- ==================== SUB-ASSEMBLER ROW ==================== -->
  <rect x="40" y="136" width="920" height="36" rx="4" fill="#151515" stroke="#333" stroke-width="1"/>
  <text x="500" y="159" text-anchor="middle" font-size="16" font-weight="600" fill="#888">SUB-ASSEMBLER ROW (Inserter / Belt Alternating)</text>

  <!-- Sub-assembler 1: Inserter -->
  <rect x="55" y="170" width="80" height="60" rx="4" fill="#1a2a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="95" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#6abe30">Inserter</text>
  <text x="95" y="208" text-anchor="middle" font-size="16" fill="#888">Asm 1</text>
  <circle cx="95" cy="218" r="4" fill="#6abe30" opacity="0.5"/>

  
  <line x1="135" y1="200" x2="145" y2="200" stroke="#444" stroke-width="1.5" />

  <!-- Sub-assembler 2: Belt -->
  <rect x="150" y="170" width="80" height="60" rx="4" fill="#1a2a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="190" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#6abe30">Belt</text>
  <text x="190" y="208" text-anchor="middle" font-size="16" fill="#888">Asm 1</text>
  <rect x="175" y="214" width="30" height="6" rx="1" fill="#888" opacity="0.6"/>

  <line x1="230" y1="200" x2="240" y2="200" stroke="#444" stroke-width="1.5" />

  <!-- Sub-assembler 3: Inserter -->
  <rect x="245" y="170" width="80" height="60" rx="4" fill="#1a2a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="285" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#6abe30">Inserter</text>
  <text x="285" y="208" text-anchor="middle" font-size="16" fill="#888">Asm 2</text>
  <circle cx="285" cy="218" r="4" fill="#6abe30" opacity="0.5"/>

  <line x1="325" y1="200" x2="335" y2="200" stroke="#444" stroke-width="1.5" />

  <!-- Sub-assembler 4: Belt -->
  <rect x="340" y="170" width="80" height="60" rx="4" fill="#1a2a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="380" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#6abe30">Belt</text>
  <text x="380" y="208" text-anchor="middle" font-size="16" fill="#888">Asm 2</text>
  <rect x="365" y="214" width="30" height="6" rx="1" fill="#888" opacity="0.6"/>

  <!-- Ellipsis -->
  <text x="440" y="206" text-anchor="middle" font-size="16" fill="#555">…</text>

  
  <rect x="75" y="238" width="16" height="40" rx="2" fill="#444" stroke="#555" stroke-width="1" />
  <rect x="170" y="238" width="16" height="40" rx="2" fill="#444" stroke="#555" stroke-width="1" />
  <rect x="265" y="238" width="16" height="40" rx="2" fill="#444" stroke="#555" stroke-width="1" />
  <rect x="360" y="238" width="16" height="40" rx="2" fill="#444" stroke="#555" stroke-width="1" />

  
  <polygon points="83,265 83,245 75,255" fill="#666" opacity="0.5" />
  <polygon points="178,265 178,245 170,255" fill="#666" opacity="0.5" />
  <polygon points="273,265 273,245 265,255" fill="#666" opacity="0.5" />
  <polygon points="368,265 368,245 360,255" fill="#666" opacity="0.5" />

  <!-- ==================== SCIENCE ASSEMBLER ROW ==================== -->
  <rect x="40" y="285" width="920" height="36" rx="4" fill="#151515" stroke="#333" stroke-width="1"/>
  <text x="500" y="308" text-anchor="middle" font-size="16" font-weight="600" fill="#888">GREEN SCIENCE ASSEMBLER ROW</text>

  <!-- Science Asm 1 -->
  <rect x="55" y="318" width="80" height="55" rx="5" fill="#1a3a1a" stroke="#6abe30" stroke-width="2"/>
  <text x="95" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#6abe30">Science</text>
  <text x="95" y="355" text-anchor="middle" font-size="16" fill="#aaa">Asm 1</text>
  <circle cx="95" cy="363" r="3" fill="#6abe30" opacity="0.4"/>

  <!-- Science Asm 2 -->
  <rect x="150" y="318" width="80" height="55" rx="5" fill="#1a3a1a" stroke="#6abe30" stroke-width="2"/>
  <text x="190" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#6abe30">Science</text>
  <text x="190" y="355" text-anchor="middle" font-size="16" fill="#aaa">Asm 2</text>
  <circle cx="190" cy="363" r="3" fill="#6abe30" opacity="0.4"/>

  <!-- Science Asm 3 -->
  <rect x="245" y="318" width="80" height="55" rx="5" fill="#1a3a1a" stroke="#6abe30" stroke-width="2"/>
  <text x="285" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#6abe30">Science</text>
  <text x="285" y="355" text-anchor="middle" font-size="16" fill="#aaa">Asm 3</text>
  <circle cx="285" cy="363" r="3" fill="#6abe30" opacity="0.4"/>

  <!-- Science Asm 4 -->
  <rect x="340" y="318" width="80" height="55" rx="5" fill="#1a3a1a" stroke="#6abe30" stroke-width="2"/>
  <text x="380" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#6abe30">Science</text>
  <text x="380" y="355" text-anchor="middle" font-size="16" fill="#aaa">Asm 4</text>
  <circle cx="380" cy="363" r="3" fill="#6abe30" opacity="0.4"/>

  <!-- Ellipsis → more assemblers -->
  <text x="440" y="352" text-anchor="middle" font-size="16" fill="#555">…</text>

  <!-- We need to show it scales to 10 -->
  <rect x="465" y="318" width="105" height="55" rx="5" fill="#0f1f0f" stroke="#6abe30" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="517" y="340" text-anchor="middle" font-size="16" fill="#6abe30">Asm 5–10</text>
  <text x="517" y="358" text-anchor="middle" font-size="16" fill="#666">(repeating)</text>

  <!-- Scale indicator -->
  <line x1="440" y1="375" x2="570" y2="375" stroke="#444" stroke-width="1"/>
  <line x1="440" y1="378" x2="440" y2="372" stroke="#444" stroke-width="1"/>
  <line x1="570" y1="378" x2="570" y2="372" stroke="#444" stroke-width="1"/>
  <text x="505" y="392" text-anchor="middle" font-size="16" fill="#555">× Total 10 Assemblers</text>

  
  <rect x="40" y="400" width="530" height="8" rx="2" fill="#6abe30" />
  <rect x="40" y="404" width="530" height="4" rx="1" fill="#4a8e20" />
  <rect x="40" y="402" width="530" height="2" fill="#8ae060" opacity="0.3" />

  
  <polygon points="200,395 200,413 208,404" fill="#6abe30" opacity="0.6" />
  <polygon points="300,395 300,413 308,404" fill="#6abe30" opacity="0.6" />
  <polygon points="400,395 400,413 408,404" fill="#6abe30" opacity="0.6" />
  <polygon points="500,395 500,413 508,404" fill="#6abe30" opacity="0.6" />

  <text x="300" y="425" text-anchor="middle" font-size="16" fill="#6abe30">← Science Output Belt →</text>

  
  <line x1="570" y1="404" x2="620" y2="404" stroke="#6abe30" stroke-width="2.5" marker-end="url(#arr-green)" />

  <!-- ==================== LABS ==================== -->
  <rect x="640" y="318" width="160" height="85" rx="6" fill="#1a1a2a" stroke="#4488dd" stroke-width="2"/>
  <text x="720" y="348" text-anchor="middle" font-size="16" font-weight="700" fill="#4488dd">Labs</text>
  <text x="720" y="368" text-anchor="middle" font-size="16" fill="#aaa">Red Science Input</text>
  <text x="720" y="386" text-anchor="middle" font-size="16" fill="#aaa">Green Science Input</text>

  
  <rect x="640" y="418" width="320" height="95" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1" />

  <rect x="655" y="430" width="14" height="14" rx="2" fill="#1a3a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="678" y="442" font-size="16" fill="#ccc">Green Science Assembler</text>

  <rect x="655" y="450" width="14" height="14" rx="2" fill="#1a2a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="678" y="462" font-size="16" fill="#ccc">Sub-Assembler (Inserter / Belt)</text>

  <rect x="655" y="470" width="30" height="8" rx="2" fill="#777"/>
  <text x="694" y="478" font-size="16" fill="#ccc">Supply Bus (Iron / Circuits)</text>

  <rect x="655" y="490" width="30" height="8" rx="2" fill="#6abe30"/>
  <text x="694" y="498" font-size="16" fill="#ccc">Science Output Belt</text>

  <!-- ==================== BOTTOM NOTE ==================== -->
  <rect x="40" y="525" width="920" height="36" rx="5" fill="#181818" stroke="#333" stroke-width="1"/>
  <text x="500" y="549" text-anchor="middle" font-size="16" font-weight="600" fill="#6abe30">★ Layout: 4 assemblers shown → repeat pattern for total of 10 | All 10 feed 1 output belt</text>
</svg>
