<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600" style="background:#1a1a2e;border-radius:8px;font-family:'Segoe UI',sans-serif">
  <title>Gleba Bioflux Production Chain</title>

  <!-- Title Bar -->
  <rect x="0" y="0" width="760" height="42" fill="#16213e" rx="8"/>
  <rect x="0" y="36" width="760" height="6" fill="#16213e"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#6abe30">GLEBA BIOFLUX PRODUCTION CHAIN — FRUIT TO SCIENCE</text>

  <!-- Legend -->
  <rect x="20" y="50" width="720" height="22" rx="3" fill="#2a2a4a"/>
  <rect x="30" y="55" width="10" height="10" rx="2" fill="#6abe30"/>
  <text x="44" y="63" font-size="10" fill="#aaa">Material flow</text>
  <line x1="140" y1="60" x2="175" y2="60" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="179" y="63" font-size="10" fill="#aaa">Spoilage path</text>
  <rect x="280" y="54" width="10" height="10" rx="2" fill="#4a6a4a" stroke="#6abe30" stroke-width="1"/>
  <text x="294" y="63" font-size="10" fill="#aaa">Biochamber</text>
  <rect x="380" y="54" width="10" height="10" rx="2" fill="#3a3a5a" stroke="#888" stroke-width="1"/>
  <text x="394" y="63" font-size="10" fill="#aaa">Chest/Buffer</text>
  <rect x="480" y="54" width="10" height="10" rx="2" fill="#3a2a1a" stroke="#c0392b" stroke-width="1"/>
  <text x="494" y="63" font-size="10" fill="#aaa">Heating Tower</text>

  <!-- ========== ROW 1: FRUIT FARMS ========== -->

  <text x="30" y="98" font-size="13" fill="#6abe30" font-weight="bold">STAGE 1: FRUIT FARMS</text>

  <!-- Yumako Grove -->
  <rect x="30" y="106" width="120" height="70" rx="6" fill="#1a3a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="90" y="126" text-anchor="middle" font-size="14" fill="#dd8822">🍇</text>
  <text x="90" y="142" text-anchor="middle" font-size="11" fill="#6abe30" font-weight="bold">Yumako Grove</text>
  <text x="90" y="156" text-anchor="middle" font-size="9" fill="#aaa">Agricultural tower</text>
  <text x="90" y="168" text-anchor="middle" font-size="8" fill="#888">1 h spoil timer</text>

  <!-- Jellynut Grove -->
  <rect x="200" y="106" width="120" height="70" rx="6" fill="#1a3a1a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="260" y="126" text-anchor="middle" font-size="14" fill="#aa6622">🌰</text>
  <text x="260" y="142" text-anchor="middle" font-size="11" fill="#6abe30" font-weight="bold">Jellynut Grove</text>
  <text x="260" y="156" text-anchor="middle" font-size="9" fill="#aaa">Agricultural tower</text>
  <text x="260" y="168" text-anchor="middle" font-size="8" fill="#888">1 h spoil timer</text>

  <!-- Down arrows -->
  <line x1="90" y1="176" x2="90" y2="198" stroke="#6abe30" stroke-width="2"/>
  <polygon points="86,195 90,202 94,195" fill="#6abe30"/>
  <line x1="260" y1="176" x2="260" y2="198" stroke="#6abe30" stroke-width="2"/>
  <polygon points="256,195 260,202 264,195" fill="#6abe30"/>

  <!-- ========== ROW 2: FRUIT PROCESSING ========== -->

  <text x="30" y="215" font-size="13" fill="#6abe30" font-weight="bold">STAGE 2: FRUIT PROCESSING (at farm — <tspan fill="#e8941c">process immediately</tspan>)</text>

  <!-- Yumako → Mash -->
  <rect x="30" y="222" width="120" height="44" rx="4" fill="#2a4a2a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="90" y="240" text-anchor="middle" font-size="10" fill="#6abe30" font-weight="bold">Biochamber</text>
  <text x="90" y="254" text-anchor="middle" font-size="9" fill="#ccc">1 yumako → 3 mash</text>
  <text x="90" y="263" text-anchor="middle" font-size="8" fill="#888">30 min spoil</text>

  <!-- Jellynut → Jelly -->
  <rect x="200" y="222" width="120" height="44" rx="4" fill="#2a4a2a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="260" y="240" text-anchor="middle" font-size="10" fill="#6abe30" font-weight="bold">Biochamber</text>
  <text x="260" y="254" text-anchor="middle" font-size="9" fill="#ccc">1 jellynut → 5 jelly</text>
  <text x="260" y="263" text-anchor="middle" font-size="8" fill="#888">30 min spoil</text>

  <!-- Mash/Jelly buffer chests -->
  <rect x="155" y="230" width="38" height="28" rx="3" fill="#3a3a5a" stroke="#888" stroke-width="1"/>
  <text x="174" y="244" text-anchor="middle" font-size="8" fill="#ccc">Mash</text>
  <text x="174" y="254" text-anchor="middle" font-size="7" fill="#888">buf</text>
  <rect x="325" y="230" width="38" height="28" rx="3" fill="#3a3a5a" stroke="#888" stroke-width="1"/>
  <text x="344" y="244" text-anchor="middle" font-size="8" fill="#ccc">Jelly</text>
  <text x="344" y="254" text-anchor="middle" font-size="7" fill="#888">buf</text>

  <!-- Connections -->
  <line x1="150" y1="244" x2="155" y2="244" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="193" y1="244" x2="200" y2="244" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="320" y1="244" x2="325" y2="244" stroke="#6abe30" stroke-width="1.5"/>

  <!-- Down arrows to bioflux -->
  <line x1="90" y1="266" x2="90" y2="290" stroke="#6abe30" stroke-width="2"/>
  <polygon points="86,287 90,294 94,287" fill="#6abe30"/>
  <line x1="260" y1="266" x2="260" y2="290" stroke="#6abe30" stroke-width="2"/>
  <polygon points="256,287 260,294 264,287" fill="#6abe30"/>

  <!-- ========== ROW 3: BIOFLUX ========== -->

  <text x="30" y="307" font-size="13" fill="#6abe30" font-weight="bold">STAGE 3: BIOFLUX MANUFACTURING</text>

  <!-- Mash and Jelly merge -->
  <line x1="90" y1="294" x2="90" y2="314" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="260" y1="294" x2="260" y2="314" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="90" y1="314" x2="175" y2="314" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="175" y1="314" x2="260" y2="314" stroke="#6abe30" stroke-width="1.5"/>
  <line x1="175" y1="314" x2="175" y2="322" stroke="#6abe30" stroke-width="1.5"/>
  <polygon points="171,319 175,326 179,319" fill="#6abe30"/>

  <!-- Bioflux Chamber -->
  <rect x="135" y="326" width="80" height="44" rx="4" fill="#2a4a2a" stroke="#6abe30" stroke-width="2"/>
  <text x="175" y="344" text-anchor="middle" font-size="10" fill="#6abe30" font-weight="bold">Biochamber</text>
  <text x="175" y="358" text-anchor="middle" font-size="9" fill="#ccc">1m + 1j → 2 bioflux</text>

  <!-- Bioflux Chest Buffer -->
  <rect x="230" y="332" width="50" height="32" rx="3" fill="#3a3a5a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="255" y="348" text-anchor="middle" font-size="9" fill="#6abe30" font-weight="bold">Bioflux</text>
  <text x="255" y="360" text-anchor="middle" font-size="7" fill="#888">30 min</text>

  <line x1="215" y1="348" x2="230" y2="348" stroke="#6abe30" stroke-width="1.5"/>
  <polygon points="227,344 233,348 227,352" fill="#6abe30"/>

  <!-- Down arrow -->
  <line x1="175" y1="370" x2="175" y2="404" stroke="#6abe30" stroke-width="2"/>
  <polygon points="171,401 175,408 179,401" fill="#6abe30"/>

  <!-- ========== ROW 4: NUTRIENTS → BACTERIA → ORE ========== -->

  <text x="30" y="420" font-size="13" fill="#6abe30" font-weight="bold">STAGE 4: NUTRIENTS → BACTERIA → ORE</text>

  <!-- Nutrients Maker -->
  <rect x="30" y="428" width="80" height="44" rx="4" fill="#2a4a2a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="70" y="446" text-anchor="middle" font-size="9" fill="#6abe30" font-weight="bold">Biochamber</text>
  <text x="70" y="460" text-anchor="middle" font-size="8" fill="#ccc">1 bioflux → 10</text>

  <!-- Nutrient belt (short!) -->
  <line x1="110" y1="450" x2="160" y2="450" stroke="#6abe30" stroke-width="3"/>
  <text x="135" y="443" text-anchor="middle" font-size="7" fill="#e8941c" font-weight="bold">&lt;15 tiles!</text>

  <!-- Bacteria Vat -->
  <rect x="165" y="428" width="80" height="44" rx="4" fill="#2a4a2a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="205" y="446" text-anchor="middle" font-size="9" fill="#6abe30" font-weight="bold">Bacteria Vat</text>
  <text x="205" y="460" text-anchor="middle" font-size="8" fill="#ccc">2 min spoil</text>

  <!-- Ore output -->
  <line x1="245" y1="450" x2="275" y2="450" stroke="#6abe30" stroke-width="2"/>
  <polygon points="272,446 278,450 272,454" fill="#6abe30"/>
  <rect x="280" y="436" width="50" height="28" rx="3" fill="#3a3a5a" stroke="#6abe30" stroke-width="1.5"/>
  <text x="305" y="450" text-anchor="middle" font-size="9" fill="#6abe30" font-weight="bold">Ore</text>
  <text x="305" y="462" text-anchor="middle" font-size="7" fill="#6abe30">✓ No spoil</text>

  <!-- Bioflux feed line to nutrients -->
  <line x1="255" y1="362" x2="50" y2="428" stroke="#6abe30" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="140" y="396" font-size="8" fill="#888">Bioflux feed</text>

  <!-- ========== SPOILAGE PATHS (dashed) ========== -->

  <!-- Spoilage from bioflux -->
  <path d="M255,364 Q290,370 310,400 Q330,430 340,450 Q350,470 370,490" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <text x="300" y="445" font-size="8" fill="#c0392b">Spoilage from all stages</text>

  <!-- ========== ROW 5: HEATING TOWER ========== -->

  <text x="30" y="500" font-size="13" fill="#6abe30" font-weight="bold">STAGE 5: SPOILAGE MANAGEMENT</text>

  <rect x="30" y="508" width="100" height="50" rx="6" fill="#3a2a1a" stroke="#c0392b" stroke-width="1.5"/>
  <text x="80" y="530" text-anchor="middle" font-size="14" fill="#ff6633">🔥</text>
  <text x="80" y="546" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">Heating Tower</text>
  <text x="80" y="556" text-anchor="middle" font-size="8" fill="#888">250% efficiency</text>

  <line x1="340" y1="490" x2="130" y2="533" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="135,526 127,530 133,538" fill="#c0392b"/>

  <!-- Spoilage → Nutrients emergency -->
  <rect x="160" y="508" width="100" height="50" rx="6" fill="#2a4a2a" stroke="#6abe30" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="528" text-anchor="middle" font-size="9" fill="#6abe30" font-weight="bold">Spoilage→Nutrient</text>
  <text x="210" y="542" text-anchor="middle" font-size="8" fill="#ccc">1:1 emergency</text>
  <text x="210" y="554" text-anchor="middle" font-size="8" fill="#888">Circuit triggered</text>

  <!-- ========== SCIENCE (bottom) ========== -->

  <text x="30" y="585" font-size="13" fill="#6abe30" font-weight="bold">FINAL: AGRICULTURAL SCIENCE</text>
  <rect x="30" y="590" width="200" height="36" rx="6" fill="#2a4a2a" stroke="#6abe30" stroke-width="2"/>
  <text x="130" y="612" text-anchor="middle" font-size="10" fill="#6abe30" font-weight="bold">Bioflux + Biter Eggs + Ore → Agric. Science</text>
</svg>
