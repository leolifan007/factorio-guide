<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320">
  <title>Power Comparison — Factorio Guide</title>
  <rect x="0" y="0" width="820" height="46" fill="#1f1f1f" rx="8"/>
  <rect x="0" y="40" width="820" height="6" fill="#1f1f1f"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#e8941c">POWER SOURCE COMPARISON</text>

  <!-- Steam Engine -->
  <rect x="20" y="60" width="245" height="240" rx="6" fill="#252525" stroke="#444" stroke-width="1"/>
  <rect x="20" y="60" width="245" height="4" rx="2" fill="#888"/>
  <text x="142" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#ccc">🔥 Steam Engine</text>
  <text x="142" y="108" text-anchor="middle" font-size="13" fill="#888">MW/tile: ~0.3</text>
  <rect x="42" y="120" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="42" y="120" width="15" height="12" rx="2" fill="#888" opacity="0.7"/>
  <text x="142" y="148" text-anchor="middle" font-size="13" fill="#888">Fuel: Free (coal)</text>
  <rect x="42" y="158" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="42" y="158" width="160" height="12" rx="2" fill="#666" opacity="0.7"/>
  <text x="142" y="185" text-anchor="middle" font-size="13" fill="#888">UPS: Low</text>
  <rect x="42" y="195" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="42" y="195" width="180" height="12" rx="2" fill="#6abe30" opacity="0.6"/>
  <text x="142" y="220" text-anchor="middle" font-size="13" fill="#888">When: Early game</text>
  <text x="142" y="245" text-anchor="middle" font-size="13" fill="#555">★ Good starter, bad long-term</text>
  <text x="142" y="262" text-anchor="middle" font-size="13" fill="#555">Need 133 engines for 40MW</text>

  <!-- Solar -->
  <rect x="285" y="60" width="245" height="240" rx="6" fill="#252525" stroke="#444" stroke-width="1"/>
  <rect x="285" y="60" width="245" height="4" rx="2" fill="#f5aa2e"/>
  <text x="407" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#ccc">☀️ Solar Panel</text>
  <text x="407" y="108" text-anchor="middle" font-size="13" fill="#888">MW/tile: ~0.06</text>
  <rect x="307" y="120" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="307" y="120" width="5" height="12" rx="2" fill="#f5aa2e" opacity="0.5"/>
  <text x="407" y="148" text-anchor="middle" font-size="13" fill="#888">Fuel: Free</text>
  <rect x="307" y="158" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="307" y="158" width="195" height="12" rx="2" fill="#6abe30" opacity="0.8"/>
  <text x="407" y="185" text-anchor="middle" font-size="13" fill="#888">UPS: Best</text>
  <rect x="307" y="195" width="200" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="307" y="195" width="100" height="12" rx="2" fill="#4488dd" opacity="0.6"/>
  <text x="407" y="220" text-anchor="middle" font-size="13" fill="#888">When: Mid game</text>
  <text x="407" y="245" text-anchor="middle" font-size="13" fill="#555">★ Good UPS, but huge space</text>
  <text x="407" y="262" text-anchor="middle" font-size="13" fill="#555">Need 8,000 panels for 480MW</text>

  <!-- Nuclear -->
  <rect x="550" y="60" width="250" height="240" rx="6" fill="#252525" stroke="#e8941c" stroke-width="1.5"/>
  <rect x="550" y="60" width="250" height="4" rx="2" fill="#e8941c"/>
  <text x="675" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#e8941c">☢️ Nuclear</text>
  <text x="675" y="108" text-anchor="middle" font-size="13" fill="#e8941c" font-weight="bold">MW/tile: ~5</text>
  <rect x="570" y="120" width="210" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="570" y="120" width="210" height="12" rx="2" fill="#e8941c" opacity="0.8"/>
  <text x="675" y="148" text-anchor="middle" font-size="13" fill="#e8941c">Fuel: Uranium</text>
  <rect x="570" y="158" width="210" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="570" y="158" width="180" height="12" rx="2" fill="#6abe30" opacity="0.7"/>
  <text x="675" y="185" text-anchor="middle" font-size="13" fill="#e8941c">UPS: Good</text>
  <rect x="570" y="195" width="210" height="12" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <rect x="570" y="195" width="210" height="12" rx="2" fill="#e8941c" opacity="0.7"/>
  <text x="675" y="220" text-anchor="middle" font-size="13" fill="#e8941c" font-weight="bold">When: Mid game ⭐</text>
  <text x="675" y="245" text-anchor="middle" font-size="13" fill="#e8941c">★ Best balance</text>
  <text x="675" y="262" text-anchor="middle" font-size="13" fill="#e8941c">2×2 gives 480MW for life</text>

  <!-- Bottom indicator bar -->
  <rect x="20" y="312" width="780" height="1" fill="#333"/>
  <text x="410" y="298" text-anchor="middle" font-size="13" fill="#555" font-style="italic">← Worst space efficiency ———— Best space efficiency →</text>
</svg>