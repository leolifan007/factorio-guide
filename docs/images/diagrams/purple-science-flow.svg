<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680">
  <title>Purple Science Production Flow - Factorio Guide</title>
  <defs><filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1000" height="680" fill="#1f1f1f" rx="6"/>
  <line x1="0" y1="65" x2="1000" y2="65" stroke="#333"/>
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#9b59b6">PRODUCTION SCIENCE - ELECTRIC ENGINE TO FACTORY OUTPUT</text>

  <!-- ===== Row 1: Raw inputs ===== -->
  <!-- Steel -->
  <rect x="40" y="100" width="150" height="64" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="115" y="126" text-anchor="middle" font-size="16" fill="#888">Steel Plate</text>
  <text x="115" y="150" text-anchor="middle" font-size="16" fill="#666">From Furnace Column</text>
  <line x1="190" y1="125" x2="240" y2="125" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="240,120 255,125 240,130" fill="#9b59b6"/>

  <!-- Gears -->
  <rect x="40" y="200" width="150" height="64" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="115" y="226" text-anchor="middle" font-size="16" fill="#888">Iron Gear Wheel</text>
  <text x="115" y="250" text-anchor="middle" font-size="16" fill="#666">From Gear Assembler</text>
  <line x1="190" y1="232" x2="240" y2="232" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="240,227 255,232 240,237" fill="#9b59b6"/>

  <!-- Pipes -->
  <rect x="40" y="300" width="150" height="64" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="115" y="326" text-anchor="middle" font-size="16" fill="#888">Pipe</text>
  <text x="115" y="350" text-anchor="middle" font-size="16" fill="#666">From Pipe Assembler</text>
  <line x1="190" y1="332" x2="240" y2="332" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="240,327 255,332 240,337" fill="#9b59b6"/>

  <!-- ===== Engine Unit ===== -->
  <rect x="260" y="175" width="160" height="90" rx="5" fill="#2a2a2a" stroke="#777"/>
  <text x="340" y="202" text-anchor="middle" font-size="17" fill="#ddd">Engine Unit</text>
  <text x="340" y="224" text-anchor="middle" font-size="16" fill="#888">1 Steel + 1 Gear + 2 Pipe</text>
  <text x="340" y="248" text-anchor="middle" font-size="16" fill="#666">Assembling Machine 2</text>

  <!-- Engine output arrow up -->
  <line x1="380" y1="200" x2="430" y2="200" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="430,195 445,200 430,205" fill="#9b59b6"/>

  <!-- ===== Red Circuit ===== -->
  <rect x="260" y="350" width="160" height="90" rx="5" fill="#2a2a2a" stroke="#777"/>
  <text x="340" y="377" text-anchor="middle" font-size="17" fill="#ddd">Red Circuit</text>
  <text x="340" y="399" text-anchor="middle" font-size="16" fill="#888">2 Plastic + 4 Copper Cable</text>
  <text x="340" y="421" text-anchor="middle" font-size="16" fill="#666">+ 2 Green Circuit</text>
  <line x1="420" y1="395" x2="470" y2="395" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="470,390 485,395 470,400" fill="#9b59b6"/>

  <!-- ===== Electric Engine Unit ===== -->
  <rect x="490" y="155" width="180" height="110" rx="5" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2"/>
  <text x="580" y="185" text-anchor="middle" font-size="18" fill="#fff" font-weight="bold">Electric Engine Unit</text>
  <text x="580" y="212" text-anchor="middle" font-size="16" fill="#ddd">Engine + Red Circuit + Lube</text>
  <text x="580" y="238" text-anchor="middle" font-size="16" fill="#888">Assembling Machine 2/3</text>
  <text x="580" y="258" text-anchor="middle" font-size="14" fill="#888">1 Engine : 1 Red Circuit : 1 Lube</text>

  <!-- ===== Prod Module ===== -->
  <rect x="490" y="345" width="180" height="90" rx="5" fill="#2a2a2a" stroke="#777"/>
  <text x="580" y="372" text-anchor="middle" font-size="17" fill="#ddd">Productivity Module 1</text>
  <text x="580" y="396" text-anchor="middle" font-size="16" fill="#888">5 Red + 5 Green Circuit</text>
  <text x="580" y="418" text-anchor="middle" font-size="16" fill="#666">Assembling Machine 1/2</text>

  <!-- Prod module input arrows -->
  <line x1="445" y1="395" x2="490" y2="395" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="490,390 500,395 490,400" fill="#9b59b6"/>

  <!-- Engine to Electric Engine -->
  <line x1="445" y1="200" x2="490" y2="210" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="490,205 500,212 490,218" fill="#9b59b6"/>

  <!-- ===== Lubricant ===== -->
  <rect x="490" y="100" width="180" height="48" rx="5" fill="#2a2a2a" stroke="#8b4513"/>
  <text x="580" y="127" text-anchor="middle" font-size="16" fill="#d4a017">Lubricant from Heavy Oil</text>
  <line x1="580" y1="148" x2="580" y2="155" stroke="#d4a017" stroke-width="2"/>
  <line x1="580" y1="155" x2="630" y2="200" stroke="#d4a017" stroke-width="2"/>
  <polygon points="625,197 632,200 627,206" fill="#d4a017"/>

  <!-- ===== Rail ===== -->
  <rect x="260" y="475" width="160" height="70" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="340" y="502" text-anchor="middle" font-size="17" fill="#ddd">Rail</text>
  <text x="340" y="526" text-anchor="middle" font-size="16" fill="#888">1 Steel + 1 Stone</text>
  <line x1="420" y1="510" x2="485" y2="510" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="485,505 500,510 485,515" fill="#9b59b6"/>

  <!-- ===== Purple Science Assembly ===== -->
  <rect x="720" y="145" width="200" height="310" rx="8" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="820" y="175" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">Production Science</text>
  <text x="820" y="200" text-anchor="middle" font-size="17" fill="#9b59b6">Assembling Machine 2/3</text>
  <text x="820" y="230" text-anchor="middle" font-size="16" fill="#ddd">Input per craft:</text>
  <text x="820" y="256" text-anchor="middle" font-size="16" fill="#888">1 Electric Engine Unit</text>
  <text x="820" y="280" text-anchor="middle" font-size="16" fill="#888">1 Productivity Module 1</text>
  <text x="820" y="304" text-anchor="middle" font-size="16" fill="#888">1 Rail</text>
  <text x="820" y="340" text-anchor="middle" font-size="14" fill="#666">Craft time: 10 sec (14 with AM2)</text>
  <text x="820" y="370" text-anchor="middle" font-size="14" fill="#555">Output: 3 packs per craft</text>
  <text x="820" y="400" text-anchor="middle" font-size="14" fill="#555">(2 in 1.0 without Space Age)</text>

  <!-- Arrows into purple science box -->
  <line x1="670" y1="210" x2="720" y2="220" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="720,216 728,222 719,227" fill="#9b59b6"/>

  <line x1="670" y1="395" x2="715" y2="280" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="713,277 717,280 713,284" fill="#9b59b6"/>

  <line x1="500" y1="510" x2="730" y2="330" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="728,327 733,330 728,334" fill="#9b59b6"/>

  <!-- ===== Output to Labs ===== -->
  <line x1="920" y1="300" x2="980" y2="300" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="980,295 990,300 980,305" fill="#9b59b6"/>

  <rect x="870" y="490" width="100" height="55" rx="5" fill="#2a2a2a" stroke="#555"/>
  <text x="920" y="517" text-anchor="middle" font-size="16" fill="#999">Labs</text>
  <text x="920" y="538" text-anchor="middle" font-size="14" fill="#666">All 7 Science Packs</text>

  <line x1="870" y1="455" x2="920" y2="490" stroke="#555" stroke-width="2"/>
  <polygon points="918,488 923,490 918,494" fill="#555"/>

  <!-- ===== Row 2: Raw inputs for circuits ===== -->
  <text x="340" y="588" text-anchor="middle" font-size="15" fill="#555">Basic Materials from Main Bus: Iron, Copper, Coal, Stone, Steel</text>
  <text x="340" y="612" text-anchor="middle" font-size="15" fill="#555">Advanced Production: Plastic from Oil, Green Circuits from Copper Cable + Iron</text>

  <!-- Legend -->
  <rect x="60" y="570" width="12" height="12" rx="2" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="78" y="581" font-size="16" fill="#888">Purple science production chain</text>
  <rect x="60" y="590" width="12" height="12" rx="2" fill="#2a2a2a" stroke="#444"/>
  <text x="78" y="601" font-size="16" fill="#888">Material bus / external supply</text>

  <text x="500" y="660" text-anchor="middle" font-size="14" fill="#555">Tip: 1 Electric Engine assembler feeds about 2.5 Purple Science assemblers with prod modules</text>
</svg>